name: Package for macOS
description: Create a macOS package for MeshMC

inputs:
  version:
    description: Launcher version
    required: true
  build-type:
    description: Type for the build
    required: true
    default: Debug
  artifact-name:
    description: Name of the uploaded artifact
    required: true
    default: macOS
  apple-codesign-cert:
    description: Certificate for signing macOS builds
    required: false
  apple-codesign-password:
    description: Password for signing macOS builds
    required: false
  apple-codesign-id:
    description: Certificate ID for signing macOS builds
    required: false
  apple-notarize-apple-id:
    description: Apple ID used for notarizing macOS builds
    required: false
  apple-notarize-team-id:
    description: Team ID used for notarizing macOS builds
    required: false
  apple-notarize-password:
    description: Password used for notarizing macOS builds
    required: false
  sparkle-ed25519-key:
    description: Private key for signing Sparkle updates
    required: false

runs:
  using: composite

  steps:
    - name: Fetch codesign certificate
      shell: bash
      run: |
        echo '${{ inputs.apple-codesign-cert }}' | base64 --decode > codesign.p12
        if [ -n '${{ inputs.apple-codesign-id }}' ]; then
          security create-keychain -p '${{ inputs.apple-codesign-password }}' build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p '${{ inputs.apple-codesign-password }}' build.keychain
          security import codesign.p12 -k build.keychain -P '${{ inputs.apple-codesign-password }}' -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k '${{ inputs.apple-codesign-password }}' build.keychain
        else
          echo ":warning: Using ad-hoc code signing for macOS, as certificate was not present." >> $GITHUB_STEP_SUMMARY
        fi

    - name: Package
      shell: bash
      env:
        BUILD_DIR: build
        INSTALL_DIR: install
      run: |
        cmake --install ${{ env.BUILD_DIR }} --config ${{ inputs.build-type }}

        cd ${{ env.INSTALL_DIR }}
        chmod +x "MeshMC.app/Contents/MacOS/meshmc"

        if [ -n '${{ inputs.apple-codesign-id }}' ]; then
          APPLE_CODESIGN_ID='${{ inputs.apple-codesign-id }}'
          ENTITLEMENTS_FILE='../branding/App.entitlements'
          # Real Developer-ID certificates can (and for notarization,
          # must) carry a secure timestamp. Ad-hoc signing cannot.
          TIMESTAMP_FLAG='--timestamp'
        else
          APPLE_CODESIGN_ID='-'
          ENTITLEMENTS_FILE='../branding/AdhocSignedApp.entitlements'
          TIMESTAMP_FLAG=''
        fi
        if [ -d "MeshMC.app/Contents/Frameworks" ]; then
          echo "Signing embedded frameworks / dylibs"
          find "MeshMC.app/Contents/Frameworks" \
               \( -name "*.dylib" -o -name "*.framework" \) -print0 \
            | while IFS= read -r -d '' _fw; do
                echo "  -> $_fw"
                sudo codesign --sign "$APPLE_CODESIGN_ID" --force \
                              --options runtime $TIMESTAMP_FLAG \
                              "$_fw"
              done
        fi
        # Bundle-layout guard.
        #
        # Apple's signing tooling reserves Contents/MacOS/ for the
        # main executable + its Mach-O helpers. Anything else found
        # there (data files, JARs, directories of plugins) is treated
        # as a subcomponent of the main executable and gets seal-
        # hashed at strict-validation time. If such a subcomponent
        # is not itself a signable Mach-O, the seal fails with e.g.
        #     main executable failed strict validation
        #       In subcomponent: .../mmcmodules/Foo.mmco
        #     code object is not signed at all
        #       In subcomponent: .../jars/JavaCheck.jar
        # The right fix is structural, not whack-a-mole: keep
        # Contents/MacOS/ Mach-O-only and route everything else into
        # Resources/ (data) or PlugIns/ (loadable bundles). The CMake
        # side of this commit does that for jars/ and mmcmodules/.
        # This guard fails the build immediately if a future install
        # rule slips through, so we never burn another notarytool
        # round-trip on a layout regression.
        echo "Validating Contents/MacOS/ layout"
        _layout_bad=0
        while IFS= read -r -d '' _entry; do
          if [ -d "$_entry" ]; then
            echo "::error::Unexpected directory under Contents/MacOS/: $_entry"
            echo "          Move its contents to Resources/ or PlugIns/."
            _layout_bad=1
            continue
          fi
          if [ ! -f "$_entry" ]; then
            continue
          fi
          if ! file -b "$_entry" | grep -qE 'Mach-O|universal binary'; then
            echo "::error::Non-Mach-O file under Contents/MacOS/: $_entry"
            echo "          file: $(file -b "$_entry")"
            echo "          Move it to Contents/Resources/."
            _layout_bad=1
          fi
        done < <(find "MeshMC.app/Contents/MacOS" -mindepth 1 -print0)

        # Contents/PlugIns/ layout check.
        #
        # Apple's strict-signing pass also walks PlugIns/ and treats
        # every file it finds there as nested code that must be
        # individually signable. JSON / TXT / template files dropped
        # alongside a .mmco produce the exact same
        #   "code object is not signed at all
        #    In subcomponent: .../PlugIns/mmcmodules/Foo/rules/x.json"
        # failure mode we saw with Contents/MacOS/jars. Plugin data
        # belongs under Contents/Resources/MMCOPluginData/<Plugin>/
        # (see MMCO_PLUGIN_DATA_DEST_DIR in the top-level CMakeLists).
        # Only Mach-O files (.mmco) and well-formed Apple bundles
        # (*.bundle / *.framework) are allowed under PlugIns/.
        if [ -d "MeshMC.app/Contents/PlugIns" ]; then
          echo "Validating Contents/PlugIns/ layout"
          while IFS= read -r -d '' _entry; do
            # We don't descend into well-formed Apple bundles —
            # those are signed as a unit and their internals are
            # codesign's problem, not ours.
            case "$_entry" in
              *.framework|*.bundle|*.app)
                continue
                ;;
            esac
            # Inside *.framework / *.bundle / *.app the find walk
            # would still report their contents; skip anything
            # whose path contains one of those segments.
            if echo "$_entry" \
                 | grep -qE '\.(framework|bundle|app)(/|$)'; then
              continue
            fi
            if [ -d "$_entry" ]; then
              # Subdirectory under PlugIns/ that isn't itself a
              # bundle. The mmcmodules/ container is the only one
              # we expect (it groups .mmco loadable bundles).
              case "${_entry#MeshMC.app/Contents/PlugIns/}" in
                mmcmodules)
                  continue
                  ;;
              esac
              # Anything else (e.g. mmcmodules/ErrorOracle/) means
              # a plugin shipped a data directory next to its .mmco.
              # That is exactly what trips codesign.
              echo "::error::Plugin-data directory under Contents/PlugIns/: $_entry"
              echo "          Install plugin data files to MMCO_PLUGIN_DATA_DEST_DIR"
              echo "          (Contents/Resources/MMCOPluginData/<PluginName>/...) instead."
              _layout_bad=1
              continue
            fi
            if [ ! -f "$_entry" ]; then
              continue
            fi
            # Files at this depth must be Mach-O (.mmco files are
            # Mach-O loadable bundles). Anything else — JSON, TXT,
            # README — is unsigned data and will trip codesign.
            if ! file -b "$_entry" | grep -qE 'Mach-O|universal binary'; then
              echo "::error::Non-Mach-O file under Contents/PlugIns/: $_entry"
              echo "          file: $(file -b "$_entry")"
              echo "          Move it to Contents/Resources/MMCOPluginData/<Plugin>/."
              _layout_bad=1
            fi
          done < <(find "MeshMC.app/Contents/PlugIns" -mindepth 1 -print0)
        fi

        if [ "$_layout_bad" != "0" ]; then
          echo "::error::Bundle layout check failed; aborting before codesign."
          exit 1
        fi

        # Helper Mach-O executables under Contents/MacOS/ that aren't
        # the main launcher (meshmc-updater, meshmc-crashreporter,
        # ...). codesign treats each one as a subcomponent of the
        # main executable and refuses to seal the parent unless the
        # helper is already individually signed.
        #
        # We sign helpers with hardened runtime + timestamp but
        # WITHOUT the launcher's entitlements file: helper binaries
        # have their own (smaller) entitlement profiles, and giving
        # them the launcher's blob would invite a separate
        # notarization rejection. Special-case here if a helper
        # ever needs its own entitlements.
        echo "Signing helper executables under Contents/MacOS"
        find "MeshMC.app/Contents/MacOS" -maxdepth 1 -type f \
             ! -name meshmc -print0 \
          | while IFS= read -r -d '' _helper; do
              if file -b "$_helper" | grep -qE 'Mach-O|universal binary'; then
                echo "  -> $_helper"
                sudo codesign --sign "$APPLE_CODESIGN_ID" --force \
                              --options runtime $TIMESTAMP_FLAG \
                              "$_helper"
              fi
            done

        # Main executable (with entitlements + hardened runtime).
        echo "Signing main executable"
        sudo codesign --sign "$APPLE_CODESIGN_ID" --force \
                      --entitlements "$ENTITLEMENTS_FILE" \
                      --options runtime $TIMESTAMP_FLAG \
                      "MeshMC.app/Contents/MacOS/meshmc"
        echo "Sealing outer bundle"
        sudo codesign --sign "$APPLE_CODESIGN_ID" --force \
                      --options runtime $TIMESTAMP_FLAG \
                      "MeshMC.app"

        echo "Verifying bundle signature (--strict)"
        sudo codesign --verify --verbose=2 --strict "MeshMC.app"

    - name: Notarize
      shell: bash
      env:
        INSTALL_DIR: install
      run: |
        cd ${{ env.INSTALL_DIR }}

        if [ -n '${{ inputs.apple-notarize-password }}' ]; then
          ditto -c -k --sequesterRsrc --keepParent "MeshMC.app" ../MeshMC.zip
          xcrun notarytool submit ../MeshMC.zip \
            --wait --progress \
            --apple-id '${{ inputs.apple-notarize-apple-id }}' \
            --team-id '${{ inputs.apple-notarize-team-id }}' \
            --password '${{ inputs.apple-notarize-password }}'

          xcrun stapler staple "MeshMC.app"
        else
          echo ":warning: Skipping notarization as credentials are not present." >> $GITHUB_STEP_SUMMARY
        fi
        ditto -c -k --sequesterRsrc --keepParent "MeshMC.app" ../MeshMC.zip

    - name: Create DMG
      shell: bash
      env:
        INSTALL_DIR: install
      run: |
        cd ${{ env.INSTALL_DIR }}

        mkdir -p src
        cp -R "MeshMC.app" src/

        ln -s /Applications src/

        hdiutil create \
            -volname "MeshMC ${{ inputs.version }}" \
            -srcfolder src \
            -ov -format ULMO \
            "../MeshMC.dmg"

    - name: Make Sparkle signature
      shell: bash
      run: |
        if [ '${{ inputs.sparkle-ed25519-key }}' != '' ]; then
          echo '${{ inputs.sparkle-ed25519-key }}' > ed25519-priv.pem
          signature_zip=$(/opt/homebrew/opt/openssl@3/bin/openssl pkeyutl -sign -rawin -in ${{ github.workspace }}/MeshMC.zip -inkey ed25519-priv.pem | openssl base64 | tr -d \\n)
          signature_dmg=$(/opt/homebrew/opt/openssl@3/bin/openssl pkeyutl -sign -rawin -in ${{ github.workspace }}/MeshMC.dmg -inkey ed25519-priv.pem | openssl base64 | tr -d \\n) 
          rm ed25519-priv.pem
          cat >> $GITHUB_STEP_SUMMARY << EOF
        ### Artifact Information :information_source:
        - :memo: Sparkle Signature (ed25519): \`$signature_zip\` (ZIP)
        - :memo: Sparkle Signature (ed25519): \`$signature_dmg\` (DMG)
        EOF
        else
          cat >> $GITHUB_STEP_SUMMARY << EOF
        ### Artifact Information :information_source:
        - :warning: Sparkle Signature (ed25519): No private key available (likely a pull request or fork)
        EOF
        fi

    - name: Upload binary tarball
      uses: actions/upload-artifact@v7
      with:
        name: MeshMC-${{ inputs.artifact-name }}-${{ inputs.version }}-${{ inputs.build-type }}
        path: MeshMC.zip

    - name: Upload disk image
      uses: actions/upload-artifact@v7
      with:
        name: MeshMC-${{ inputs.artifact-name }}-${{ inputs.version }}-${{ inputs.build-type }}.dmg
        path: MeshMC.dmg
