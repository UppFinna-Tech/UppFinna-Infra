name: Setup Dependencies
description: Install and setup dependencies for building MeshMC

inputs:
  build-type:
    description: Type for the build
    required: true
    default: Debug
  artifact-name:
    description: Name of the uploaded artifact
    required: true
  msystem:
    description: MSYS2 subsystem to use
    required: false
  vcvars-arch:
    description: Visual Studio architecture to use
    required: false
  qt-architecture:
    description: Qt architecture
    required: false
  qt-version:
    description: Version of Qt to use
    required: true
  github-token:
    description: GitHub token for package feed authentication
    required: false
    default: ${{ github.token }}

outputs:
  build-type:
    description: Type of build used
    value: ${{ inputs.build-type }}
  qt-version:
    description: Version of Qt used
    value: ${{ inputs.qt-version }}

runs:
  using: composite

  steps:
    - name: Setup Linux dependencies
      if: ${{ runner.os == 'Linux' }}
      uses: Project-Tick/Project-Tick/.github/actions/meshmc/setup-dependencies/linux@ef4cb1b7aa938e2a332032c4063826821160533e # master
      with:
        github-token: ${{ inputs.github-token }}

    - name: Setup macOS dependencies
      if: ${{ runner.os == 'macOS' }}
      uses: Project-Tick/Project-Tick/.github/actions/meshmc/setup-dependencies/macos@ef4cb1b7aa938e2a332032c4063826821160533e # master
      with:
        build-type: ${{ inputs.build-type }}

    - name: Setup Windows dependencies
      if: ${{ runner.os == 'Windows' }}
      uses: Project-Tick/Project-Tick/.github/actions/meshmc/setup-dependencies/windows@ef4cb1b7aa938e2a332032c4063826821160533e # master
      with:
        build-type: ${{ inputs.build-type }}
        msystem: ${{ inputs.msystem }}
        vcvars-arch: ${{ inputs.vcvars-arch }}

    # TODO(@YongDo-Hyun): Get this working on MSYS2!
    - name: Setup ccache
      if: ${{ (runner.os != 'Windows' || inputs.msystem == '') && inputs.build-type == 'Debug' }}
      uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
      with:
        variant: sccache
        create-symlink: ${{ runner.os != 'Windows' }}
        key: ${{ runner.os }}-${{ runner.arch }}-${{ inputs.artifact-name }}-sccache

    - name: Use ccache on debug builds
      if: ${{ inputs.build-type == 'Debug' }}
      shell: bash
      env:
        # Only use ccache on MSYS2
        CCACHE_VARIANT: ${{ (runner.os == 'Windows' && inputs.msystem != '') && 'ccache' || 'sccache' }}
      run: |
        echo "CMAKE_C_COMPILER_LAUNCHER=$CCACHE_VARIANT" >> "$GITHUB_ENV"
        echo "CMAKE_CXX_COMPILER_LAUNCHER=$CCACHE_VARIANT" >> "$GITHUB_ENV"

    - name: Install Qt
      if: ${{ inputs.msystem == '' }}
      uses: jurplel/install-qt-action@v4
      with:
        aqtversion: "==3.1.*"
        version: ${{ inputs.qt-version }}
        modules: qtimageformats qtnetworkauth qt5compat
        cache: ${{ inputs.build-type == 'Debug' }}

    # ── GPGME + GPGME++ + QGpgME from source (Linux only) ──────────────
    # MMCO's plugin signing needs the Qt6 QGpgME bindings against
    # GPGME 2.x. As of the 2.0 release upstream split the bindings
    # into three separate tarballs (gpgme, gpgmepp, qgpgme). We build
    # all three against the aqt-managed Qt6 toolkit and install to
    # /usr/local; downstream `find_package` resolves them.
    - name: Build GPGME + GPGME++ + QGpgME from source
      if: ${{ runner.os == 'Linux' && inputs.msystem == '' }}
      shell: bash
      env:
        GPGME_VERSION:   "2.0.0"
        GPGMEPP_VERSION: "2.0.0"
        QGPGME_VERSION:  "2.0.0"
      run: |
        set -euo pipefail

        qt_root_dir="${QT_ROOT_DIR:-}"
        qt6_dir="${Qt6_DIR:-}"
        qmake6_bin=""
        for candidate in \
          "${qt_root_dir:+$qt_root_dir/bin/qmake6}" \
          "${qt6_dir:+$qt6_dir/../../../bin/qmake6}"; do
          if [[ -n "$candidate" && -x "$candidate" ]]; then
            qmake6_bin="$candidate"
            break
          fi
        done
        if [[ -z "$qmake6_bin" ]]; then
          qmake6_bin="$(command -v qmake6 || true)"
        fi
        if [[ -z "$qmake6_bin" ]]; then
          echo "::error::Could not locate qmake6 from the aqt-installed Qt."
          echo "QT_ROOT_DIR=$qt_root_dir Qt6_DIR=$qt6_dir PATH=$PATH"
          exit 1
        fi
        echo "Using qmake6 at: $qmake6_bin"
        export PATH="$(dirname "$qmake6_bin"):$PATH"

        qt6_cmake_dir="${qt_root_dir:-${qt6_dir:+$(dirname "$qt6_dir")/Qt6}}"
        echo "Qt6 CMake dir hint: $qt6_cmake_dir"

        build_root="$(mktemp -d)"

        cd "$build_root"
        curl -fsSLO \
          "https://www.gnupg.org/ftp/gcrypt/gpgme/gpgme-${GPGME_VERSION}.tar.bz2"
        tar xjf "gpgme-${GPGME_VERSION}.tar.bz2"
        pushd "gpgme-${GPGME_VERSION}"
          ./configure \
            --prefix=/usr/local \
            --disable-gpg-test \
            --disable-gpgsm-test \
            --disable-g13-test
          make -j"$(nproc)"
          sudo make install
        popd
        sudo ldconfig

        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
        export CMAKE_PREFIX_PATH="/usr/local${qt6_cmake_dir:+:$qt6_cmake_dir}${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}"

        cd "$build_root"
        curl -fsSLO \
          "https://www.gnupg.org/ftp/gcrypt/gpgmepp/gpgmepp-${GPGMEPP_VERSION}.tar.xz"
        tar xJf "gpgmepp-${GPGMEPP_VERSION}.tar.xz"
        pushd "gpgmepp-${GPGMEPP_VERSION}"
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DBUILD_TESTING=OFF
          cmake --build build --parallel "$(nproc)"
          sudo cmake --install build
        popd
        sudo ldconfig

        cd "$build_root"
        curl -fsSLO \
          "https://www.gnupg.org/ftp/gcrypt/qgpgme/qgpgme-${QGPGME_VERSION}.tar.xz"
        tar xJf "qgpgme-${QGPGME_VERSION}.tar.xz"
        pushd "qgpgme-${QGPGME_VERSION}"
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DBUILD_WITH_QT5=OFF \
            -DBUILD_WITH_QT6=ON \
            -DBUILD_TESTING=OFF
          cmake --build build --parallel "$(nproc)"
          sudo cmake --install build
        popd
        sudo ldconfig

        echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> "$GITHUB_ENV"
        echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"    >> "$GITHUB_ENV"
