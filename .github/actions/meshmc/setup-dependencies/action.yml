name: Setup Dependencies
description: Install and setup dependencies for building MeshMC

inputs:
  build-type:
    description: Type for the build
    required: true
    default: Debug
  artifact-name:
    description: Name of the uploaded artifact
    required: true
  msystem:
    description: MSYS2 subsystem to use
    required: false
  vcvars-arch:
    description: Visual Studio architecture to use
    required: false
  qt-architecture:
    description: Qt architecture
    required: false
  qt-version:
    description: Version of Qt to use
    required: true
  github-token:
    description: GitHub token for package feed authentication
    required: false
    default: ${{ github.token }}

outputs:
  build-type:
    description: Type of build used
    value: ${{ inputs.build-type }}
  qt-version:
    description: Version of Qt used
    value: ${{ inputs.qt-version }}

runs:
  using: composite

  steps:
    - name: Setup Linux dependencies
      if: ${{ runner.os == 'Linux' }}
      uses: Project-Tick/Project-Tick/.github/actions/meshmc/setup-dependencies/linux@master
      with:
        github-token: ${{ inputs.github-token }}

    - name: Setup macOS dependencies
      if: ${{ runner.os == 'macOS' }}
      uses: Project-Tick/Project-Tick/.github/actions/meshmc/setup-dependencies/macos@master
      with:
        build-type: ${{ inputs.build-type }}

    - name: Setup Windows dependencies
      if: ${{ runner.os == 'Windows' }}
      uses: Project-Tick/Project-Tick/.github/actions/meshmc/setup-dependencies/windows@master
      with:
        build-type: ${{ inputs.build-type }}
        msystem: ${{ inputs.msystem }}
        vcvars-arch: ${{ inputs.vcvars-arch }}

    # TODO(@YongDo-Hyun): Get this working on MSYS2!
    - name: Setup ccache
      if: ${{ (runner.os != 'Windows' || inputs.msystem == '') && inputs.build-type == 'Debug' }}
      uses: hendrikmuhs/ccache-action@v1.2.23
      with:
        variant: sccache
        create-symlink: ${{ runner.os != 'Windows' }}
        key: ${{ runner.os }}-${{ runner.arch }}-${{ inputs.artifact-name }}-sccache

    - name: Use ccache on debug builds
      if: ${{ inputs.build-type == 'Debug' }}
      shell: bash
      env:
        # Only use ccache on MSYS2
        CCACHE_VARIANT: ${{ (runner.os == 'Windows' && inputs.msystem != '') && 'ccache' || 'sccache' }}
      run: |
        echo "CMAKE_C_COMPILER_LAUNCHER=$CCACHE_VARIANT" >> "$GITHUB_ENV"
        echo "CMAKE_CXX_COMPILER_LAUNCHER=$CCACHE_VARIANT" >> "$GITHUB_ENV"

    - name: Install Qt
      if: ${{ inputs.msystem == '' }}
      uses: jurplel/install-qt-action@v4
      with:
        aqtversion: "==3.1.*"
        version: ${{ inputs.qt-version }}
        modules: qtimageformats qtnetworkauth qt5compat
        cache: ${{ inputs.build-type == 'Debug' }}

    # ── GPGME + Qt6 binding from source (Linux only) ───────────────────
    # MMCO's plugin signing needs the Qt6 QGpgME bindings against
    # GPGME 2.x. Neither Ubuntu noble main (gpgme 1.18, no Qt6 binding)
    # nor Kubuntu Backports (gpgme 1.24 + libqgpgmeqt6-dev 1.24, pins
    # to the older C++ ABI) provide a usable combination, so we build
    # GPGME from the upstream tarball against the aqt-managed Qt6
    # toolkit. Result lands in /usr/local; CMake picks it up via
    # `Gpgmepp` / `QGpgmeQt6` packages with no extra prefix hints.
    - name: Build GPGME + QGpgME from source
      if: ${{ runner.os == 'Linux' && inputs.msystem == '' }}
      shell: bash
      env:
        GPGME_VERSION: "2.0.0"
      run: |
        set -euo pipefail

        qmake6_bin=""
        for candidate in "$QT_ROOT_DIR/bin/qmake6" "$Qt6_DIR/../../../bin/qmake6"; do
          if [[ -x "$candidate" ]]; then
            qmake6_bin="$candidate"
            break
          fi
        done
        if [[ -z "$qmake6_bin" ]]; then
          qmake6_bin="$(command -v qmake6 || true)"
        fi
        if [[ -z "$qmake6_bin" ]]; then
          echo "::error::Could not locate qmake6 from the aqt-installed Qt."
          exit 1
        fi
        echo "Using qmake6 at: $qmake6_bin"

        build_root="$(mktemp -d)"
        cd "$build_root"

        curl -fsSLO \
          "https://www.gnupg.org/ftp/gcrypt/gpgme/gpgme-${GPGME_VERSION}.tar.bz2"
        tar xjf "gpgme-${GPGME_VERSION}.tar.bz2"
        cd "gpgme-${GPGME_VERSION}"

        export PATH="$(dirname "$qmake6_bin"):$PATH"
        ./configure \
          --prefix=/usr/local \
          --enable-languages=cpp,qt6 \
          --disable-gpg-test \
          --disable-gpgsm-test \
          --disable-g13-test

        make -j"$(nproc)"
        sudo make install
        sudo ldconfig

        echo "CMAKE_PREFIX_PATH=/usr/local${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}" >> "$GITHUB_ENV"
        echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
