name: "Uppfinna CNG Image"
description: "Build and push a single Cloud Native GitLab (CE) image using the CNG repo build scripts."

inputs:
  image:
    required: true
  mode:
    description: "build (per-arch native build) or merge (combine per-arch tags into a multi-arch manifest + uppfinna twin)."
    default: "build"
  arch:
    description: "Target architecture for build mode: amd64 or arm64. Ignored in merge mode."
    default: "amd64"
  gitlab-version:
    default: "master"
  image-tag:
    default: ""
  # "true" only for default-branch (master) builds. When true the build also
  # publishes the stable tag (e.g. master); MR/feature builds set "false" so
  # they only push the unique SHA tag and never overwrite the master tag.
  is-default-branch:
    default: "true"
  gitaly-version:
    default: ""
  gitlab-shell-version:
    default: ""
  gitlab-pages-version:
    default: ""
  gitlab-kas-version:
    default: ""
  gitlab-elasticsearch-indexer-version:
    default: ""
  registry-user:
    default: ""
  registry-password:
    default: ""
  fetch-artifacts-pat:
    default: ""
  ci-registry:
    default: "registry.projecttick.org"
  ci-registry-image:
    default: "registry.projecttick.org/project-tick/uppfinna/cng"
  gitlab-namespace:
    default: "project-tick/uppfinna/forge"
  ce-project:
    default: "gitlab"
  ci-api-v4-url:
    default: "https://git.projecttick.org/api/v4"
  ci-server-fqdn:
    default: "git.projecttick.org"
  gitaly-git-repo-url:
    default: "https://git.projecttick.org/project-tick/uppfinna/forge/git.git"
  assets-image-registry-prefix:
    default: "registry.projecttick.org/project-tick/uppfinna"

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

    - name: Install skopeo and cosign
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends skopeo
        curl -fsSL -o /tmp/cosign "https://github.com/sigstore/cosign/releases/download/v3.0.4/cosign-linux-amd64"
        sudo install -m 0755 /tmp/cosign /usr/local/bin/cosign

    - name: Log in to registry
      shell: bash
      env:
        CNG_REGISTRY_USER: ${{ inputs.registry-user }}
        CNG_REGISTRY_PASSWORD: ${{ inputs.registry-password }}
        CI_REGISTRY: ${{ inputs.ci-registry }}
      run: |
        set -euo pipefail
        if [ -z "${CNG_REGISTRY_USER:-}" ] || [ -z "${CNG_REGISTRY_PASSWORD:-}" ]; then
          echo "CNG_REGISTRY_USER / CNG_REGISTRY_PASSWORD not set." >&2
          exit 1
        fi
        echo "$CNG_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CNG_REGISTRY_USER" --password-stdin

    - name: Build ${{ inputs.image }}
      shell: bash
      env:
        CI_REGISTRY: ${{ inputs.ci-registry }}
        CI_REGISTRY_IMAGE: ${{ inputs.ci-registry-image }}
        GITLAB_NAMESPACE: ${{ inputs.gitlab-namespace }}
        CE_PROJECT: ${{ inputs.ce-project }}
        CI_API_V4_URL: ${{ inputs.ci-api-v4-url }}
        CI_SERVER_FQDN: ${{ inputs.ci-server-fqdn }}
        CI_SERVER_HOST: ${{ inputs.ci-server-fqdn }}
        CI_SERVER_PROTOCOL: "https"
        GITALY_GIT_REPO_URL: ${{ inputs.gitaly-git-repo-url }}
        DISABLE_BUILDX_CLUSTER: "true"
        MODE: ${{ inputs.mode }}
        ARCH_LIST: ${{ inputs.mode == 'merge' && 'amd64,arm64' || inputs.arch }}
        # Empty strings are falsy in expressions. The old merge-first ternary
        # always fell through to -amd64; test build mode instead so merge gets
        # an actually empty suffix.
        ARCH_SUFFIX: ${{ inputs.mode == 'build' && format('-{0}', inputs.arch) || '' }}
        SKIP_IMAGE_SIGNING: "true"
        SKIP_IMAGE_VERIFICATION: "true"
        COSIGN_YES: "true"
        BUILDKIT_IMAGE: "moby/buildkit:v0.26.3"
        DEBIAN_IMAGE: "debian:bookworm-slim"
        ALPINE_IMAGE: "alpine:3.15"
        DEBIAN_BUILD_ARGS: "--build-arg DEBIAN_IMAGE=debian:bookworm-slim"
        ALPINE_BUILD_ARGS: "--build-arg ALPINE_IMAGE=alpine:3.15"
        GO_VERSION: "1.26.4"
        GO_FIPS_VERSION: "1.26.4"
        GO_FIPS_TAG: "go1.26.4-1-openssl-fips"
        RUST_VERSION: "1.73.0"
        RUBY_VERSION: "3.3.11"
        RUBYGEMS_VERSION: "3.7.2"
        BUNDLER_VERSION: "2.7.2"
        OPENSSL_GEM_VERSION: "~>3.2.0"
        PYTHON_VERSION: "3.12.12"
        PYOPENSSL_VERSION: "25.3.0"
        PYCA_CRYPTOGRAPHY_VERSION: "46.0.7"
        PG_VERSION: "18.4"
        PG_FLEX_VERSION: "2.6.4"
        PG_BISON_VERSION: "3.8.2"
        CFSSL_VERSION: "1.6.1"
        CFSSL_CHECKSUM_SHA256: "89e600cd5203a025f8b47c6cd5abb9a74b06e3c7f7f7dd3f5b2a00975b15a491"
        KUBECTL_VERSION: "1.36.1"
        YQ_VERSION: "4.53.3"
        GM_VERSION: "1.3.47"
        GM_CHECKSUM_SHA256: "95fb682dab0206a9db168d065963f4ffdf5a60b0b2a375aca1f4492fb18d0627"
        GM_SOURCE_URL: "https://sourceforge.net/projects/graphicsmagick/files/graphicsmagick/1.3.47/GraphicsMagick-1.3.47.tar.xz/download"
        GITLAB_LOGGER_VERSION: "master"
        # The forge mirror is tag-less, so track the master branch like the other
        # forge-based components. On-the-fly archives have no stable checksum, so
        # the SHA256 must be empty to skip verification (see gitlab-logger download).
        GITLAB_LOGGER_SHA256: ""
        GOMPLATE_VERSION: "v5.0.0"
        GOMPLATE_SHA256: "b4f24768c994dd62c95d7243cef4dc2354b47976fa8fbbda3889aeade8e39d69"
        EXIFTOOL_VERSION: "13.44"
        COSIGN_VERSION: "v3.0.4"
        MAILROOM_VERSION: "1.1.0"
        GITLAB_EXPORTER_VERSION: "16.8.0"
        # The forge mirror (project-tick/uppfinna/forge/container-registry) is
        # branch-based and carries no upstream tags, so pin to the default
        # branch like the other forge components (shell/pages/kas) rather than
        # the upstream 'v4.40.2-gitlab' tag, which does not exist in the mirror.
        GITLAB_CONTAINER_REGISTRY_VERSION: "master"
        GITLAB_OPENBAO_VERSION: "master"
        GITLAB_ZOEKT_SHA: "v1.17.1"
        GITLAB_ZOEKT_TAG: "v1.17.1"
        GIT_FILTER_REPO_VERSION: "2.47.0"
        GITALY_SERVER_VERSION: ${{ inputs.gitaly-version != '' && inputs.gitaly-version || 'master' }}
        GITLAB_SHELL_VERSION: ${{ inputs.gitlab-shell-version != '' && inputs.gitlab-shell-version || 'main' }}
        GITLAB_PAGES_VERSION: ${{ inputs.gitlab-pages-version != '' && inputs.gitlab-pages-version || 'master' }}
        GITLAB_KAS_VERSION: ${{ inputs.gitlab-kas-version != '' && inputs.gitlab-kas-version || 'master' }}
        GITLAB_ELASTICSEARCH_INDEXER_VERSION: ${{ inputs.gitlab-elasticsearch-indexer-version != '' && inputs.gitlab-elasticsearch-indexer-version || 'main' }}
        OPENBAO_NAMESPACE: "${{ inputs.gitlab-namespace }}/govern/secrets-management"
        ASSETS_IMAGE_REGISTRY_PREFIX: ${{ inputs.assets-image-registry-prefix }}
        ASSETS_IMAGE_PREFIX: "gitlab-assets"
        ASSETS_IMAGE_PLATFORM: "linux/amd64"
        GITLAB_ASSETS_TAG: ${{ inputs.gitlab-version || 'master' }}
        GITLAB_REF_SLUG: ${{ inputs.image-tag || 'master' }}
        COMPILE_ASSETS: "true"
        CI_JOB_NAME: ${{ inputs.image }}
        GITLAB_VERSION: ${{ inputs.gitlab-version || 'master' }}
        # CI_COMMIT_REF_SLUG keeps the caller-provided tag (a commit SHA when
        # image-tag is set) so every build still gets a unique, traceable tag.
        CI_COMMIT_REF_SLUG: ${{ inputs.image-tag || 'master' }}
        # On default-branch (master) builds, set CI_COMMIT_REF_NAME to
        # CI_DEFAULT_BRANCH so build.sh's is_default_branch() is true and
        # push_tags also publishes the stable tag (e.g. master). On MR/feature
        # builds keep it as the SHA so is_default_branch() is false: the build
        # still runs and pushes its unique SHA tag, but never overwrites the
        # shared master tag that the SaaS Helm deploy is pinned to.
        CI_COMMIT_REF_NAME: ${{ inputs.is-default-branch == 'true' && 'master' || (inputs.image-tag || 'master') }}
        CI_DEFAULT_BRANCH: master
        CI_PROJECT_DIR: ${{ github.workspace }}
        FETCH_DEV_ARTIFACTS_PAT: ${{ inputs.fetch-artifacts-pat }}
      run: |
        set -eo pipefail
        mkdir -p artifacts/images artifacts/container_versions artifacts/final
        source build-scripts/build.sh
        source build-scripts/container_versions.sh
        set_pipeline_edition
        populate_stable_image_vars

        gitlab_base_image() { echo "${CI_REGISTRY_IMAGE}/gitlab-base:$(get_gitlab_base_version)${IMAGE_TAG_EXT:-}"; }

        if [ "${MODE}" = "merge" ]; then
          # Preserve build_final_image's implicit ref tagging (for example
          # `master`). gitlab-go and gitlab-rust rely on it and do not call
          # push_tags explicitly in their image cases.
          build_final_image() { merge_and_push; push_tags; }
          # Direct build_if_needed cases call push_tags immediately afterwards.
          build_if_needed() { merge_and_push; }
        fi

        case "$CI_JOB_NAME" in
          gitlab-go)
            build_final_image --build-arg "GO_VERSION=${GO_VERSION}" ${DEBIAN_BUILD_ARGS}
            push_tags "${GO_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-rust)
            build_final_image --build-arg "RUST_VERSION=${RUST_VERSION}" ${DEBIAN_BUILD_ARGS}
            push_tags "${RUST_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-base)
            export CONTAINER_VERSION=$(get_gitlab_base_version)
            logger_version=$(get_logger_version)
            gomplate_version=$(get_gomplate_version)
            build_if_needed --build-arg "GITLAB_VERSION=${GITLAB_VERSION}" \
                            --build-arg "GOMPLATE_TAG=${gomplate_version}${IMAGE_TAG_EXT:-}" \
                            --build-arg "GITLAB_LOGGER_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-logger:${logger_version}${IMAGE_TAG_EXT:-}" \
                            --build-arg "FIPS_MODE=${FIPS_MODE:-}" \
                            ${DEBIAN_BUILD_ARGS}
            push_tags
            ;;
          gitlab-logger)
            build_final_image --build-arg "GITLAB_LOGGER_VERSION=${GITLAB_LOGGER_VERSION}" \
                              --build-arg "GO_TAG=$(get_go_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "GITLAB_LOGGER_SHA256=${GITLAB_LOGGER_SHA256}"
            push_tags "${GITLAB_LOGGER_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-gomplate)
            build_final_image --build-arg "GOMPLATE_VERSION=${GOMPLATE_VERSION}" \
                              --build-arg "GOMPLATE_SHA256=${GOMPLATE_SHA256}" \
                              --build-arg "GO_TAG=$(get_go_version)${IMAGE_TAG_EXT:-}"
            push_tags "${GOMPLATE_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-graphicsmagick)
            build_final_image --build-arg "GM_VERSION=${GM_VERSION}" \
                              --build-arg "GM_CHECKSUM_SHA256=${GM_CHECKSUM_SHA256}" \
                              --build-arg "GM_SOURCE_URL=${GM_SOURCE_URL}" \
                              --build-arg "_SIGNATURE_ENFORCE=" \
                              ${DEBIAN_BUILD_ARGS}
            push_tags "${GM_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-python)
            build_final_image --build-arg "PYTHON_VERSION=${PYTHON_VERSION}" ${DEBIAN_BUILD_ARGS}
            push_tags "${PYTHON_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          postgresql)
            build_final_image --build-arg "PG_VERSION=${PG_VERSION}" \
                              --build-arg "PG_FLEX_VERSION=${PG_FLEX_VERSION}" \
                              --build-arg "PG_BISON_VERSION=${PG_BISON_VERSION}" \
                              ${DEBIAN_BUILD_ARGS}
            push_tags "${PG_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          cfssl-self-sign)
            build_final_image --build-arg "CFSSL_VERSION=${CFSSL_VERSION}" \
                              --build-arg "CFSSL_CHECKSUM_SHA256=${CFSSL_CHECKSUM_SHA256}" \
                              ${ALPINE_BUILD_ARGS}
            push_tags "${CFSSL_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          kubectl)
            build_final_image --build-arg "KUBECTL_VERSION=${KUBECTL_VERSION}" \
                              --build-arg "YQ_VERSION=${YQ_VERSION}" \
                              ${DEBIAN_BUILD_ARGS}
            push_tags "${KUBECTL_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          certificates)
            export CONTAINER_VERSION=$(get_certificates_version)
            build_if_needed --build-arg "GITLAB_VERSION=${GITLAB_VERSION}" \
                            --build-arg "GITLAB_BASE_IMAGE=$(gitlab_base_image)"
            push_tags
            push_tags "${GITLAB_VERSION}${IMAGE_TAG_EXT:-}" "${CI_JOB_NAME/certificates/alpine-certificates}"
            ;;
          gitlab-exiftool)
            build_final_image --build-arg "EXIFTOOL_VERSION=${EXIFTOOL_VERSION}" \
                              --build-arg "GITLAB_BASE_IMAGE=$(gitlab_base_image)" \
                              ${DEBIAN_BUILD_ARGS}
            push_tags "${EXIFTOOL_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-cosign)
            build_final_image --build-arg "COSIGN_VERSION=${COSIGN_VERSION}" \
                              --build-arg "GITLAB_BASE_IMAGE=$(gitlab_base_image)" \
                              --build-arg "TAG=$(get_gitlab_base_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "GO_TAG=$(get_go_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "FIPS_MODE=${FIPS_MODE:-}" \
                              ${DEBIAN_BUILD_ARGS}
            push_tags "${COSIGN_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-ruby)
            build_final_image --build-arg "RUBY_VERSION=${RUBY_VERSION}" \
                              --build-arg "RUBYGEMS_VERSION=${RUBYGEMS_VERSION}" \
                              --build-arg "BUNDLER_VERSION=${BUNDLER_VERSION}" \
                              --build-arg "GITLAB_BASE_IMAGE=$(gitlab_base_image)" \
                              --build-arg "RUST_TAG=$(get_rust_version)${IMAGE_TAG_EXT:-}" \
                              ${DEBIAN_BUILD_ARGS}
            push_tags "${RUBY_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-exporter)
            ruby_version=$(get_ruby_version)
            build_final_image --build-arg "GITLAB_EXPORTER_VERSION=${GITLAB_EXPORTER_VERSION}" \
                              --build-arg "FROM_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-ruby" \
                              --build-arg "TAG=${ruby_version}${IMAGE_TAG_EXT:-}" \
                              --build-arg "RUBY_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-ruby:${ruby_version}${IMAGE_TAG_EXT:-}"
            push_tags "${GITLAB_EXPORTER_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-mailroom)
            ruby_version=$(get_ruby_version)
            build_final_image --build-arg "MAILROOM_VERSION=${MAILROOM_VERSION}" \
                              --build-arg "FROM_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-ruby" \
                              --build-arg "TAG=${ruby_version}${IMAGE_TAG_EXT:-}" \
                              --build-arg "RUBY_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-ruby:${ruby_version}${IMAGE_TAG_EXT:-}"
            push_tags "${MAILROOM_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitaly)
            build_final_image --build-arg "GITALY_SERVER_VERSION=${GITALY_SERVER_VERSION}" \
                              --build-arg "GIT_FILTER_REPO_VERSION=${GIT_FILTER_REPO_VERSION}" \
                              --build-arg "GITALY_GIT_REPO_URL=${GITALY_GIT_REPO_URL}" \
                              --build-arg "GO_TAG=$(get_go_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "PYTHON_TAG=$(get_python_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "GITLAB_NAMESPACE=${GITLAB_NAMESPACE}" \
                              --build-arg "CI_SERVER_FQDN=${CI_SERVER_FQDN}" \
                              --build-arg "CI_SERVER_PROTOCOL=${CI_SERVER_PROTOCOL}" \
                              --build-arg "CACHE_BUSTER=${GITALY_SERVER_VERSION}$(date -uI)" \
                              --build-arg "GITLAB_BASE_IMAGE=$(gitlab_base_image)"
            push_tags "${GITALY_SERVER_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-container-registry)
            gitlab_base_version=$(get_gitlab_base_version)
            build_final_image --build-arg "TAG=${gitlab_base_version}${IMAGE_TAG_EXT:-}" \
                              --build-arg "GO_TAG=$(get_go_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "REGISTRY_VERSION=${GITLAB_CONTAINER_REGISTRY_VERSION}" \
                              --build-arg "REGISTRY_NAMESPACE=gitlab-org" \
                              --build-arg "GITLAB_BASE_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-base:${gitlab_base_version}${IMAGE_TAG_EXT:-}"
            push_tags "${GITLAB_CONTAINER_REGISTRY_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-kas)
            build_final_image --build-arg "FROM_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-go" \
                              --build-arg "TAG=$(get_go_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "GITLAB_NAMESPACE=${GITLAB_NAMESPACE}" \
                              --build-arg "GITLAB_KAS_VERSION=${GITLAB_KAS_VERSION}" \
                              --build-arg "CACHE_BUSTER=${GITLAB_KAS_VERSION}$(date -uI)" \
                              --build-arg "CI_API_V4_URL=${CI_API_V4_URL}"
            push_tags "${GITLAB_KAS_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-pages)
            gitlab_base_version=$(get_gitlab_base_version)
            build_final_image --build-arg "GITLAB_PAGES_VERSION=${GITLAB_PAGES_VERSION}" \
                              --build-arg "GO_TAG=$(get_go_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "CACHE_BUSTER=${GITLAB_PAGES_VERSION}$(date -uI)" \
                              --build-arg "CI_API_V4_URL=${CI_API_V4_URL}" \
                              --build-arg "GITLAB_NAMESPACE=${GITLAB_NAMESPACE}" \
                              --build-arg "GITLAB_BASE_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-base:${gitlab_base_version}${IMAGE_TAG_EXT:-}" \
                              --build-arg "TAG=${gitlab_base_version}${IMAGE_TAG_EXT:-}"
            push_tags "${GITLAB_PAGES_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-shell)
            gitlab_base_version=$(get_gitlab_base_version)
            build_final_image --build-arg "TAG=${gitlab_base_version}${IMAGE_TAG_EXT:-}" \
                              --build-arg "GO_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-go:$(get_go_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "GITLAB_SHELL_VERSION=${GITLAB_SHELL_VERSION}" \
                              --build-arg "GITLAB_NAMESPACE=${GITLAB_NAMESPACE}" \
                              --build-arg "CI_API_V4_URL=${CI_API_V4_URL}" \
                              --build-arg "CACHE_BUSTER=${GITLAB_SHELL_VERSION}$(date -uI)" \
                              --build-arg "GITLAB_BASE_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-base:${gitlab_base_version}${IMAGE_TAG_EXT:-}" \
                              ${DEBIAN_BUILD_ARGS}
            push_tags "${GITLAB_SHELL_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-rails-ce)
            export GITLAB_VERSION=${GITLAB_VERSION/-ee/}
            export GITLAB_REF_SLUG=${GITLAB_REF_SLUG/-ee/}
            export GITLAB_ASSETS_TAG=${GITLAB_ASSETS_TAG/-ee/}
            export ASSETS_IMAGE="${ASSETS_IMAGE_REGISTRY_PREFIX}/${CE_PROJECT}/${ASSETS_IMAGE_PREFIX}-ce:${GITLAB_ASSETS_TAG}"
            (cd "$(get_trimmed_job_name)" && download_gitlab "$GITLAB_VERSION" "$CE_PROJECT")
            ruby_version=$(get_ruby_version)
            pg_image="${CI_REGISTRY_IMAGE}/postgresql:$(get_postgresql_version)"
            gm_image="${CI_REGISTRY_IMAGE}/gitlab-graphicsmagick:$(get_graphicsmagick_version)"
            exiftool_image="${CI_REGISTRY_IMAGE}/gitlab-exiftool:$(get_exiftool_version)"
            docker pull "$pg_image" > /dev/null || true
            build_final_image --build-arg "GITLAB_VERSION=${GITLAB_VERSION}" \
                              --build-arg "GITLAB_NAMESPACE=${GITLAB_NAMESPACE}" \
                              --build-arg "GITLAB_PROJECT=${CE_PROJECT}" \
                              --build-arg "CACHE_BUSTER=${GITLAB_VERSION}$(date -uI)" \
                              --build-arg "TAG=${ruby_version}${IMAGE_TAG_EXT:-}" \
                              --build-arg "PG_IMAGE=${pg_image}${IMAGE_TAG_EXT:-}" \
                              --build-arg "ASSETS_IMAGE=${ASSETS_IMAGE}" \
                              --build-arg "ASSETS_IMAGE_PLATFORM=${ASSETS_IMAGE_PLATFORM}" \
                              --build-arg "RUBY_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-ruby:${ruby_version}${IMAGE_TAG_EXT:-}" \
                              --build-arg "RUST_TAG=$(get_rust_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "GM_IMAGE=${gm_image}${IMAGE_TAG_EXT:-}" \
                              --build-arg "EXIFTOOL_IMAGE=${exiftool_image}${IMAGE_TAG_EXT:-}" \
                              --build-arg "RUBY_VERSION=${RUBY_VERSION}${IMAGE_TAG_EXT:-}"
            push_tags "${GITLAB_REF_SLUG}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-sidekiq-ce)
            export GITLAB_VERSION=${GITLAB_VERSION/-ee/}
            export GITLAB_REF_SLUG=${GITLAB_REF_SLUG/-ee/}
            python_version=$(get_python_version)
            cosign_image="${CI_REGISTRY_IMAGE}/gitlab-cosign:$(get_cosign_version)"
            build_final_image --build-arg "FROM_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-rails-ce" \
                              --build-arg "TAG=$(get_rails_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "PYTHON_TAG=${python_version}${IMAGE_TAG_EXT:-}" \
                              --build-arg "COSIGN_IMAGE=${cosign_image}${IMAGE_TAG_EXT:-}" \
                              --build-arg "GITLAB_VERSION=${GITLAB_VERSION}" \
                              --build-arg "RAILS_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-rails-ce:$(get_rails_version)${IMAGE_TAG_EXT:-}"
            push_tags "${GITLAB_REF_SLUG}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-toolbox-ce)
            export GITLAB_VERSION=${GITLAB_VERSION/-ee/}
            export GITLAB_REF_SLUG=${GITLAB_REF_SLUG/-ee/}
            rails_version=$(get_rails_version)
            build_final_image --build-arg "FROM_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-rails-ce" \
                              --build-arg "TAG=${rails_version}${IMAGE_TAG_EXT:-}" \
                              --build-arg "PYTHON_TAG=$(get_python_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "PYOPENSSL_VERSION=${PYOPENSSL_VERSION}" \
                              --build-arg "PYCA_CRYPTOGRAPHY_VERSION=${PYCA_CRYPTOGRAPHY_VERSION}" \
                              --build-arg "GITLAB_VERSION=${GITLAB_VERSION}" \
                              --build-arg "GITLAB_BASE_IMAGE=$(gitlab_base_image)" \
                              --build-arg "RAILS_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-rails-ce:${rails_version}${IMAGE_TAG_EXT:-}" \
                              --build-arg "GITALY_IMAGE=${CI_REGISTRY_IMAGE}/gitaly:$(get_gitaly_version)${IMAGE_TAG_EXT:-}"
            push_tags "${GITLAB_REF_SLUG}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-webservice-ce)
            export GITLAB_VERSION=${GITLAB_VERSION/-ee/}
            export GITLAB_REF_SLUG=${GITLAB_REF_SLUG/-ee/}
            rails_version=$(get_rails_version)
            build_final_image --build-arg "FROM_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-rails-ce" \
                              --build-arg "TAG=${rails_version}${IMAGE_TAG_EXT:-}" \
                              --build-arg "PYTHON_TAG=$(get_python_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "GITLAB_VERSION=${GITLAB_VERSION}" \
                              --build-arg "RAILS_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-rails-ce:${rails_version}${IMAGE_TAG_EXT:-}"
            push_tags "${GITLAB_REF_SLUG}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-workhorse-ce)
            export GITLAB_VERSION=${GITLAB_VERSION/-ee/}
            export GITLAB_REF_SLUG=${GITLAB_REF_SLUG/-ee/}
            build_final_image --build-arg "GO_TAG=$(get_go_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "TAG=$(get_gitlab_base_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "GITLAB_VERSION=${GITLAB_VERSION}" \
                              --build-arg "RAILS_VERSION=$(get_rails_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "GITLAB_EDITION=gitlab-rails-ce" \
                              --build-arg "EXIFTOOL_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-exiftool:$(get_exiftool_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "GITLAB_BASE_IMAGE=$(gitlab_base_image)"
            push_tags "${GITLAB_REF_SLUG}${IMAGE_TAG_EXT:-}"
            ;;
          gitaly-init-cgroups)
            build_final_image --build-arg "GITALY_IMAGE=${CI_REGISTRY_IMAGE}/gitaly:$(get_gitaly_version)${IMAGE_TAG_EXT:-}"
            push_tags "${GITALY_SERVER_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-agentk)
            build_final_image --build-arg "FROM_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-go" \
                              --build-arg "TAG=$(get_go_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "GITLAB_KAS_VERSION=${GITLAB_KAS_VERSION}" \
                              --build-arg "GITLAB_NAMESPACE=${GITLAB_NAMESPACE}" \
                              --build-arg "CI_API_V4_URL=${CI_API_V4_URL}" \
                              --build-arg "FETCH_ARTIFACTS_PAT=${FETCH_DEV_ARTIFACTS_PAT}" \
                              --build-arg "CACHE_BUSTER=${GITLAB_KAS_VERSION}$(date -uI)"
            push_tags "${GITLAB_KAS_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-openbao)
            gitlab_base_version=$(get_gitlab_base_version)
            REPO_TOKEN="${FETCH_DEV_ARTIFACTS_PAT}" \
            build_final_image --secret "id=repo_token,env=REPO_TOKEN" \
                              --build-arg "FROM_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-go" \
                              --build-arg "GO_TAG=$(get_go_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "OPENBAO_VERSION=${GITLAB_OPENBAO_VERSION}" \
                              --build-arg "OPENBAO_NAMESPACE=${OPENBAO_NAMESPACE}" \
                              --build-arg "CI_SERVER_FQDN=${CI_SERVER_FQDN}" \
                              --build-arg "GITLAB_BASE_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-base:${gitlab_base_version}${IMAGE_TAG_EXT:-}"
            push_tags "${GITLAB_OPENBAO_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-zoekt)
            gitlab_base_version=$(get_gitlab_base_version)
            build_final_image --build-arg "FROM_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-go" \
                              --build-arg "GO_TAG=$(get_go_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "TAG=${gitlab_base_version}${IMAGE_TAG_EXT:-}" \
                              --build-arg "GITLAB_ZOEKT_SHA=${GITLAB_ZOEKT_SHA}" \
                              --build-arg "GITLAB_BASE_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-base:${gitlab_base_version}${IMAGE_TAG_EXT:-}"
            push_tags "${GITLAB_ZOEKT_TAG}${IMAGE_TAG_EXT:-}"
            ;;
          gitlab-elasticsearch-indexer)
            build_final_image --build-arg "FROM_IMAGE=${CI_REGISTRY_IMAGE}/gitlab-go" \
                              --build-arg "TAG=$(get_go_version)${IMAGE_TAG_EXT:-}" \
                              --build-arg "GITLAB_ELASTICSEARCH_INDEXER_VERSION=${GITLAB_ELASTICSEARCH_INDEXER_VERSION}" \
                              --build-arg "GITLAB_NAMESPACE=${GITLAB_NAMESPACE}" \
                              --build-arg "CI_API_V4_URL=${CI_API_V4_URL}" \
                              --build-arg "FETCH_ARTIFACTS_PAT=${FETCH_DEV_ARTIFACTS_PAT}" \
                              --build-arg "CACHE_BUSTER=${GITLAB_ELASTICSEARCH_INDEXER_VERSION}$(date -uI)"
            push_tags "${GITLAB_ELASTICSEARCH_INDEXER_VERSION}${IMAGE_TAG_EXT:-}"
            ;;
          *)
            echo "Unknown image: $CI_JOB_NAME" >&2
            exit 1
            ;;
        esac

        if [ -f "artifacts/container_versions/${CI_JOB_NAME}_tag.txt" ]; then true; else
          echo -n "${CONTAINER_VERSION:-}" > "artifacts/container_versions/${CI_JOB_NAME}_tag.txt"
        fi
