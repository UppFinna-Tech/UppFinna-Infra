name: "AUR: Update meshmc"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v202604141638)"
        required: true

permissions: {}

jobs:
  update-aur:
    name: Update AUR Package
    runs-on: ubuntu-latest
    container: archlinux:latest@sha256:592e11bd99ab579f933a0cb77a8f66e2f3ae57f5eafacf13aea44a6e98ef21ae
    # AUR yayını AUR_SSH_PRIVATE_KEY zorunlu. Secret yoksa
    # job tamamen skip — workflow yine de "success" olur.
    if: ${{ github.event_name == 'workflow_dispatch' || vars.AUR_DEPLOY_ENABLED == 'true' || github.event_name == 'release' }}
    permissions:
      contents: write
    steps:
      - name: Check AUR deploy credentials
        id: creds
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "${AUR_SSH_PRIVATE_KEY:-}" ]]; then
            echo "::warning::AUR_SSH_PRIVATE_KEY is not set — AUR deploy will be skipped."
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.creds.outputs.has_key == 'true'
        run: pacman -Syu --noconfirm base-devel git openssh python curl

      - name: Checkout repository
        if: steps.creds.outputs.has_key == 'true'
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'
          ref: ${{ github.event.repository.default_branch || 'master' }}

      - name: Set release tag
        if: steps.creds.outputs.has_key == 'true'
        run: |
          TAG="${{ inputs.tag || github.event.release.tag_name }}"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Extract MeshMC version
        if: steps.creds.outputs.has_key == 'true'
        shell: bash
        run: |
          MAJOR=$(grep 'set(MeshMC_VERSION_MAJOR' CMakeLists.txt | sed 's/[^0-9]//g')
          MINOR=$(grep 'set(MeshMC_VERSION_MINOR' CMakeLists.txt | sed 's/[^0-9]//g')
          HOTFIX=$(grep 'set(MeshMC_VERSION_HOTFIX' CMakeLists.txt | sed 's/[^0-9]//g')
          echo "PKGVER=${MAJOR}.${MINOR}.${HOTFIX}" >> "$GITHUB_ENV"

      - name: Download tarball and compute b2sum
        if: steps.creds.outputs.has_key == 'true'
        shell: bash
        run: |
          TARBALL_URL="https://ftp.projecttick.org/Project-Tick/meshmc/releases/download/${TAG}/meshmc-${TAG}.tar.gz"
          curl -fSL -o /tmp/meshmc-tarball.tar.gz "${TARBALL_URL}"
          B2SUM=$(b2sum /tmp/meshmc-tarball.tar.gz | awk '{print $1}')
          echo "TARBALL_B2SUM=${B2SUM}" >> "$GITHUB_ENV"
          rm /tmp/meshmc-tarball.tar.gz

      - name: Update PKGBUILD
        if: steps.creds.outputs.has_key == 'true'
        shell: bash
        working-directory: Packaging/os-specific/linux/distro-specific/pacman
        run: |
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" PKGBUILD
          sed -i "s/^pkgsnapshot=.*/pkgsnapshot=${TAG}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # Update the tarball b2sum (first entry in the array)
          python3 << 'PYEOF'
          import re, os

          new_hash = os.environ["TARBALL_B2SUM"]
          with open("PKGBUILD") as f:
              content = f.read()

          content = re.sub(
              r"(b2sums=\(')[a-f0-9]+(')",
              rf"\g<1>{new_hash}\2",
              content,
              count=1,
          )

          with open("PKGBUILD", "w") as f:
              f.write(content)
          PYEOF

          echo "=== Updated PKGBUILD ==="
          head -6 PKGBUILD
          echo "..."
          grep -A4 '^b2sums' PKGBUILD

      - name: Generate .SRCINFO
        if: steps.creds.outputs.has_key == 'true'
        working-directory: Packaging/os-specific/linux/distro-specific/pacman
        run: |
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg --printsrcinfo > .SRCINFO"

      - name: Deploy to AUR
        if: steps.creds.outputs.has_key == 'true'
        working-directory: Packaging/os-specific/linux/distro-specific/pacman
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p /root/.ssh
          chmod 700 /root/.ssh
          echo "${AUR_SSH_PRIVATE_KEY}" > /root/.ssh/aur
          chmod 600 /root/.ssh/aur

          cat >> /root/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile /root/.ssh/aur
            User aur
            StrictHostKeyChecking accept-new
          EOF

          git config --global user.name "Mehmet Samet Duman"
          git config --global user.email "yongdohyun@projecttick.org"

          git clone ssh://aur@aur.archlinux.org/meshmc.git /tmp/aur-meshmc
          cp PKGBUILD .SRCINFO *.license /tmp/aur-meshmc/

          cd /tmp/aur-meshmc
          git add -A
          git diff --cached --quiet || git commit -m "Update to ${TAG} (${PKGVER})"
          git push

          rm -f /root/.ssh/aur
