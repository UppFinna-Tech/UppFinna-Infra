# Fast lint & commit checks — called from ci.yml before builds start.

name: "Lint & Checks"

on:
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      run-level:
        description: "minimal | standard | full"
        required: true
        type: string
      changed-projects:
        description: "Comma-separated list of changed projects"
        required: false
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""

permissions:
  contents: read

jobs:
  # reuse:
  #   name: "REUSE Compliance"
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Harden runner
  #       uses: step-security/harden-runner@v2
  #       with:
  #         egress-policy: audit

  #     - name: Checkout repository
  #       uses: Project-Tick-Infrastructure/checkout@v2
  #       with:
  #         source-repository: ${{ inputs.source-repository || '' }}
  #         show-progress: 'false'

  #     - name: Check REUSE compliance
  #       uses: fsfe/reuse-action@v6
  whitespace:
    name: "Whitespace"
    runs-on: ubuntu-latest
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'

      - name: Check trailing whitespace
        run: |
          set -euo pipefail
          ERRORS=$(git diff --check HEAD~1 HEAD -- \
            ':!*.patch' \
            ':!*/test/data/*' \
            ':!*.ico' \
            ':!*.png' \
            ':!*.jpg' \
            ':!*.gif' \
            ':!*.bin' \
            ':!*.7z' \
            ':!*.zip' \
            ':!*.gz' \
            ':!*.lock' \
            2>/dev/null || true)
          if [[ -n "$ERRORS" ]]; then
            echo "::warning::Whitespace issues found:"
            echo "$ERRORS"
          fi
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
