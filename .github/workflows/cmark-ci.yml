name: "cmark: CI"

on:
  workflow_dispatch:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'
      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy
      - name: lint with clang-tidy
        working-directory: ${{ inputs.source-repository != '' && '.' || 'cmark' }}
        run: make lint
        env:
          CC: clang
          CXX: clang++
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}

  posix:
    strategy:
      fail-fast: false
      matrix:
        os: [linux, macos]
        cc: [clang, gcc]
        build_type: [shared, static]
        sanitizers: ['', ASan]
        include:
          - os: 'linux'
            image: 'ubuntu-latest'
          - os: 'macos'
            image: 'macos-latest'
          - cc: 'clang'
            cxx: 'clang++'
          - cc: 'gcc'
            cxx: 'g++'
          - build_type: 'shared'
            cmake_shared: 'YES'
          - build_type: 'static'
            cmake_shared: 'NO'
          - sanitizers: 'ASan'
            san_cflags: '-fsanitize=address,undefined -fno-sanitize-recover=all'
          - sanitizers: 'ASan'
            os: 'linux'
            cc: 'gcc'
            build_type: 'shared'
            test_env: 'LD_PRELOAD=$(gcc -print-file-name=libasan.so)'
          - sanitizers: 'ASan'
            os: 'linux'
            cc: 'clang'
            build_type: 'shared'
            asan_cflags: '-shared-libasan'
            test_env: 'LD_PRELOAD=$(clang -print-file-name=libclang_rt.asan-x86_64.so)'
          - sanitizers: 'ASan'
            build_type: 'shared'
            asan_opts: 'detect_leaks=0'
          - sanitizers: 'ASan'
            cc: 'gcc'
            build_type: 'static'
            asan_cflags: '-static-libasan'
        exclude:
          - os: 'macos'
            cc: 'gcc'
          - os: 'macos'
            sanitizers: 'ASan'
            build_type: 'shared'

    runs-on: ${{ matrix.image }}

    env:
      ASAN_OPTIONS: ${{ matrix.asan_opts }}
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
      CFLAGS: '${{ matrix.san_cflags }} ${{ matrix.asan_cflags }}'
      CXXFLAGS: '${{ matrix.san_cflags }} ${{ matrix.asan_cflags }}'

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'
      - name: Build and test
        working-directory: ${{ inputs.source-repository != '' && '.' || 'cmark' }}
        env:
          QUARANTINE_REGEX: ${{ steps.exclude.outputs.ctest_regex }}
        run: |
          cmake \
            -DBUILD_SHARED_LIBS=${{ matrix.cmake_shared }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -S . -B build
          cmake --build build
          ctest_args=( --test-dir build --output-on-failure --output-junit junit-cmark.xml )
          if [[ -n "${QUARANTINE_REGEX:-}" ]]; then
            echo "::notice::Excluding quarantined tests: $QUARANTINE_REGEX"
            ctest_args+=( -E "$QUARANTINE_REGEX" )
          fi
          ${{ matrix.test_env }} ctest "${ctest_args[@]}"
      - name: Foreman JUnit upload
        if: always() && inputs.foreman-callback-url != ''
        uses: Project-Tick/Project-Tick/.github/actions/foreman-junit-upload@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:   ${{ inputs.foreman-callback-url }}
          callback_token: ${{ inputs.foreman-callback-token }}
          pipeline_id:    ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name: cmark-posix-${{ matrix.os }}-${{ matrix.cc }}-${{ matrix.build_type }}
          junit_path: ${{ inputs.source-repository != '' && '.' || 'cmark' }}/build/junit-cmark.xml
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}

  windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [shared, static]
        include:
          - build_type: 'shared'
            cmake_shared: 'YES'
          - build_type: 'static'
            cmake_shared: 'NO'
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'
      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
      - name: Build and test
        working-directory: ${{ inputs.source-repository != '' && '.' || 'cmark' }}
        env:
          QUARANTINE_REGEX: ${{ steps.exclude.outputs.ctest_regex }}
        shell: bash
        run: |
          cmake \
              -DBUILD_SHARED_LIBS=${{ matrix.cmake_shared }} \
              -DCMAKE_BUILD_TYPE=Debug \
              -S . -B build
          cmake --build build
          ctest_args=( --test-dir build -C Debug --output-on-failure --output-junit junit-cmark.xml )
          if [[ -n "${QUARANTINE_REGEX:-}" ]]; then
            echo "::notice::Excluding quarantined tests: $QUARANTINE_REGEX"
            ctest_args+=( -E "$QUARANTINE_REGEX" )
          fi
          ctest "${ctest_args[@]}"
      - name: Foreman JUnit upload
        if: always() && inputs.foreman-callback-url != ''
        uses: Project-Tick/Project-Tick/.github/actions/foreman-junit-upload@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:   ${{ inputs.foreman-callback-url }}
          callback_token: ${{ inputs.foreman-callback-token }}
          pipeline_id:    ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name: cmark-windows-${{ matrix.build_type }}
          junit_path: ${{ inputs.source-repository != '' && '.' || 'cmark' }}/build/junit-cmark.xml
      - name: Upload artifact
        if: ${{ matrix.build_type == 'static' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: cmark windows ${{ matrix.build_type }}
          path: cmark/build/src/Debug/cmark.exe
          if-no-files-found: error
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
