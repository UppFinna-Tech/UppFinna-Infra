name: foreman-2.0 CI

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  REGISTRY: registry.projecttick.org

jobs:
  rspec:
    name: RSpec + config validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: foreman_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/foreman_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/foreman_test
      REDIS_URL: redis://localhost:6379/0
      BUNDLE_PATH: vendor/bundle

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Validate repo_registry.yml
        run: |
          bundle exec ruby -r yaml -r json -e '
            data = YAML.safe_load_file("config/repo_registry.yml")
            repos = data["repos"] || []
            raise "no repos defined" if repos.empty?
            names = repos.map { |r| r["name"] }
            dupes = names.tally.select { |_, c| c > 1 }.keys
            raise "duplicate repo names: #{dupes}" if dupes.any?
            allowed_caps = %w[amalgam codeql container coverity docs fuzz nix]
            allowed_events = %w[mr push tag]
            repos.each do |r|
              raise "missing name" if r["name"].to_s.empty?
              raise "missing paths for #{r["name"]}" if Array(r["paths"]).empty?
              caps = Array(r["capabilities"])
              extra = caps - allowed_caps
              raise "unknown capabilities for #{r["name"]}: #{extra}" if extra.any?
              evt = Array(r.fetch("event_types", %w[mr push])) - allowed_events
              raise "unknown event_types for #{r["name"]}: #{evt}" if evt.any?
            end
            puts "repo_registry.yml OK (#{repos.size} repos)"
          '

      - name: Validate labeler.yml
        run: |
          bundle exec ruby -r yaml -e '
            data = YAML.safe_load_file("config/labeler.yml") || {}
            raise "no labels defined" if data.empty?
            data.each do |label, rules|
              Array(rules).each do |rule|
                Array(rule["any"]).each do |cond|
                  globs = cond.dig("changed-files")
                  raise "rule under #{label} missing globs" if globs.nil?
                end
              end
            end
            puts "labeler.yml OK (#{data.size} labels)"
          '

      - name: Database setup
        run: bin/rails db:prepare

      - name: Run RSpec
        run: bundle exec rspec --format documentation

      - name: Boot smoke check
        run: bundle exec rails runner "puts 'booted ' + Rails.application.class.name"
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}

  lint:
    name: Lint (rubocop optional, syntax check)
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Ruby syntax check on app/, lib/, spec/, config/
        run: |
          set -e
          fail=0
          for f in $(find app lib spec config -name '*.rb'); do
            ruby -c "$f" >/dev/null || fail=1
          done
          exit $fail
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}

  build:
    name: Build & push ${{ matrix.image.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        image:
          # Each microservice is its own image under the foreman project's
          # GitLab Container Registry path
          # (registry.projecttick.org/project-tick/infra/foreman/<name>).
          # GitLab registry requires the path to live under a real project,
          # so the repo is the project path + a per-image sub-path; the
          # sub-paths are auto-created on first push.
          #   * web-ce / web-ee — Puma + Ruby app (CE strips ee/, EE ships it),
          #     built from Dockerfile.web via --target.
          #   * proxy  — Anubis WAF, built from our anubis/ source.
          #   * gitaly — Gitaly gRPC backend, built from our gitaly/ source.
          #   * docs   — Hugo docs site, built from our own source (no upstream image).
          - name: web-ce
            repo: project-tick/infra/foreman/web-ce
            dockerfile: ./Dockerfile.web
            target: ce
          - name: web-ee
            repo: project-tick/infra/foreman/web-ee
            dockerfile: ./Dockerfile.web
            target: ee
          - name: proxy
            repo: project-tick/infra/foreman/proxy
            dockerfile: ./Dockerfile.proxy
            target: runtime
          - name: gitaly
            repo: project-tick/infra/foreman/gitaly
            dockerfile: ./Dockerfile.gitaly
            target: runtime
          - name: docs
            repo: project-tick/infra/foreman/docs
            dockerfile: ./Dockerfile.docs
            target: runtime

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}-${{ matrix.image.name }}
          plan_json:         ${{ inputs.foreman-plan }}

      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Compute image tags
        id: tags
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ matrix.image.repo }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          version="$(cat VERSION 2>/dev/null | tr -d '[:space:]')"
          latest="${{ github.ref == 'refs/heads/master' }}"
          {
            echo "image=${IMAGE}"
            echo "sha_tag=sha-${short_sha}"
            echo "version_tag=${version:-0.0.0}"
            echo "latest_enable=${latest}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          target: ${{ matrix.image.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.version_tag }}
            ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_enable == 'true' && format('{0}:latest', steps.tags.outputs.image) || '' }}
          cache-from: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache
          cache-to: type=registry,ref=${{ steps.tags.outputs.image }}:buildcache,mode=max

      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}-${{ matrix.image.name }}
          job_status:        ${{ job.status }}

  helm:
    name: Helm chart (lint, package, push OCI)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [build]

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}

      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Add chart dependency repos
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

      - name: Build chart dependencies
        working-directory: deploy/helm/foreman
        run: helm dependency build

      - name: Lint chart
        working-directory: deploy/helm
        run: helm lint ./foreman

      - name: Render chart (template smoke test)
        working-directory: deploy/helm
        run: |
          helm template foreman ./foreman > /dev/null
          helm template foreman ./foreman --set image.edition=ce > /dev/null

      - name: Package chart
        id: pkg
        working-directory: deploy/helm
        run: |
          set -euo pipefail
          helm package ./foreman --destination /tmp/helm-out
          pkg="$(ls /tmp/helm-out/foreman-*.tgz)"
          echo "package=${pkg}" >> "$GITHUB_OUTPUT"
          echo "Packaged: ${pkg}"

      # Push the chart to the OCI registry only on master. PR/branch runs stop
      # at lint + package so a broken chart never reaches the registry.
      - name: Login to registry (OCI)
        if: github.ref == 'refs/heads/master'
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | \
            helm registry login "${REGISTRY}" \
              --username "${{ secrets.REGISTRY_USERNAME }}" \
              --password-stdin

      - name: Push chart (OCI)
        if: github.ref == 'refs/heads/master'
        run: |
          helm push "${{ steps.pkg.outputs.package }}" \
            "oci://${REGISTRY}/project-tick/infra/foreman/charts"

      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
