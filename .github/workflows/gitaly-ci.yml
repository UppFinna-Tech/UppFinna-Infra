name: "Uppfinna Forge: Gitaly CI"

# Faithful port of gitaly/.gitlab-ci.yml (build / test / lint) onto the
# Foreman-orchestrated GitHub Actions pattern. Dispatched by Foreman on a
# push / MR to the Gitaly source project.
#
# Orchestration (kept identical to uppfinna-ci.yml): a `callback-start`
# job registers the run with Foreman and reports the run URL; every build
# / test / lint job reports per-job status through the
# foreman-job-wrapper / foreman-job-finalize composite actions; a final
# `verdict` job aggregates the result and reports it back to Foreman.
#
# The job bodies below are a 1:1 port of the component's real
# `.gitlab-ci.yml` job scripts, NOT a simplified stand-in:
#   - the same gitlab-build-images debian+go+rust image the component pins
#     (default: image, git-2.51),
#   - tests run UNPRIVILEGED via `setpriv` as TEST_UID because the source
#     tree is owned by root (this is what catches permission-bit
#     regressions upstream relies on),
#   - the same GOFLAGS / GOCACHE / GOMODCACHE / intercepted-HOME env,
#   - the same TEST_TARGET matrix (test / test-with-praefect / race-go /
#     test-with-git-master / test-with-git-prev),
#   - `make test-gitaly-linters` + `make test-mod-validator` run as the
#     last steps of the test script exactly as upstream does.
#
# GHA adaptation (documented, unavoidable): upstream's before_script does
# `mount none -t tmpfs` on TEST_TMP_DIR, which requires a `--privileged`
# container GitHub-hosted runners do not grant. TEST_TMP_DIR stays `/tmp`
# (already the upstream value) and the tmpfs mount is skipped; tests still
# run in /tmp, only without the tmpfs speed-up. Nothing else changes.

# `workflow_dispatch.inputs` MUST be a superset of every key Foreman's
# dispatcher sends, or GitHub rejects the whole dispatch with 422
# "Unexpected inputs provided" and the Foreman pipeline is stuck `pending`.
# This is the same generic contract the working ci.yml declares.
on:
  workflow_call:
    inputs:
      force-all: { type: string, default: "" }
      build-type: { type: string, default: "" }
      source-repository: { type: string, default: "" }
      source-ref: { type: string, default: "" }
      event-name: { type: string, default: "" }
      event-actor: { type: string, default: "" }
      source-sha: { type: string, default: "" }
      before-sha: { type: string, default: "" }
      head-ref: { type: string, default: "" }
      base-ref: { type: string, default: "" }
      pr-number: { type: string, default: "" }
      pr-base-sha: { type: string, default: "" }
      pr-head-sha: { type: string, default: "" }
      pr-title: { type: string, default: "" }
      pr-draft: { type: string, default: "" }
      callback_url: { type: string, default: "" }
      callback_token: { type: string, default: "" }
      foreman-plan: { type: string, default: "" }
      foreman-pipeline-id: { type: string, default: "" }
      foreman-callback-url: { type: string, default: "" }
      foreman-callback-token: { type: string, default: "" }
  workflow_dispatch:
    inputs:
      force-all: { type: string, default: "" }
      build-type: { type: string, default: "" }
      source-repository: { type: string, default: "" }
      source-ref: { type: string, default: "" }
      event-name: { type: string, default: "" }
      event-actor: { type: string, default: "" }
      source-sha: { type: string, default: "" }
      before-sha: { type: string, default: "" }
      head-ref: { type: string, default: "" }
      base-ref: { type: string, default: "" }
      pr-number: { type: string, default: "" }
      pr-base-sha: { type: string, default: "" }
      pr-head-sha: { type: string, default: "" }
      pr-title: { type: string, default: "" }
      pr-draft: { type: string, default: "" }
      callback_url: { type: string, default: "" }
      callback_token: { type: string, default: "" }
      foreman-plan: { type: string, default: "" }
      foreman-pipeline-id: { type: string, default: "" }
      foreman-callback-url: { type: string, default: "" }
      foreman-callback-token: { type: string, default: "" }

permissions: {}

env:
  # Mirrors gitaly `.versions` + `default.image`: debian bookworm, go 1.25,
  # rust 1.73, git 2.51.
  CI_IMAGE: "registry.gitlab.com/gitlab-org/gitlab-build-images/debian-bookworm-golang-1.25-rust-1.73:git-2.51"
  # Mirrors gitaly global `variables:`.
  GIT_VERSION: "default"
  TEST_UID: "9999"
  GOFLAGS: "-buildvcs=false -modcacherw"
  GITALY_TESTING_INTERCEPT_HOME: "YesPlease"
  TEST_TMP_DIR: "/tmp"
  TEST_OPTIONS: "-count=1 -timeout=20m"
  TEST_WITH_COVERAGE: "YesPlease"

jobs:
  callback-start:
    name: "Callback Start"
    runs-on: ubuntu-latest
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      cb_auth: ${{ steps.prepare.outputs.cb_auth }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    permissions: {}
    steps:
      - name: Prepare callback destination
        id: prepare
        shell: bash
        env:
          # Foreman dispatches snake_case callback_url / callback_token today
          # (kebab foreman-* only when FF foreman_plan_dispatch_inject is on).
          # Prefer snake, fall back to kebab.
          INPUT_PIPELINE_ID: ${{ inputs.foreman-pipeline-id || '' }}
          INPUT_CALLBACK_URL: ${{ inputs.callback_url || inputs.foreman-callback-url || '' }}
          INPUT_CALLBACK_TOKEN: ${{ inputs.callback_token || inputs.foreman-callback-token || '' }}
          FOREMAN_BASE_URL: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          FOREMAN_API_TOKEN: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_REPOSITORY: ${{ inputs.source-repository || '' }}
          REF: ${{ inputs.source-ref || github.ref }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          callback_url=""
          callback_token=""
          pipeline_id=""

          if [[ -n "$INPUT_CALLBACK_URL" && -n "$INPUT_CALLBACK_TOKEN" ]]; then
            callback_url="$INPUT_CALLBACK_URL"
            callback_token="$INPUT_CALLBACK_TOKEN"
            pipeline_id="$INPUT_PIPELINE_ID"
          elif [[ -n "$FOREMAN_API_TOKEN" ]]; then
            if [[ -n "$SOURCE_REPOSITORY" ]]; then
              app_id="$(basename "$SOURCE_REPOSITORY" .git)"
              repo="$SOURCE_REPOSITORY"
            else
              app_id="${REPOSITORY#*/}"
              repo="$REPOSITORY"
            fi

            payload="$(jq -nc \
              --arg app_id "$app_id" \
              --arg repo "$repo" \
              --arg ref "$REF" \
              --arg sha "$SHA" \
              '{
                app_id: $app_id,
                params: {
                  repo: $repo,
                  ref: $ref,
                  sha: $sha,
                  native_github_ci: "true",
                  pipeline_kind: "uppfinna-gitaly"
                }
              }')"

            if register_response="$(curl \
              --silent --show-error --fail \
              --retry 3 --retry-all-errors \
              --request POST \
              --header "Authorization: Bearer $FOREMAN_API_TOKEN" \
              --header "Content-Type: application/json" \
              --data "$payload" \
              "${FOREMAN_BASE_URL%/}/api/pipelines/external")"; then
              callback_url="$(printf '%s' "$register_response" | jq -r '.callback_url // ""')"
              callback_token="$(printf '%s' "$register_response" | jq -r '.callback_token // ""')"
              pipeline_id="$(printf '%s' "$register_response" | jq -r '.pipeline_id // ""')"
            else
              echo "::warning::Failed to register this Gitaly run in Foreman."
            fi
          else
            echo "No Foreman callback destination configured."
          fi

          if [[ -z "$pipeline_id" && -n "$callback_url" ]]; then
            pipeline_id="$(printf '%s' "$callback_url" | sed -nE 's#^.*/api/pipelines/([0-9a-fA-F-]+)/callback/?$#\1#p')"
          fi

          {
            echo "callback_url=$callback_url"
            echo "cb_auth=$callback_token"
            echo "pipeline_id=$pipeline_id"
          } >> "$GITHUB_OUTPUT"

      - name: Report workflow run URL
        if: steps.prepare.outputs.callback_url != '' && steps.prepare.outputs.cb_auth != ''
        shell: bash
        env:
          CALLBACK_URL: ${{ steps.prepare.outputs.callback_url }}
          CALLBACK_TOKEN: ${{ steps.prepare.outputs.cb_auth }}
          RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
        run: |
          set -euo pipefail
          payload="$(printf '{"log_url":"%s"}' "$RUN_URL")"
          curl \
            --silent --show-error \
            --retry 3 --retry-all-errors --max-time 15 \
            --request POST \
            --header "Authorization: Bearer $CALLBACK_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$payload" \
            "${CALLBACK_URL%/}/log_url" \
            || echo "::warning::log_url callback failed (non-fatal)"

  build:
    name: "build (git ${{ matrix.git_version }})"
    needs: callback-start
    runs-on: ubuntu-24.04
    container:
      image: registry.gitlab.com/gitlab-org/gitlab-build-images/debian-bookworm-golang-1.25-rust-1.73:git-2.51@sha256:a7257b6e904d1026254dc54e6a20fe56f6792709ded6b5a82f8d476b114770be
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Upstream build matrix: default (bundled) git only.
          - { git_version: "default", test_boot_args: "--bundled-git", binary_size_checker_args: "--binary-size-threshold 375" }
    env:
      GITLAB_DIR: ${{ inputs.source-repository != '' && '.' || 'gitaly' }}
      GIT_VERSION: ${{ matrix.git_version }}
      TEST_BOOT_ARGS: ${{ matrix.test_boot_args }}
      BINARY_SIZE_CHECKER_ARGS: ${{ matrix.binary_size_checker_args }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.GITLAB_DIR }}
    steps:
      - name: Install jq (container images lack it)
        shell: bash
        run: command -v jq >/dev/null 2>&1 || { apt-get update -qq && apt-get install -y --no-install-recommends jq; }

      - name: Foreman job init
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ needs.callback-start.outputs.callback_url }}
          callback_token:    ${{ needs.callback-start.outputs.cb_auth }}
          pipeline_id:       ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          build
          plan_json:         ${{ inputs.foreman-plan }}

      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Cache Go build/mod (_build/cache)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.GITLAB_DIR }}/_build/cache
          key: gitaly-gocache-${{ runner.os }}-${{ hashFiles(format('{0}/go.sum', env.GITLAB_DIR)) }}
          restore-keys: |
            gitaly-gocache-${{ runner.os }}-

      # Faithful port of gitaly `build:` script. Binaries are built as the
      # unprivileged TEST_UID so the cache is reusable by the (also
      # unprivileged) test targets. GOCACHE/GOMODCACHE point inside _build
      # so they are owned by the same uid after chown.
      - name: Build (unprivileged)
        run: |
          set -euo pipefail
          export GOCACHE="${PWD}/_build/cache/go-build"
          export GOMODCACHE="${PWD}/_build/cache/go-mod"
          go version
          mkdir -p _build
          go mod download -modcacherw
          chown -R "${TEST_UID}:${TEST_UID}" _build
          setpriv --reuid="${TEST_UID}" --regid="${TEST_UID}" --clear-groups --no-new-privs \
            env HOME=/tmp/home GOCACHE="$GOCACHE" GOMODCACHE="$GOMODCACHE" \
            make build "$(test "${GIT_VERSION}" = default && echo build-bundled-git || echo build-git)"
          go run ./tools/test-boot ${TEST_BOOT_ARGS}
          go run ./tools/binary-size-checker ${BINARY_SIZE_CHECKER_ARGS}

      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ needs.callback-start.outputs.callback_url }}
          callback_token:    ${{ needs.callback-start.outputs.cb_auth }}
          pipeline_id:       ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          build
          job_status:        ${{ job.status }}

  test:
    name: "${{ matrix.job_name }}"
    needs: callback-start
    runs-on: ubuntu-24.04
    container:
      image: registry.gitlab.com/gitlab-org/gitlab-build-images/debian-bookworm-golang-1.25-rust-1.73:git-2.51@sha256:a7257b6e904d1026254dc54e6a20fe56f6792709ded6b5a82f8d476b114770be
    permissions:
      contents: read
    services:
      # Mirrors the `.test_template` service: postgres with raised
      # max_connections + shared_buffers.
      postgres:
        image: postgres:${{ matrix.postgres_version }}
        env:
          POSTGRES_DB: praefect_test
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
    strategy:
      fail-fast: false
      matrix:
        include:
          # Default Git (bundled), default postgres — the four TEST_TARGETs
          # upstream runs against the default toolchain.
          - { job_name: "test",                 test_target: test,               postgres_version: "17-alpine" }
          - { job_name: "test-with-praefect",   test_target: test-with-praefect, postgres_version: "17-alpine" }
          - { job_name: "race-go",              test_target: race-go,            postgres_version: "17-alpine" }
          - { job_name: "test-with-git-master", test_target: test-with-git-master, postgres_version: "17-alpine" }
          - { job_name: "test-with-git-prev",   test_target: test-with-git-prev, postgres_version: "17-alpine" }
          # Minimum supported postgres, exercised against test + praefect.
          - { job_name: "test pg14",              test_target: test,               postgres_version: "14-alpine" }
          - { job_name: "test-with-praefect pg14", test_target: test-with-praefect, postgres_version: "14-alpine" }
    env:
      GITLAB_DIR: ${{ inputs.source-repository != '' && '.' || 'gitaly' }}
      TEST_TARGET: ${{ matrix.test_target }}
      # Mirrors `.test_variables`.
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      POSTGRES_DB: praefect_test
      POSTGRES_HOST_AUTH_METHOD: trust
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.GITLAB_DIR }}
    steps:
      - name: Install jq (container images lack it)
        shell: bash
        run: command -v jq >/dev/null 2>&1 || { apt-get update -qq && apt-get install -y --no-install-recommends jq; }

      - name: Foreman job init
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ needs.callback-start.outputs.callback_url }}
          callback_token:    ${{ needs.callback-start.outputs.cb_auth }}
          pipeline_id:       ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ matrix.job_name }}
          plan_json:         ${{ inputs.foreman-plan }}

      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Cache Go build/mod (_build/cache)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.GITLAB_DIR }}/_build/cache
          key: gitaly-gocache-${{ runner.os }}-${{ hashFiles(format('{0}/go.sum', env.GITLAB_DIR)) }}
          restore-keys: |
            gitaly-gocache-${{ runner.os }}-

      # Faithful port of the `.test_template` before_script. The upstream
      # tmpfs mount of TEST_TMP_DIR needs a --privileged container that
      # GitHub-hosted runners do not provide, so it is skipped; TEST_TMP_DIR
      # stays /tmp and tests still run there, just without the tmpfs speed-up.
      - name: Prepare test tmp dir
        run: |
          set -euo pipefail
          chmod 1777 "${TEST_TMP_DIR}" || true
          go version

      # Faithful port of the `.test_template` script: build dir created +
      # deps downloaded as root, then chowned to TEST_UID, then the actual
      # test target runs unprivileged. Tool tests (linters / mod-validator)
      # run privileged afterwards, exactly as upstream.
      - name: Run tests (unprivileged)
        run: |
          set -euo pipefail
          export GOCACHE="${PWD}/_build/cache/go-build"
          export GOMODCACHE="${PWD}/_build/cache/go-mod"
          mkdir -p _build
          go mod download -modcacherw
          chown -R "${TEST_UID}:${TEST_UID}" _build
          setpriv --reuid="${TEST_UID}" --regid="${TEST_UID}" --clear-groups --no-new-privs \
            env HOME=/tmp/home GOCACHE="$GOCACHE" GOMODCACHE="$GOMODCACHE" \
            PGHOST="$PGHOST" PGPORT="$PGPORT" PGUSER="$PGUSER" \
            make "${TEST_TARGET}"

      - name: Run tool tests (linters + mod validator)
        run: |
          set -euo pipefail
          make test-gitaly-linters
          make test-mod-validator

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gitaly-test-reports-${{ strategy.job-index }}
          path: |
            ${{ env.GITLAB_DIR }}/_build/reports/
          if-no-files-found: ignore
          retention-days: 31

      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ needs.callback-start.outputs.callback_url }}
          callback_token:    ${{ needs.callback-start.outputs.cb_auth }}
          pipeline_id:       ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ matrix.job_name }}
          job_status:        ${{ job.status }}

  verify:
    name: "Verify (docs + log fields + dbschema)"
    needs: callback-start
    runs-on: ubuntu-24.04
    container:
      image: registry.gitlab.com/gitlab-org/gitlab-build-images/debian-bookworm-golang-1.25-rust-1.73:git-2.51@sha256:a7257b6e904d1026254dc54e6a20fe56f6792709ded6b5a82f8d476b114770be
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: praefect_test
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
    env:
      GITLAB_DIR: ${{ inputs.source-repository != '' && '.' || 'gitaly' }}
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      POSTGRES_DB: praefect_test
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.GITLAB_DIR }}
    steps:
      - name: Install jq (container images lack it)
        shell: bash
        run: command -v jq >/dev/null 2>&1 || { apt-get update -qq && apt-get install -y --no-install-recommends jq; }

      - name: Foreman job init
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ needs.callback-start.outputs.callback_url }}
          callback_token:    ${{ needs.callback-start.outputs.cb_auth }}
          pipeline_id:       ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          verify
          plan_json:         ${{ inputs.foreman-plan }}

      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Cache Go build/mod (_build/cache)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.GITLAB_DIR }}/_build/cache
          key: gitaly-gocache-${{ runner.os }}-${{ hashFiles(format('{0}/go.sum', env.GITLAB_DIR)) }}
          restore-keys: |
            gitaly-gocache-${{ runner.os }}-

      # Port of the `verify:` / `logging-field-validator:` / `dbschema:`
      # jobs' scripts (documentation, log-field validation, and the
      # database schema dump check).
      - name: Verify docs
        run: |
          set -euo pipefail
          export GOCACHE="${PWD}/_build/cache/go-build"
          export GOMODCACHE="${PWD}/_build/cache/go-mod"
          make lint-docs
          make build-proto-docs

      - name: Validate log fields
        run: make validate-log-fields

      - name: Check database schema
        run: make dump-database-schema

      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ needs.callback-start.outputs.callback_url }}
          callback_token:    ${{ needs.callback-start.outputs.cb_auth }}
          pipeline_id:       ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          verify
          job_status:        ${{ job.status }}

  verdict:
    name: "Gitaly Verdict"
    if: always()
    needs:
      - callback-start
      - build
      - test
      - verify
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Resolve final status
        id: resolve
        if: always()
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "=== Gitaly job results ==="
          jq -r 'to_entries[] | select(.key != "callback-start") | "\(.value.result)\t\(.key)"' <<< "$NEEDS_JSON"

      - name: Report final Gitaly status to Foreman
        if: always()
        shell: bash
        env:
          PIPELINE_ID: ${{ needs.callback-start.outputs.pipeline_id }}
          FOREMAN_BASE_URL: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          FOREMAN_API_TOKEN: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          PIPELINE_STATUS: ${{ steps.resolve.outputs.status || 'failure' }}
        run: |
          set -euo pipefail
          if [[ -z "$PIPELINE_ID" || -z "$FOREMAN_API_TOKEN" ]]; then
            echo "Callback pipeline/admin token missing; skipping status report."
            exit 0
          fi
          payload="$(printf '{"status":"%s"}' "$PIPELINE_STATUS")"
          curl \
            --silent --show-error \
            --retry 3 --retry-all-errors --max-time 15 \
            --request POST \
            --header "Authorization: Bearer $FOREMAN_API_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$payload" \
            "${FOREMAN_BASE_URL%/}/api/pipelines/${PIPELINE_ID}/admin-callback/status" \
            || echo "::warning::Final status callback failed (non-fatal)"

      - name: Enforce verdict
        if: always()
        shell: bash
        env:
          PIPELINE_STATUS: ${{ steps.resolve.outputs.status }}
        run: |
          set -euo pipefail
          if [ "$PIPELINE_STATUS" != "success" ]; then
            echo "Gitaly pipeline ${PIPELINE_STATUS}."
            exit 1
          fi
          echo "Gitaly pipeline passed."
