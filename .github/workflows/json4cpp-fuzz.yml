name: "json4cpp: Fuzz"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""

permissions:
  contents: read

jobs:
  fuzzing:
    name: Fuzzing
    runs-on: ubuntu-22.04
    steps:
    - name: Start log collector
      if: inputs.foreman-pipeline-id != ''
      uses: Project-Tick/Project-Tick/.github/actions/log-collector@master
      with:
        pipeline_id: ${{ inputs.foreman-pipeline-id }}
        foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
        job_name: ${{ github.job }}
    - name: Harden Runner
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit

    - name: Checkout repository
      uses: Project-Tick-Infrastructure/checkout@v2
      with:
        source-repository: ${{ inputs.source-repository || '' }}
        show-progress: 'false'

    - name: Build Fuzzers
      id: build
      uses: google/oss-fuzz/infra/cifuzz/actions/build_fuzzers@master
      with:
        dry-run: false
        language: c++
    - name: Run Fuzzers
      uses: google/oss-fuzz/infra/cifuzz/actions/run_fuzzers@master
      with:
        fuzz-seconds: 300
        dry-run: false
        language: c++
    - name: Upload Crash
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: failure() && steps.build.outcome == 'success'
      with:
        name: json4cpp-fuzz-artifacts
        path: ./out/artifacts
