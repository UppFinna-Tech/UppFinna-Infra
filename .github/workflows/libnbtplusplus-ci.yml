name: "libnbtplusplus: CI"

on:
  workflow_dispatch:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        shared: [ON, OFF]

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}

      - name: Install cxxtest (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cxxtest

      - name: Install cxxtest (macOS)
        if: runner.os == 'macOS'
        run: brew install cxxtest
      
      - name: Resolve neozip dependency
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        env:
          SOURCE_REPOSITORY: ${{ inputs.source-repository || '' }}
          GITLAB_BASE: "https://git.projecttick.org/project-tick"
          SOURCE_AUTH_TOKEN: ${{ secrets.PT_GITLAB_SOURCE_TOKEN || '' }}
          SOURCE_AUTH_USERNAME: ${{ vars.PT_GITLAB_SOURCE_USERNAME || 'oauth2' }}
        run: |
          set -euo pipefail
          if [[ -z "$SOURCE_REPOSITORY" ]]; then
            echo "Monorepo mode — neozip already in workspace"
            exit 0
          fi

          # Disable interactive credential helpers (e.g. GCM on Windows)
          # so a 401 never escalates to an OAuth prompt and fails the job.
          export GIT_TERMINAL_PROMPT=0
          git config --global credential.helper ""

          # When a token is set we embed it as basic-auth in the URL during
          # clone (works across GitLab/Gitea/cgit), then strip it from the
          # recorded remote so the token never lands in `.git/config` or
          # `git log` output.
          url="${GITLAB_BASE}/projects/neozip.git"
          if [[ -n "$SOURCE_AUTH_TOKEN" ]]; then
            host_path="${url#https://}"
            auth_url="https://${SOURCE_AUTH_USERNAME}:${SOURCE_AUTH_TOKEN}@${host_path}"
            git clone --depth 1 "$auth_url" "${GITHUB_WORKSPACE}/neozip"
            git -C "${GITHUB_WORKSPACE}/neozip" remote set-url origin "$url"
          else
            git clone --depth 1 "$url" "${GITHUB_WORKSPACE}/neozip"
          fi

      - name: Build and install neozip (Linux)
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          cmake -S "${GITHUB_WORKSPACE}/neozip" -B "${GITHUB_WORKSPACE}/neozip/build" \
            -DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_BUILD_TYPE=Release \
            -DZLIB_COMPAT=OFF -DWITH_GTEST=OFF -G Ninja
          cmake --build "${GITHUB_WORKSPACE}/neozip/build"
          sudo cmake --install "${GITHUB_WORKSPACE}/neozip/build"

      - name: Build and install neozip (macOS)
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          cmake -S "${GITHUB_WORKSPACE}/neozip" -B "${GITHUB_WORKSPACE}/neozip/build" \
            -DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix libarchive)" \
            -DZLIB_COMPAT=OFF -DWITH_GTEST=OFF -G Ninja
          cmake --build "${GITHUB_WORKSPACE}/neozip/build"
          sudo cmake --install "${GITHUB_WORKSPACE}/neozip/build"

      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        if: runner.os == 'Windows'

      - name: Configure
        if: runner.os != 'Windows'
        run: |
          cmake -S ${{ inputs.source-repository != '' && '.' || 'libnbtplusplus' }} -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DNBT_BUILD_SHARED=${{ matrix.shared }} \
            -DNBT_USE_ZLIB=ON \
            -DNBT_BUILD_TESTS=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -S ${{ inputs.source-repository != '' && '.' || 'libnbtplusplus' }} -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DNBT_BUILD_SHARED=${{ matrix.shared }} \
            -DNBT_USE_ZLIB=OFF \
            -DNBT_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release -j2

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
