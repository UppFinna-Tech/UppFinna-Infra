name: "MeshMC: Build"

on:
  workflow_call:
    inputs:
      build-type:
        description: Type of build (Debug or Release)
        type: string
        default: Debug
      environment:
        description: Deployment environment to run under
        type: string
      source-ref:
        description: Source ref to build when invoked from another workflow.
        type: string
        default: ""
      source-repository:
        description: Source repository URL (GitLab). Foreman sends this for polyrepo builds.
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      build-type:
        description: Type of build (Debug or Release)
        type: string
        default: Debug
      source-ref:
        description: Source ref to build instead of the workflow ref.
        type: string
        default: ""
      source-repository:
        description: Source repository URL (GitLab). Foreman sends this for polyrepo builds.
        type: string
        default: ""

permissions: {}

jobs:
  build:
    name: Build (${{ matrix.artifact-name }})

    environment: ${{ inputs.environment || '' }}

    permissions:
      contents: read
      id-token: write
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact-name: Linux
            cmake-preset: linux
            qt-version: 6.10.2

          - os: ubuntu-24.04-arm
            artifact-name: Linux-aarch64
            cmake-preset: linux
            qt-version: 6.10.2

          # - os: windows-2022
          #   artifact-name: Windows-MinGW-w64
          #   cmake-preset: windows_mingw
          #   msystem: CLANG64
          #   vcvars-arch: amd64_x86

          # - os: windows-11-arm
          #   artifact-name: Windows-MinGW-arm64
          #   cmake-preset: windows_mingw
          #   msystem: CLANGARM64
          #   vcvars-arch: arm64

          - os: windows-2025-vs2026
            artifact-name: Windows-MSVC
            cmake-preset: windows_msvc
            vcvars-arch: amd64
            qt-version: 6.10.2

          - os: windows-11-vs2026-arm
            artifact-name: Windows-MSVC-arm64
            cmake-preset: windows_msvc
            vcvars-arch: arm64
            qt-version: 6.10.2

          - os: macos-26
            artifact-name: macOS
            cmake-preset: macos
            macosx-deployment-target: 12.0
            qt-version: 6.10.2

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: ${{ matrix.msystem != '' && 'msys2 {0}' || 'bash' }}
        # Polyrepo: workspace root IS meshmc. Monorepo: meshmc/ subdir.
        # MESHMC_DIR env var resolves this at runtime.

    env:
      ARTIFACT_NAME: ${{ matrix.artifact-name }}
      BUILD_PLATFORM: official
      BUILD_TYPE: ${{ inputs.build-type || 'Debug' }}
      CMAKE_PRESET: ${{ matrix.cmake-preset }}
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx-deployment-target }}
      # Polyrepo: root is meshmc. Monorepo: meshmc/ subdir.
      MESHMC_DIR: ${{ inputs.source-repository != '' && '.' || 'meshmc' }}

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Setup dependencies
        id: setup-dependencies
        uses: Project-Tick/Project-Tick/.github/actions/meshmc/setup-dependencies@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          build-type: ${{ env.BUILD_TYPE }}
          artifact-name: ${{ matrix.artifact-name }}
          msystem: ${{ matrix.msystem }}
          vcvars-arch: ${{ matrix.vcvars-arch }}
          qt-version: ${{ matrix.qt-version }}

      ##
      # BUILD
      ##

      - name: Resolve dependency sources (Linux)
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        env:
          SOURCE_REPOSITORY: ${{ inputs.source-repository || '' }}
          GITLAB_BASE: "https://git.projecttick.org/project-tick"
          SOURCE_AUTH_TOKEN: ${{ secrets.PT_GITLAB_SOURCE_TOKEN || '' }}
          SOURCE_AUTH_USERNAME: ${{ vars.PT_GITLAB_SOURCE_USERNAME || 'oauth2' }}
        run: |
          set -euo pipefail
          if [[ -z "$SOURCE_REPOSITORY" ]]; then
            echo "Monorepo mode — dependencies already in workspace"
            exit 0
          fi

          echo "Polyrepo mode — cloning dependencies from GitLab"
          DEPS=(neozip cmark libnbtplusplus optional-bare xz-embedded systeminfo
                ganalytics rainbow iconfix LocalPeer classparser katabasis
                javacheck javalauncher)

          # Disable any interactive credential helper (e.g. GCM on Windows)
          # so a 401 never escalates to an OAuth prompt and fails the job.
          export GIT_TERMINAL_PROMPT=0
          git config --global credential.helper ""

          # The Project-Tick GitLab projects are public; the anonymous URL
          # works whether the token is present or not. When the token is set
          # we embed it as basic-auth in the URL during clone (works across
          # GitLab/Gitea/cgit), then strip it from the recorded remote so
          # the token never lands in `.git/config` or `git log` output.
          for dep in "${DEPS[@]}"; do
            url="${GITLAB_BASE}/projects/${dep}.git"
            echo "::group::Cloning $dep"
            if [[ -n "$SOURCE_AUTH_TOKEN" ]]; then
              host_path="${url#https://}"
              auth_url="https://${SOURCE_AUTH_USERNAME}:${SOURCE_AUTH_TOKEN}@${host_path}"
              git clone --depth 1 "$auth_url" "${GITHUB_WORKSPACE}/${dep}"
              git -C "${GITHUB_WORKSPACE}/${dep}" remote set-url origin "$url"
            else
              git clone --depth 1 "$url" "${GITHUB_WORKSPACE}/${dep}"
            fi
            echo "::endgroup::"
          done

      - name: Build and install dependencies (Linux)
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail
          MONOREPO_ROOT="${GITHUB_WORKSPACE}"
          CMAKE_COMMON="-DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_BUILD_TYPE=Release"

          install_lib() {
            local dir="$1"; shift
            echo "::group::Building $dir"
            cmake -S "$MONOREPO_ROOT/$dir" -B "$MONOREPO_ROOT/$dir/build" \
              $CMAKE_COMMON "$@" -G Ninja
            cmake --build "$MONOREPO_ROOT/$dir/build"
            sudo cmake --install "$MONOREPO_ROOT/$dir/build"
            echo "::endgroup::"
          }

          install_lib neozip -DZLIB_COMPAT=OFF -DWITH_GTEST=OFF
          install_lib cmark
          install_lib libnbtplusplus
          install_lib optional-bare
          install_lib xz-embedded
          install_lib systeminfo
          install_lib ganalytics
          install_lib rainbow
          install_lib iconfix
          install_lib LocalPeer
          install_lib classparser
          install_lib katabasis
          install_lib javacheck
          install_lib javalauncher

          sudo ldconfig

      - name: Resolve dependency sources (macOS)
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        env:
          SOURCE_REPOSITORY: ${{ inputs.source-repository || '' }}
          GITLAB_BASE: "https://git.projecttick.org/project-tick"
          SOURCE_AUTH_TOKEN: ${{ secrets.PT_GITLAB_SOURCE_TOKEN || '' }}
          SOURCE_AUTH_USERNAME: ${{ vars.PT_GITLAB_SOURCE_USERNAME || 'oauth2' }}
        run: |
          set -euo pipefail
          if [[ -z "$SOURCE_REPOSITORY" ]]; then
            echo "Monorepo mode — dependencies already in workspace"
            exit 0
          fi
          echo "Polyrepo mode — cloning dependencies from GitLab"
          DEPS=(neozip cmark tomlplusplus libnbtplusplus optional-bare xz-embedded
                systeminfo ganalytics rainbow iconfix LocalPeer classparser katabasis
                javacheck javalauncher)

          export GIT_TERMINAL_PROMPT=0
          git config --global credential.helper ""

          for dep in "${DEPS[@]}"; do
            url="${GITLAB_BASE}/projects/${dep}.git"
            echo "::group::Cloning $dep"
            if [[ -n "$SOURCE_AUTH_TOKEN" ]]; then
              host_path="${url#https://}"
              auth_url="https://${SOURCE_AUTH_USERNAME}:${SOURCE_AUTH_TOKEN}@${host_path}"
              git clone --depth 1 "$auth_url" "${GITHUB_WORKSPACE}/${dep}"
              git -C "${GITHUB_WORKSPACE}/${dep}" remote set-url origin "$url"
            else
              git clone --depth 1 "$url" "${GITHUB_WORKSPACE}/${dep}"
            fi
            echo "::endgroup::"
          done

      - name: Build and install dependencies (macOS)
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          MONOREPO_ROOT="${GITHUB_WORKSPACE}"
          CMAKE_COMMON="-DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"

          install_lib() {
            local dir="$1"; shift
            echo "::group::Building $dir"
            cmake -S "$MONOREPO_ROOT/$dir" -B "$MONOREPO_ROOT/$dir/build" \
              $CMAKE_COMMON "$@" -G Ninja
            cmake --build "$MONOREPO_ROOT/$dir/build"
            sudo cmake --install "$MONOREPO_ROOT/$dir/build"
            echo "::endgroup::"
          }

          echo "::group::Building libarchive"
          git clone --depth 1 --branch v3.7.9 https://github.com/libarchive/libarchive.git "$RUNNER_TEMP/libarchive"
          cmake -S "$RUNNER_TEMP/libarchive" -B "$RUNNER_TEMP/libarchive/build" \
            -DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DENABLE_TEST=OFF -DENABLE_OPENSSL=OFF -DENABLE_LZ4=OFF -DENABLE_ZSTD=OFF -G Ninja
          cmake --build "$RUNNER_TEMP/libarchive/build" --parallel
          sudo cmake --install "$RUNNER_TEMP/libarchive/build"
          echo "::endgroup::"

          install_lib neozip -DZLIB_COMPAT=OFF -DWITH_GTEST=OFF
          install_lib cmark
          install_lib tomlplusplus
          install_lib libnbtplusplus
          install_lib optional-bare
          install_lib xz-embedded
          install_lib systeminfo
          install_lib ganalytics
          install_lib rainbow
          install_lib iconfix
          install_lib LocalPeer
          install_lib classparser
          install_lib katabasis
          install_lib javacheck
          install_lib javalauncher

      - name: Resolve dependency sources (Windows MinGW)
        if: ${{ runner.os == 'Windows' && matrix.msystem != '' }}
        env:
          SOURCE_REPOSITORY: ${{ inputs.source-repository || '' }}
          GITLAB_BASE: "https://git.projecttick.org/project-tick"
          SOURCE_AUTH_TOKEN: ${{ secrets.PT_GITLAB_SOURCE_TOKEN || '' }}
          SOURCE_AUTH_USERNAME: ${{ vars.PT_GITLAB_SOURCE_USERNAME || 'oauth2' }}
        run: |
          set -euo pipefail
          if [[ -z "$SOURCE_REPOSITORY" ]]; then exit 0; fi
          DEPS=(neozip cmark libnbtplusplus optional-bare xz-embedded systeminfo
                ganalytics rainbow iconfix LocalPeer classparser katabasis javacheck javalauncher)

          export GIT_TERMINAL_PROMPT=0
          git config --global credential.helper ""

          for dep in "${DEPS[@]}"; do
            url="${GITLAB_BASE}/projects/${dep}.git"
            if [[ -n "$SOURCE_AUTH_TOKEN" ]]; then
              host_path="${url#https://}"
              auth_url="https://${SOURCE_AUTH_USERNAME}:${SOURCE_AUTH_TOKEN}@${host_path}"
              git clone --depth 1 "$auth_url" "${GITHUB_WORKSPACE}/${dep}"
              git -C "${GITHUB_WORKSPACE}/${dep}" remote set-url origin "$url"
            else
              git clone --depth 1 "$url" "${GITHUB_WORKSPACE}/${dep}"
            fi
          done

      - name: Build and install dependencies (Windows MinGW)
        if: ${{ runner.os == 'Windows' && matrix.msystem != '' }}
        run: |
          MONOREPO_ROOT="${GITHUB_WORKSPACE}"
          CMAKE_COMMON="-DCMAKE_INSTALL_PREFIX=${MINGW_PREFIX} -DCMAKE_BUILD_TYPE=Release"

          install_lib() {
            local dir="$1"; shift
            echo "::group::Building $dir"
            cmake -S "$MONOREPO_ROOT/$dir" -B "$MONOREPO_ROOT/$dir/build" \
              $CMAKE_COMMON "$@" -G Ninja
            cmake --build "$MONOREPO_ROOT/$dir/build"
            cmake --install "$MONOREPO_ROOT/$dir/build"
            echo "::endgroup::"
          }

          install_lib neozip -DZLIB_COMPAT=OFF -DWITH_GTEST=OFF
          install_lib cmark
          install_lib libnbtplusplus
          install_lib optional-bare
          install_lib xz-embedded
          install_lib systeminfo
          install_lib ganalytics
          install_lib rainbow
          install_lib iconfix
          install_lib LocalPeer
          install_lib classparser
          install_lib katabasis
          install_lib javacheck
          install_lib javalauncher

      - name: Resolve dependency sources (Windows MSVC)
        if: ${{ runner.os == 'Windows' && matrix.msystem == '' }}
        shell: bash
        env:
          SOURCE_REPOSITORY: ${{ inputs.source-repository || '' }}
          GITLAB_BASE: "https://git.projecttick.org/project-tick"
          SOURCE_AUTH_TOKEN: ${{ secrets.PT_GITLAB_SOURCE_TOKEN || '' }}
          SOURCE_AUTH_USERNAME: ${{ vars.PT_GITLAB_SOURCE_USERNAME || 'oauth2' }}
        run: |
          set -euo pipefail
          if [[ -z "$SOURCE_REPOSITORY" ]]; then exit 0; fi
          DEPS=(neozip cmark tomlplusplus libnbtplusplus optional-bare xz-embedded
                systeminfo ganalytics rainbow iconfix LocalPeer classparser katabasis
                javacheck javalauncher)

          export GIT_TERMINAL_PROMPT=0
          git config --global credential.helper ""

          for dep in "${DEPS[@]}"; do
            url="${GITLAB_BASE}/projects/${dep}.git"
            if [[ -n "$SOURCE_AUTH_TOKEN" ]]; then
              host_path="${url#https://}"
              auth_url="https://${SOURCE_AUTH_USERNAME}:${SOURCE_AUTH_TOKEN}@${host_path}"
              git clone --depth 1 "$auth_url" "${GITHUB_WORKSPACE}/${dep}"
              git -C "${GITHUB_WORKSPACE}/${dep}" remote set-url origin "$url"
            else
              git clone --depth 1 "$url" "${GITHUB_WORKSPACE}/${dep}"
            fi
          done

      - name: Build and install dependencies (Windows MSVC)
        if: ${{ runner.os == 'Windows' && matrix.msystem == '' }}
        shell: bash
        env:
          CMAKE_C_COMPILER_LAUNCHER: ""
          CMAKE_CXX_COMPILER_LAUNCHER: ""
        run: |
          MONOREPO_ROOT="${GITHUB_WORKSPACE}"
          INSTALL_PREFIX="${GITHUB_WORKSPACE}/meshmc-deps"
          CMAKE_COMMON="-DCMAKE_INSTALL_PREFIX=$INSTALL_PREFIX -DCMAKE_BUILD_TYPE=$BUILD_TYPE"

          install_lib() {
            local dir="$1"; shift
            echo "::group::Building $dir"
            cmake -S "$MONOREPO_ROOT/$dir" -B "$MONOREPO_ROOT/$dir/build" \
              $CMAKE_COMMON "$@" -G Ninja
            cmake --build "$MONOREPO_ROOT/$dir/build"
            cmake --install "$MONOREPO_ROOT/$dir/build"
            echo "::endgroup::"
          }

          # External dependencies not in monorepo
          echo "::group::Installing extra-cmake-modules"
          git clone --depth 1 --branch v6.13.0 https://invent.kde.org/frameworks/extra-cmake-modules.git "$RUNNER_TEMP/ecm"
          cmake -S "$RUNNER_TEMP/ecm" -B "$RUNNER_TEMP/ecm/build" \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX" -G Ninja
          cmake --install "$RUNNER_TEMP/ecm/build"
          echo "::endgroup::"

          echo "::group::Building libarchive"
          git clone --depth 1 --branch v3.7.9 https://github.com/libarchive/libarchive.git "$RUNNER_TEMP/libarchive"
          cmake -S "$RUNNER_TEMP/libarchive" -B "$RUNNER_TEMP/libarchive/build" \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX" \
            -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            -DENABLE_TEST=OFF \
            -DENABLE_OPENSSL=OFF \
            -G Ninja
          cmake --build "$RUNNER_TEMP/libarchive/build" --parallel
          cmake --install "$RUNNER_TEMP/libarchive/build"
          echo "::endgroup::"

          # Monorepo libraries
          install_lib neozip -DZLIB_COMPAT=OFF -DWITH_GTEST=OFF
          install_lib cmark
          install_lib tomlplusplus
          install_lib libnbtplusplus

          install_lib optional-bare
          install_lib xz-embedded
          install_lib systeminfo
          install_lib ganalytics
          install_lib rainbow
          install_lib iconfix
          install_lib LocalPeer
          install_lib classparser
          install_lib katabasis

          install_lib javacheck
          install_lib javalauncher

          echo "CMAKE_PREFIX_PATH=$INSTALL_PREFIX" >> "$GITHUB_ENV"
          echo "$INSTALL_PREFIX/bin" >> "$GITHUB_PATH"

      ##
      # PLUGIN SIGNING — import the official GPG key into the runner's
      # keyring so MMCOSign.cmake can attach a detached signature trailer
      # to every in-tree .mmco plugin as a POST_BUILD step.
      #
      # The signed payload is exactly the linker output; trailer layout
      # is documented in launcher/plugin/MMCOFormat.h. Plugins without a
      # signature are rejected at runtime unless their SPDX license is
      # on the OSS allow-list.
      #
      # The same secrets feed AppImage signing (Linux package action),
      # so importing here is additive: the package step re-imports as a
      # no-op when the key is already present.
      ##

      - name: Import GPG signing key (POSIX)
        id: gpg-import-posix
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PRIVATE_KEY_ID: ${{ secrets.GPG_PRIVATE_KEY_ID }}
        run: |
          set -euo pipefail
          if [ -z "${GPG_PRIVATE_KEY:-}" ] || [ -z "${GPG_PRIVATE_KEY_ID:-}" ]; then
            echo "GPG secrets not present — plugin signing will be skipped."
            exit 0
          fi
          if ! command -v gpg >/dev/null 2>&1; then
            echo "::warning::gpg not found on runner — plugin signing will be skipped"
            exit 0
          fi

          # Use a dedicated GNUPGHOME so the import is isolated from any
          # other tooling on the runner.
          export GNUPGHOME="$RUNNER_TEMP/.gnupg-mmco"
          mkdir -m 700 -p "$GNUPGHOME"

          printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Mark the imported key as ultimately trusted so detached-sign
          # operations do not prompt for trust confirmation.
          echo "${GPG_PRIVATE_KEY_ID}:6:" | gpg --batch --import-ownertrust

          echo "MESHMC_PLUGIN_GPG_HOMEDIR=$GNUPGHOME" >> "$GITHUB_ENV"
          echo "MESHMC_PLUGIN_GPG_KEY_ID=$GPG_PRIVATE_KEY_ID" >> "$GITHUB_ENV"

      - name: Import GPG signing key (Windows)
        id: gpg-import-windows
        # MSVC builds compile PluginSignature.cpp into a stub because
        # upstream gpgme has no working MSVC build (autotools + ABI
        # incompatibilities). MinGW matrix entries — if/when they are
        # re-enabled — do link gpgmepp via MSYS2, so signing remains
        # available there.
        if: ${{ runner.os == 'Windows' && matrix.cmake-preset != 'windows_msvc' }}
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PRIVATE_KEY_ID: ${{ secrets.GPG_PRIVATE_KEY_ID }}
        run: |
          set -euo pipefail
          if [ -z "${GPG_PRIVATE_KEY:-}" ] || [ -z "${GPG_PRIVATE_KEY_ID:-}" ]; then
            echo "GPG secrets not present — plugin signing will be skipped."
            exit 0
          fi

          # GPG must be on PATH. windows-2022 / windows-11-arm ship gpg
          # via Git for Windows; MSYS2 runners already have it.
          if ! command -v gpg >/dev/null 2>&1; then
            echo "::warning::gpg not found on Windows runner — plugin signing will be skipped"
            exit 0
          fi

          # RUNNER_TEMP on Windows is a Windows-style path (e.g. D:\a\_temp).
          # Git Bash's gpg.exe is a native Windows binary linked against
          # libassuan, so it needs the directory passed as a Windows path —
          # but `mkdir -p` and the shell need a POSIX path. Compute both.
          if command -v cygpath >/dev/null 2>&1; then
            GNUPGHOME_POSIX="$(cygpath -u "$RUNNER_TEMP")/gnupg-mmco"
            mkdir -p "$GNUPGHOME_POSIX"
            GNUPGHOME_WIN="$(cygpath -w "$GNUPGHOME_POSIX")"
          else
            # Fallback: assume RUNNER_TEMP is already POSIX-compatible.
            GNUPGHOME_POSIX="${RUNNER_TEMP}/gnupg-mmco"
            mkdir -p "$GNUPGHOME_POSIX"
            GNUPGHOME_WIN="$GNUPGHOME_POSIX"
          fi

          # Always export GNUPGHOME in Windows form for the gpg.exe invocations.
          export GNUPGHOME="$GNUPGHOME_WIN"

          printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "${GPG_PRIVATE_KEY_ID}:6:" | gpg --batch --import-ownertrust

          echo "MESHMC_PLUGIN_GPG_HOMEDIR=$GNUPGHOME_WIN" >> "$GITHUB_ENV"
          echo "MESHMC_PLUGIN_GPG_KEY_ID=$GPG_PRIVATE_KEY_ID" >> "$GITHUB_ENV"

      - name: Configure project
        working-directory: ${{ inputs.source-repository != '' && '.' || 'meshmc' }}
        run: |
          # If a signing key was imported by the earlier step, ask
          # MMCOSign.cmake to attach a GPG trailer to every in-tree
          # plugin via POST_BUILD. Both env vars are exported in the
          # gpg-import step; forks / PRs without secrets see them
          # empty and skip signing.
          EXTRA_FLAGS=()
          if [ -n "${MESHMC_PLUGIN_GPG_KEY_ID:-}" ] && [ -n "${MESHMC_PLUGIN_GPG_HOMEDIR:-}" ]; then
            EXTRA_FLAGS+=(
              "-DMeshMC_PLUGIN_SIGN_ALL=ON"
              "-DMeshMC_PLUGIN_SIGNING_KEY=${MESHMC_PLUGIN_GPG_KEY_ID}"
              "-DMeshMC_PLUGIN_SIGNING_HOMEDIR=${MESHMC_PLUGIN_GPG_HOMEDIR}"
            )
            echo "Plugin signing: enabled (key ${MESHMC_PLUGIN_GPG_KEY_ID})"
          else
            echo "Plugin signing: disabled (no key configured)"
          fi

          cmake --preset "$CMAKE_PRESET" "${EXTRA_FLAGS[@]}"

      - name: Run build
        working-directory: ${{ inputs.source-repository != '' && '.' || 'meshmc' }}
        run: |
          cmake --build --preset "$CMAKE_PRESET" --config "$BUILD_TYPE"

      - name: Run tests
        working-directory: ${{ inputs.source-repository != '' && '.' || 'meshmc' }}
        run: |
          ctest --preset "$CMAKE_PRESET" --build-config "$BUILD_TYPE"

      ##
      # PACKAGE
      ##

      - name: Get short version
        id: short-version
        shell: bash
        working-directory: ${{ inputs.source-repository != '' && '.' || 'meshmc' }}
        run: |
          echo "version=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Package (Linux)
        if: ${{ runner.os == 'Linux' }}
        uses: Project-Tick/Project-Tick/.github/actions/meshmc/package/linux@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          version: ${{ steps.short-version.outputs.version }}
          build-type: ${{ steps.setup-dependencies.outputs.build-type }}
          artifact-name: ${{ matrix.artifact-name }}
          qt-version: ${{ steps.setup-dependencies.outputs.qt-version }}
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-private-key-id: ${{ secrets.GPG_PRIVATE_KEY_ID }}

      - name: Package (macOS)
        if: ${{ runner.os == 'macOS' }}
        uses: Project-Tick/Project-Tick/.github/actions/meshmc/package/macos@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          version: ${{ steps.short-version.outputs.version }}
          build-type: ${{ steps.setup-dependencies.outputs.build-type }}
          artifact-name: ${{ matrix.artifact-name }}
          apple-codesign-cert: ${{ secrets.APPLE_CODESIGN_CERT }}
          apple-codesign-password: ${{ secrets.APPLE_CODESIGN_PASSWORD }}
          apple-codesign-id: ${{ secrets.APPLE_CODESIGN_ID }}
          apple-notarize-apple-id: ${{ secrets.APPLE_NOTARIZE_APPLE_ID }}
          apple-notarize-team-id: ${{ secrets.APPLE_NOTARIZE_TEAM_ID }}
          apple-notarize-password: ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
          sparkle-ed25519-key: ${{ secrets.SPARKLE_ED25519_KEY }}

      - name: Package (Windows)
        if: ${{ runner.os == 'Windows' }}
        uses: Project-Tick/Project-Tick/.github/actions/meshmc/package/windows@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          version: ${{ steps.short-version.outputs.version }}
          build-type: ${{ env.BUILD_TYPE }}
          artifact-name: ${{ matrix.artifact-name }}
          windows-codesign-cert: ${{ secrets.WINDOWS_CODESIGN_CERT }}
          windows-codesign-password: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
          msystem: ${{ matrix.msystem }}
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
