name: "MeshMC: Container"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""

permissions: {}

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build (${{ matrix.arch }})

    permissions:
      contents: read
      packages: write

    outputs:
      image-name: ${{ steps.image-name.outputs.image-name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: ubuntu-24.04-arm
          - arch: amd64
            os: ubuntu-24.04

    runs-on: ${{ matrix.os }}

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Set image name
        id: image-name
        run: |
          echo "image-name=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/project-tick/devcontainer" >> "$GITHUB_OUTPUT"

      - name: Install Podman
        uses: redhat-actions/podman-install@60b05ab5b050c9f8ec8dff7e0377f8bf36c39207 # main
        if: ${{ runner.arch == 'X64' || runner.arch == 'X86' }}
        with:
          github-token: ${{ github.token }}

      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'

      - name: Determine metadata for image
        id: image-metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: |
            ${{ steps.image-name.outputs.image-name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.event.merge_group.base_ref == 'refs/heads/master' }}
            type=sha
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=tag

      - name: Build image
        id: build-image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: |
            ./Containerfile
          tags: ${{ steps.image-metadata.outputs.tags }}
          labels: ${{ steps.image-metadata.outputs.labels }}

      - name: Login to registry
        if: ${{ github.event_name != 'pull_request' }}
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Push image (with retry)
        id: push-image
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          digest=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            for attempt in 1 2 3 4 5; do
              if podman push --tls-verify=true \
                   --digestfile="$RUNNER_TEMP/digest.txt" \
                   "$tag"; then
                digest="$(cat "$RUNNER_TEMP/digest.txt")"
                break
              fi
              [ "$attempt" = 5 ] && exit 1
              echo "Push attempt $attempt/5 failed for $tag, retrying in 30s..."
              sleep 30
            done
          done <<< "${{ steps.build-image.outputs.tags }}"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Export image digest
        if: ${{ github.event_name != 'pull_request' }}
        env:
          DIGEST: ${{ steps.push-image.outputs.digest }}
        run: |
          mkdir -p "$RUNNER_TEMP"/digests
          touch "$RUNNER_TEMP"/digests/"${DIGEST#sha256:}"

      - name: Upload digest artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}

  manifest:
    name: Create manifest
    needs: [build]
    if: ${{ github.event_name != 'pull_request' }}

    permissions:
      contents: read
      packages: write

    runs-on: ubuntu-24.04

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Install Podman
        if: ${{ runner.arch == 'X64' || runner.arch == 'X86' }}
        uses: redhat-actions/podman-install@60b05ab5b050c9f8ec8dff7e0377f8bf36c39207 # main
        with:
          github-token: ${{ github.token }}

      - name: Login to registry
        uses: redhat-actions/podman-login@4934294ad0449894bcd1e9f191899d7292469603 # v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Determine metadata for manifest
        id: manifest-metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: |
            ${{ needs.build.outputs.image-name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ github.event.merge_group.base_ref == 'refs/heads/develop' }}
            type=sha
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=tag

      - name: Create manifest list
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_NAME: ${{ needs.build.outputs.image-name }}
        run: |
          # shellcheck disable=SC2046
          while read -r tag; do
            podman manifest create "$tag" \
              $(printf "$IMAGE_NAME@sha256:%s " *)
          done <<< "$DOCKER_METADATA_OUTPUT_TAGS"

      - name: Push manifest
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        with:
          tags: ${{ steps.manifest-metadata.outputs.tags }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}
          tls-verify: true
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
