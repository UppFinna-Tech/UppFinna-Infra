name: "MeshMC: Flatpak Build"

on:
  workflow_call:
    inputs:
      # NOTE: This is a workaround for https://github.com/actions/runner/issues/3146
      cache-repository:
        type: boolean
        description: Whether to cache the repository created by Flatpak builds
        default: false
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""
    outputs:
      repository-cache-key:
        description: Cache key used to save the contents of the repository
        value: ${{ jobs.build.outputs.repository-cache-key }}
      repository-directory:
        description: Directory name of the cached repository
        value: ${{ jobs.build.outputs.repository-directory }}
    secrets:
      FLATPAK_GPG_PRIVATE_KEY:
        description: GPG key used for signing the ostree repository
        required: false
  workflow_dispatch:
    inputs:
      cache-repository:
        type: boolean
        description: Whether to cache the repository created by Flatpak builds
        default: false

permissions: {}

jobs:
  build:
    name: Build (${{ matrix.arch }})
    defaults:
      run:
        working-directory: ${{ inputs.source-repository != '' && '.' || 'meshmc' }}
    outputs:
      repository-cache-key: ${{ steps.restore-repository.outputs.cache-primary-key }}
      repository-directory: ${{ env.REPOSITORY_PATH }}

    permissions:
      contents: read

    strategy:
      fail-fast: false
      # WARN(@YongDo-Hyun): DON'T REMOVE THIS!
      # We share and incrementally update a repository with each subsequent build
      # Having builds run in parallel would overwrite the repository with only one build
      max-parallel: ${{ (inputs.cache-repository || false) && 1 || 99 }}
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64

    runs-on: ${{ matrix.os }}

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.10@sha256:acd1625e947d2578ffe1b9247c8ea40d4f6310e532e6a1f844b0c1b486c5d547
      options: --privileged
      volumes:
        - /opt/hostedtoolcache:/hostedtoolcache

    env:
      GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY != '' && vars.GPG_KEY_ID || '' }}
      REPOSITORY_DIR: repo
      REPOSITORY_PATH: flatpak/repo

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Free up disk space
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          rm -rf /hostedtoolcache/*

      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'
          submodules: true

      - name: Set short version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if UPSTREAM_SHA="$(gh api /repos/Project-Tick/Project-Tick/branches/master --jq '.commit.sha' 2>/dev/null)" && [[ -n "$UPSTREAM_SHA" ]]; then
            echo "VERSION=${UPSTREAM_SHA::7}" >> "$GITHUB_ENV"
          else
            echo "::warning::Unable to query upstream Project-Tick/master; falling back to local SHA."
            echo "VERSION=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      - name: Restore local repository
        id: restore-repository
        if: ${{ inputs.cache-repository }}
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ env.REPOSITORY_PATH }}
          key: repository-${{ github.run_id }}-${{ runner.arch }}
          restore-keys: repository-

      - name: Setup signing
        shell: bash
        env:
          FLATPAK_GPG_PRIVATE_KEY: ${{ secrets.FLATPAK_GPG_PRIVATE_KEY || '' }}
        run: |
          if [[ -z "$FLATPAK_GPG_PRIVATE_KEY" ]]; then
            echo ":warning: Not signing Flatpaks or ostree repositories, as the signing key was not present" >> "$GITHUB_STEP_SUMMARY"
          else
            echo -n "$FLATPAK_GPG_PRIVATE_KEY" | base64 -d | gpg --import
            gpg --list-keys --keyid-format=long "$GPG_KEY_ID"
          fi

      - name: Build Flatpak
        # TODO(@YongDo-Hyun): Pin this to a tag when https://github.com/flatpak/flatpak-github-actions/pull/237 is included in a release!
        uses: flatpak/flatpak-github-actions/flatpak-builder@0a631396999e4243489a8a6ecf54fcb9f0575078
        with:
          manifest-path: flatpak/org.projecttick.MeshMC.yml
          arch: ${{ matrix.arch }}
          branch: nightly
          bundle: MeshMC-${{ env.VERSION }}-${{ matrix.arch }}.flatpak
          repo-dir: ${{ env.REPOSITORY_PATH }}
          gpg-sign: ${{ env.GPG_KEY_ID }}

      - name: Update and prune repository
        if: ${{ inputs.cache-repository }}
        shell: bash
        run: |
          flatpak build-update-repo \
            "${GPG_KEY_ID:+--gpg-sign="$GPG_KEY_ID"}" \
            --generate-static-deltas \
            --prune \
            "$REPOSITORY_DIR"

      - name: Copy static assets to repository
        if: ${{ inputs.cache-repository }}
        shell: bash
        run: |
          cp -r static/. "$REPOSITORY_DIR"/

      - name: Cache local repository
        if: ${{ inputs.cache-repository }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ env.REPOSITORY_PATH }}
          key: ${{ steps.restore-repository.outputs.cache-primary-key }}
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
