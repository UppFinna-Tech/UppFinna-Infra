name: Deploy to repository

on:
  workflow_dispatch:
    inputs:
      emit-callbacks:
        description: Whether this standalone run should report callbacks to Foreman
        type: boolean
        default: true
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""
  workflow_call:
    inputs:
      emit-callbacks:
        description: Whether this reusable invocation should report callbacks to Foreman
        required: false
        type: boolean
        default: false
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""

      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
permissions: {}

jobs:
  callback-start:
    name: "Callback Start"
    if: ${{ inputs.emit-callbacks }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - name: Start log collector
        if: inputs.foreman-pipeline-id != ''
        uses: Project-Tick/Project-Tick/.github/actions/log-collector@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          pipeline_id: ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name: ${{ github.job }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'

      - name: Prepare callback destination
        id: prepare
        uses: Project-Tick/Project-Tick/.github/actions/foreman-prepare-callback@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url: ${{ inputs.callback_url || github.event.inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          schedule: ${{ github.event.schedule || '' }}

      - name: Report workflow run URL
        uses: Project-Tick/Project-Tick/.github/actions/foreman-send-callback@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          cb_auth: ${{ steps.prepare.outputs.cb_auth }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  build:
    name: Build Flatpaks
    permissions:
      contents: read
    uses: ./.github/workflows/meshmc-flatpak-build.yml
    with:
      cache-repository: true
    secrets: inherit

  deploy:
    name: Publish Flatpak repository

    needs: build

    runs-on: ubuntu-24.04

    env:
      DEPLOY_BRANCH: ${{ vars.FLATPAK_DEPLOY_BRANCH || 'master' }}
      DEPLOY_GIT_EMAIL: ${{ vars.FLATPAK_DEPLOY_GIT_EMAIL || 'bot@projecttick.org' }}
      DEPLOY_GIT_NAME: ${{ vars.FLATPAK_DEPLOY_GIT_NAME || 'Project Tick Bot' }}
      DEPLOY_REPOSITORY: ${{ vars.FLATPAK_DEPLOY_REPOSITORY || '' }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.FLATPAK_DEPLOY_SSH_PRIVATE_KEY || secrets.FTP_SSH_PRIVATE_KEY || '' }}
      SOURCE_REPOSITORY: ${{ needs.build.outputs.repository-directory }}

    steps:
      - name: Validate deployment configuration
        id: validate
        shell: bash
        run: |
          set -uo pipefail

          missing=0
          if [[ -z "$DEPLOY_REPOSITORY" ]]; then
            echo "::warning::Missing repository variable FLATPAK_DEPLOY_REPOSITORY (SSH URL of the target deployment repository)."
            missing=1
          fi

          if [[ -z "$DEPLOY_SSH_PRIVATE_KEY" ]]; then
            echo "::warning::Missing secret FLATPAK_DEPLOY_SSH_PRIVATE_KEY. You can also reuse FTP_SSH_PRIVATE_KEY."
            missing=1
          fi

          if [[ "$missing" -eq 1 ]]; then
            echo "::notice::Flatpak deploy will be skipped because deploy credentials are not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Start log collector
        if: inputs.foreman-pipeline-id != '' && steps.validate.outputs.configured == 'true'
        uses: Project-Tick/Project-Tick/.github/actions/log-collector@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          pipeline_id: ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name: ${{ github.job }}
      - name: Restore local repository
        if: steps.validate.outputs.configured == 'true'
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ env.SOURCE_REPOSITORY }}
          key: ${{ needs.build.outputs.repository-cache-key }}
          fail-on-cache-miss: true

      - name: Check restored repository directory
        if: steps.validate.outputs.configured == 'true'
        shell: bash
        run: |
          if [[ ! -d "$GITHUB_WORKSPACE/$SOURCE_REPOSITORY" ]]; then
            echo "::warning::Flatpak repository directory was not restored: $GITHUB_WORKSPACE/$SOURCE_REPOSITORY"
            echo "DEPLOY_SKIP=true" >> "$GITHUB_ENV"
          fi

      - name: Prepare SSH credentials
        if: steps.validate.outputs.configured == 'true' && env.DEPLOY_SKIP != 'true'
        shell: bash
        run: |
          set -euo pipefail

          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          cat > ~/.ssh/config << 'EOF'
          Host *
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking accept-new
          EOF

          chmod 600 ~/.ssh/config

      - name: Configure git identity
        if: steps.validate.outputs.configured == 'true' && env.DEPLOY_SKIP != 'true'
        shell: bash
        run: |
          git config --global user.name "$DEPLOY_GIT_NAME"
          git config --global user.email "$DEPLOY_GIT_EMAIL"

      - name: Push repository contents
        if: steps.validate.outputs.configured == 'true' && env.DEPLOY_SKIP != 'true'
        shell: bash
        run: |
          set -euo pipefail

          deploy_dir="$(mktemp -d)"
          git init -b "$DEPLOY_BRANCH" "$deploy_dir"

          cd "$deploy_dir"
          git remote add origin "$DEPLOY_REPOSITORY"

          rsync -a --delete --exclude '.git' "$GITHUB_WORKSPACE/$SOURCE_REPOSITORY/" ./
          git add -A

          local_tree="$(git write-tree)"
          remote_tree=''

          if git fetch --depth=1 origin "$DEPLOY_BRANCH"; then
            remote_tree="$(git rev-parse FETCH_HEAD^{tree})"
          fi

          if [[ -n "$remote_tree" && "$local_tree" == "$remote_tree" ]]; then
            echo "Flatpak repository is already up to date."
            exit 0
          fi

          git commit -m "Publish Flatpak repository for ${GITHUB_SHA::7}"
          git push --force origin "HEAD:$DEPLOY_BRANCH"

  callback-status:
    name: "Callback Status"
    if: ${{ inputs.emit-callbacks && always() }}
    needs:
      - callback-start
      - build
      - deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Start log collector
        if: inputs.foreman-pipeline-id != ''
        uses: Project-Tick/Project-Tick/.github/actions/log-collector@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          pipeline_id: ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name: ${{ github.job }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'

      - name: Resolve cancelled workflow status
        id: resolve-status-cancelled
        if: ${{ cancelled() }}
        shell: bash
        run: echo "status=cancelled" >> "$GITHUB_OUTPUT"

      - name: Resolve final workflow status
        id: resolve-status
        if: ${{ !cancelled() }}
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        if: ${{ always() }}
        uses: Project-Tick/Project-Tick/.github/actions/foreman-send-callback@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status-cancelled.outputs.status || steps.resolve-status.outputs.status || 'failure') }}
