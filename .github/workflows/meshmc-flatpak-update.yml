name: Update modules

on:
  workflow_dispatch:
    inputs:
      emit-callbacks:
        description: Whether this standalone run should report callbacks to Foreman
        type: boolean
        default: true
      callback_url:
        description: Optional Foreman callback base URL
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        type: string
        default: ""
  workflow_call:
    inputs:
      emit-callbacks:
        description: Whether this reusable invocation should report callbacks to Foreman
        required: false
        type: boolean
        default: false
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""

      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
permissions: {}

jobs:
  callback-start:
    name: "Callback Start"
    if: ${{ inputs.emit-callbacks }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    steps:
      - name: Start log collector
        if: inputs.foreman-pipeline-id != ''
        uses: Project-Tick/Project-Tick/.github/actions/log-collector@master
        with:
          pipeline_id: ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name: ${{ github.job }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'

      - name: Prepare callback destination
        id: prepare
        uses: Project-Tick/Project-Tick/.github/actions/foreman-prepare-callback@master
        with:
          callback_url: ${{ inputs.callback_url || github.event.inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || github.event.inputs.callback_token || '' }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          repository: ${{ github.repository }}
          workflow_name: ${{ github.workflow }}
          event_name: ${{ github.event_name }}
          ref: ${{ github.ref }}
          sha: ${{ github.sha }}
          schedule: ${{ github.event.schedule || '' }}

      - name: Report workflow run URL
        uses: Project-Tick/Project-Tick/.github/actions/foreman-send-callback@master
        with:
          callback_url: ${{ steps.prepare.outputs.callback_url }}
          cb_auth: ${{ steps.prepare.outputs.cb_auth }}
          endpoint: log_url
          payload_json: ${{ format('{{"log_url":"{0}/{1}/actions/runs/{2}"}}', github.server_url, github.repository, github.run_id) }}

  update:
    name: Run update
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: meshmc/flatpak
    steps:
      - name: Check FLATPAK_PAT_TOKEN credential
        id: creds
        shell: bash
        env:
          FLATPAK_PAT_TOKEN: ${{ secrets.FLATPAK_PAT_TOKEN }}
        run: |
          if [[ -z "${FLATPAK_PAT_TOKEN:-}" ]]; then
            echo "::warning::FLATPAK_PAT_TOKEN is not set — flatpak module update will be skipped."
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Start log collector
        if: inputs.foreman-pipeline-id != '' && steps.creds.outputs.has_token == 'true'
        uses: Project-Tick/Project-Tick/.github/actions/log-collector@master
        with:
          pipeline_id: ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name: ${{ github.job }}
      - name: Checkout repository
        if: steps.creds.outputs.has_token == 'true'
        uses: actions/checkout@v7.0.0
        with:
          token: ${{ secrets.FLATPAK_PAT_TOKEN }}

      - name: Run update
        if: steps.creds.outputs.has_token == 'true'
        uses: docker://ghcr.io/flathub/flatpak-external-data-checker:latest
        with:
          args: --update --edit-only meshmc/flatpak/org.projecttick.MeshMC.yml

      - name: Create Pull request
        if: steps.creds.outputs.has_token == 'true'
        id: pull-request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-modules
          commit-message: "chore: update modules"
          title: "chore: update modules"
          token: ${{ secrets.FLATPAK_PAT_TOKEN }}

  callback-status:
    name: "Callback Status"
    if: ${{ inputs.emit-callbacks && always() }}
    needs:
      - callback-start
      - update
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Start log collector
        if: inputs.foreman-pipeline-id != ''
        uses: Project-Tick/Project-Tick/.github/actions/log-collector@master
        with:
          pipeline_id: ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name: ${{ github.job }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'

      - name: Resolve cancelled workflow status
        id: resolve-status-cancelled
        if: ${{ cancelled() }}
        shell: bash
        run: echo "status=cancelled" >> "$GITHUB_OUTPUT"

      - name: Resolve final workflow status
        id: resolve-status
        if: ${{ !cancelled() }}
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail

          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final workflow status
        if: ${{ always() }}
        uses: Project-Tick/Project-Tick/.github/actions/foreman-send-callback@master
        with:
          callback_url: ${{ needs.callback-start.outputs.callback_url }}
          pipeline_id: ${{ needs.callback-start.outputs.pipeline_id }}
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-status-cancelled.outputs.status || steps.resolve-status.outputs.status || 'failure') }}
