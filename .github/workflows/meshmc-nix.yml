name: "MeshMC: Nix"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""

permissions: {}

env:
  DEBUG: ${{ github.ref_type != 'tag' }}

jobs:
  build:
    name: Build (${{ matrix.system }})

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            system: x86_64-linux

          - os: ubuntu-22.04-arm
            system: aarch64-linux

          - os: macos-14
            system: aarch64-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Setup Nix Magic Cache
        if: ${{ github.event_name == 'pull_request' }}
        uses: DeterminateSystems/magic-nix-cache-action@v14
        with:
          diagnostic-endpoint: ""
          use-flakehub: false

      - name: Setup Cachix
        id: cachix-setup
        if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && env.CACHIX_AUTH_TOKEN != '' }}
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        uses: cachix/cachix-action@v17
        with:
          name: meshmc
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Run Flake checks
        run: |
          nix flake check --print-build-logs --show-trace

      - name: Build debug package
        if: ${{ env.DEBUG == 'true' }}
        run: |
          nix build \
            --no-link --print-build-logs --print-out-paths \
            .#meshmc-debug >> "$GITHUB_STEP_SUMMARY"

      - name: Build release package
        if: ${{ env.DEBUG == 'false' }}
        env:
          TAG: ${{ github.ref_name }}
          SYSTEM: ${{ matrix.system }}
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          # Cachix yoksa sadece nix build yap, pin'i atla.
          if [[ -z "${CACHIX_AUTH_TOKEN:-}" ]] || ! command -v cachix >/dev/null 2>&1; then
            echo "::notice::CACHIX_AUTH_TOKEN missing or cachix not installed; skipping 'cachix pin'."
            nix build --no-link --print-out-paths .#meshmc \
              | tee -a "$GITHUB_STEP_SUMMARY"
          else
            nix build --no-link --print-out-paths .#meshmc \
              | tee -a "$GITHUB_STEP_SUMMARY" \
              | xargs cachix pin meshmc "$TAG"-"$SYSTEM"
          fi
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
