name: "mnv: CI"

on:
  workflow_dispatch:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.architecture == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}

    env:
      CC: ${{ matrix.compiler }}
      GCC_VER: 14
      CLANG_VER: 21
      TEST: test
      SRCDIR: ./src
      LEAK_CFLAGS: -DEXITFREE
      LOG_DIR: ${{ github.workspace }}/logs
      TERM: xterm
      DISPLAY: ':99'
      DEBIAN_FRONTEND: noninteractive

    strategy:
      fail-fast: false
      matrix:
        features: [tiny, normal, huge]
        compiler: [clang, gcc]
        extra: [[]]
        architecture: [native]
        include:
          - features: tiny
            compiler: clang
            extra: [nogui]
          - features: tiny
            compiler: gcc
            extra: [nogui]
          - features: tiny
            compiler: gcc
            extra: [nogui]
            architecture: arm64
          - features: huge
            coverage: true
          - features: huge
            compiler: clang
            interface: dynamic
            python3: stable-abi
          - features: huge
            compiler: gcc
            coverage: true
            interface: dynamic
            extra: [uchar, testgui]
          - features: huge
            compiler: gcc
            coverage: true
            extra: [unittests]
          - features: huge
            compiler: gcc
            coverage: true
            extra: [unittests]
            architecture: arm64
          - features: normal
            compiler: gcc
            extra: [vimtags, proto, codestyle]

    defaults:
      run:
        working-directory: ${{ inputs.source-repository != '' && '.' || 'mnv' }}

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            autoconf \
            clang \
            lcov \
            gettext \
            libcanberra-dev \
            libperl-dev \
            python3-dev \
            liblua5.4-dev \
            lua5.4 \
            ruby-dev \
            tcl-dev \
            libsodium-dev \
            libgtk-3-dev \
            desktop-file-utils \
            libtool-bin

      - name: Build
        run: |
          if [ "${{ matrix.features }}" = "tiny" ]; then
            ./configure --with-features=tiny --disable-gui
          elif [ "${{ matrix.features }}" = "normal" ]; then
            ./configure --with-features=normal --disable-gui
          else
            ./configure --with-features=huge \
              --enable-perlinterp \
              --enable-pythoninterp \
              --enable-python3interp \
              --enable-rubyinterp \
              --enable-luainterp \
              --enable-tclinterp \
              --enable-gui=gtk3
          fi
          make -j"$(nproc)"

      - name: Test
        timeout-minutes: 25
        env:
          # The MNV `make test` target reads MNV_EXCLUDE_TESTS as a
          # space-separated list of test names to skip. Quarantine
          # patterns posted to Foreman are forwarded here verbatim;
          # the Makefile uses substring matching so the bot's globs
          # work as expected.
          MNV_EXCLUDE_TESTS: ${{ steps.exclude.outputs.patterns_json }}
        run: |
          make "$TEST"

      - name: Upload test artifacts
        if: failure()
        uses: Project-Tick/Project-Tick/.github/actions/mnv/test_artifacts@ef4cb1b7aa938e2a332032c4063826821160533e # master

  # cmake-linux:
