name: "mnv: CodeQL"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""

permissions:
  contents: read

jobs:
  analyze:
    permissions:
      contents: read
      security-events: write

    name: Analyze
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: ['cpp', 'python']

    steps:
    - name: Start log collector
      if: inputs.foreman-pipeline-id != ''
      uses: Project-Tick/Project-Tick/.github/actions/log-collector@ef4cb1b7aa938e2a332032c4063826821160533e # master
      with:
        pipeline_id: ${{ inputs.foreman-pipeline-id }}
        foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
        job_name: ${{ github.job }}
    - name: Checkout repository
      uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
      with:
        source-repository: ${{ inputs.source-repository || '' }}
        show-progress: 'false'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
      with:
        languages: ${{ matrix.language }}

    - name: Autobuild
      uses: github/codeql-action/autobuild@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
