name: "neozip: Static Analysis"

on:
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""

jobs:
  gcc-analyzer:
    name: GCC-14
    runs-on: ubuntu-latest
    steps:
      - name: Start log collector
        if: inputs.foreman-pipeline-id != ''
        uses: Project-Tick/Project-Tick/.github/actions/log-collector@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          pipeline_id: ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name: ${{ github.job }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'

      - name: Install packages
        run: sudo apt-get install -y gcc-14

      - name: Generate project files
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DWITH_FUZZERS=OFF \
            -DWITH_CODE_COVERAGE=OFF \
            -DWITH_MAINTAINER_WARNINGS=OFF
        env:
          CC: gcc-14
          CFLAGS: >-
            -fanalyzer
            -Werror
            -Wanalyzer-double-fclose
            -Wanalyzer-double-free
            -Wanalyzer-exposure-through-output-file
            -Wanalyzer-file-leak
            -Wanalyzer-free-of-non-heap
            -Wanalyzer-malloc-leak
            -Wanalyzer-null-argument
            -Wanalyzer-null-dereference
            -Wanalyzer-possible-null-argument
            -Wanalyzer-possible-null-dereference
            -Wanalyzer-stale-setjmp-buffer
            -Wanalyzer-tainted-array-index
            -Wanalyzer-unsafe-call-within-signal-handler
            -Wanalyzer-use-after-free
            -Wanalyzer-use-of-pointer-in-stale-stack-frame
          CI: true

      - name: Compile source code
        run: cmake --build build -j5 --config Release > /dev/null

  clang-analyzer:
    runs-on: ubuntu-latest
    steps:
      - name: Start log collector
        if: inputs.foreman-pipeline-id != ''
        uses: Project-Tick/Project-Tick/.github/actions/log-collector@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          pipeline_id: ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name: ${{ github.job }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'

      - name: Install packages
        run: sudo apt-get install -y clang-tools

      - name: Generate project files
        run: |
          scan-build --status-bugs \
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DBUILD_SHARED_LIBS=OFF \
              -DWITH_FUZZERS=OFF \
              -DWITH_CODE_COVERAGE=OFF \
              -DWITH_MAINTAINER_WARNINGS=OFF
        env:
          CI: true

      - name: Compile source code
        run: |
          scan-build --status-bugs \
            cmake --build build -j5 --config Release > /dev/null
