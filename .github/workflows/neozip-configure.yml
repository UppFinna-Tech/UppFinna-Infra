name: "neozip: Configure"

on:
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""

jobs:
  configure:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu GCC
            os: ubuntu-latest
            compiler: gcc
            cflags: ""
            ldflags: ""
            configure-args: --warn

          - name: Ubuntu Clang
            os: ubuntu-latest
            compiler: clang
            configure-args: --warn

          - name: Ubuntu GCC Compat
            os: ubuntu-latest
            compiler: gcc
            configure-args: --warn --zlib-compat

          - name: macOS Clang
            os: macos-latest
            compiler: clang
            configure-args: --warn

          - name: macOS Clang Compat
            os: macos-latest
            compiler: clang
            configure-args: --warn --zlib-compat

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout repository
        uses: Project-Tick/Project-Tick/.github/actions/source-checkout@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          show-progress: 'false'

      - name: Install packages (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja
        env:
          HOMEBREW_NO_INSTALL_CLEANUP: 1

      - name: Generate project files
        run: ./configure ${{ matrix.configure-args }}
        env:
          CC: ${{ matrix.compiler }}
          CFLAGS: ${{ matrix.cflags }}
          LDFLAGS: ${{ matrix.ldflags }}
          CI: true

      - name: Compile source code
        run: make -j5

      - name: Run test cases
        run: make test

      - name: Upload build errors
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: ${{ matrix.name }} (configure)
          path: |
            Makefile
            configure.log
          retention-days: 30
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
