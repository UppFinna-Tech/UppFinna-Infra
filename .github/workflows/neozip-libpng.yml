name: "neozip: Libpng"

on:
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""

jobs:
  libpng:
    name: Ubuntu Clang
    runs-on: ubuntu-latest
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'

      - name: Generate project files (neozip)
        run: |
          cmake -S . -B build-neozip \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DZLIB_COMPAT=ON \
            -DZLIB_ENABLE_TESTS=OFF
        env:
          CC: clang
          CFLAGS: -fPIC
          CI: true

      - name: Compile source code (neozip)
        run: cmake --build build-neozip -j5 --config Release

      - name: Checkout repository (libpng)
        uses: actions/checkout@v7.0.0
        with:
          repository: glennrp/libpng
          path: libpng
          show-progress: 'false'

      - name: Generate project files (libpng)
        run: |
          cmake -S libpng -B build-libpng \
            -DCMAKE_BUILD_TYPE=Release \
            -DPNG_TESTS=ON \
            -DPNG_STATIC=OFF \
            -DZLIB_INCLUDE_DIR=${{ github.workspace }}/neozip \
            -DZLIB_LIBRARY=${{ github.workspace }}/build-neozip/libz.a
        env:
          CC: clang
          CI: true

      - name: Compile source code (libpng)
        run: cmake --build build-libpng -j5 --config Release

      - name: Run test cases (libpng)
        run: ctest -j5 -C Release --output-on-failure --max-width 120
        working-directory: build-libpng
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
