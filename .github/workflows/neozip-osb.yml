name: "neozip: OSB"

on:
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""

jobs:
  cmake:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 80
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu GCC OSB
            os: ubuntu-latest
            compiler: gcc
            cxx-compiler: g++
            build-dir: ../build
            build-src-dir: ${{ inputs.source-repository != '' && '.' || 'neozip' }}
            cmake-args: -DWITH_BENCHMARKS=ON

          - name: Ubuntu GCC OSB add_subdirectory
            os: ubuntu-latest
            compiler: gcc
            cxx-compiler: g++
            build-dir: ../build
            build-src-dir: ${{ inputs.source-repository != '' && '.' || 'neozip' }}/test/add-subdirectory-project
            cmake-args: -DWITH_BENCHMARKS=ON

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'

      - name: Make source tree read-only
        shell: bash
        run: chmod -R a-w ${{ inputs.source-repository != '' && '.' || 'neozip' }}

      - name: Generate project files
        shell: bash
        run: |
          cmake -S . -B ${{ matrix.build-dir || 'build' }} \
            ${{ matrix.cmake-args }} \
            -DWITH_MAINTAINER_WARNINGS=ON
        env:
          CC: ${{ matrix.compiler }}
          CXX: ${{ matrix.cxx-compiler }}
          CI: true

      - name: Compile source code
        run: cmake --build ${{ matrix.build-dir || 'build' }} --verbose -j5

      - name: Run test cases
        run: ctest --verbose -C Release --output-on-failure --max-width 120 -j 5
        working-directory: ${{ matrix.build-dir || 'build' }}

      - name: Make source tree writable
        shell: bash
        run: chmod -R +w ${{ inputs.source-repository != '' && '.' || 'neozip' }}

      - name: Upload build errors
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: ${{ matrix.name }}
          path: |
            **/CMakeFiles/CMakeOutput.log
            **/CMakeFiles/CMakeError.log
            **/Testing/Temporary/*
          retention-days: 30
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
