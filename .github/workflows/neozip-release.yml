name: "neozip: Release"

on:
  workflow_dispatch:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      source-ref:
        description: Source ref to build.
        type: string
        default: ""
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      source-ref:
        description: Source ref to build.
        type: string
        default: ""

      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""
permissions:
  contents: read

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSVC Win32
            os: windows-latest
            compiler: cl
            cmake-args: -A Win32
            deploy-name: win-x86

          - name: Windows MSVC Win32 Compat
            os: windows-latest
            compiler: cl
            cmake-args: -A Win32 -DZLIB_COMPAT=ON
            deploy-name: win-x86-compat

          - name: Windows MSVC Win64
            os: windows-latest
            compiler: cl
            cmake-args: -A x64
            deploy-name: win-x86-64

          - name: Windows MSVC Win64 Compat
            os: windows-latest
            compiler: cl
            cmake-args: -A x64 -DZLIB_COMPAT=ON
            deploy-name: win-x86-64-compat

          - name: Windows MSVC ARM
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM,version=10.0.22621.0
            deploy-name: win-arm

          - name: Windows MSVC ARM Compat
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM,version=10.0.22621.0 -DZLIB_COMPAT=ON
            deploy-name: win-arm-compat

          - name: Windows MSVC ARM64
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM64
            deploy-name: win-arm64

          - name: Windows MSVC ARM64 Compat
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM64 -DZLIB_COMPAT=ON
            deploy-name: win-arm64-compat

          - name: Windows MSVC ARM64EC
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM64EC
            deploy-name: win-arm64ec

          - name: Windows MSVC ARM64EC Compat
            os: windows-latest
            compiler: cl
            cmake-args: -A ARM64EC -DZLIB_COMPAT=ON
            deploy-name: win-arm64ec-compat

    defaults:
      run:
        working-directory: ${{ inputs.source-repository != '' && '.' || 'neozip' }}

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'

      - name: Set version
        shell: bash
        env:
          SOURCE_REF: ${{ inputs.source-ref || github.ref }}
        run: |
          version="${SOURCE_REF#refs/tags/}"
          version="${version#refs/heads/}"
          echo "VERSION=${version}" >> "$GITHUB_ENV"

      - name: Install Windows 11 SDK (ARM)
        if: matrix.name == 'Windows MSVC ARM' || matrix.name == 'Windows MSVC ARM Compat'
        run: |
          Invoke-WebRequest -Method Get -Uri https://go.microsoft.com/fwlink/p/?LinkId=2250105 -OutFile sdksetup.exe -UseBasicParsing
          Unblock-File sdksetup.exe
          Start-Process -Wait sdksetup.exe -ArgumentList "/q", "/norestart", "/ceip off"

      - name: Generate project files
        shell: bash
        run: |
          cmake . ${{ matrix.cmake-args }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DZLIB_ENABLE_TESTS=ON \
            -DCMAKE_INSTALL_PREFIX=out \
            -DINSTALL_UTILS=ON
        env:
          CC: ${{ matrix.compiler }}
          CI: true

      - name: Compile source code
        run: cmake --build . -j5 --config Release --target install

      - name: Package release
        if: runner.os == 'Windows'
        working-directory: ${{ inputs.source-repository != '' && 'out' || 'neozip/out' }}
        run: 7z a -tzip ../neozip-${{ matrix.deploy-name }}.zip bin include lib ../LICENSE.md ../PORTING.md ../README.md

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: neozip-${{ matrix.deploy-name }}
          path: ${{ inputs.source-repository != '' && format('neozip-{0}.zip', matrix.deploy-name) || format('neozip/neozip-{0}.zip', matrix.deploy-name) }}
          if-no-files-found: error
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
