name: "Release: Package Source Archives"
#
# Polyrepo-aware release dispatcher.
#
# Foreman dispatches this workflow for both monorepo and polyrepo releases.
# The key difference is the `source-repository` input:
#   - Monorepo: source-repository = https://gitlab.com/project-tick/project-tick.git
#   - Polyrepo: source-repository = https://gitlab.com/project-tick/<repo>.git
#
# The `source-ref` always points to the tag being released.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version string override."
        required: false
        type: string
        default: ""
      source-ref:
        description: "Source ref (e.g. refs/tags/meshmc-1.0.0)"
        required: false
        type: string
        default: ""
      source-repository:
        description: "Source repository URL (GitLab). Foreman always sends this."
        required: false
        type: string
        default: ""
      beta_source_only:
        description: "Beta release: skip binary build, source archives only"
        required: false
        type: boolean
        default: false
      callback_url:
        description: Optional Foreman callback base URL
        required: false
        type: string
        default: ""
      callback_token:
        description: Optional Foreman callback bearer token
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      version:
        description: "Version string override."
        required: false
        type: string
        default: ""
      source-ref:
        description: "Source ref (e.g. refs/tags/meshmc-1.0.0)"
        required: false
        type: string
        default: ""
      source-repository:
        description: "Source repository URL (GitLab). Foreman always sends this."
        required: false
        type: string
        default: ""
      beta_source_only:
        description: "Beta release: skip binary build, source archives only"
        required: false
        type: boolean
        default: false
      callback_url:
        required: false
        type: string
        default: ""
      callback_token:
        required: false
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""

permissions: {}

jobs:

  # ── Resolve: hangi proje release ediliyor? ──────────────────────────────────
  resolve:
    name: "Resolve Project"
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      project: ${{ steps.detect.outputs.project }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Detect project from source-repository
        id: detect
        shell: bash
        env:
          SOURCE_REPOSITORY: ${{ inputs.source-repository || '' }}
          SOURCE_REF: ${{ inputs.source-ref || github.ref }}
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          set -euo pipefail

          # Proje adını URL'den çıkar
          # https://projecttick.org/project-tick/projects/meshmc.git → meshmc
          project=""
          if [[ -n "$SOURCE_REPOSITORY" ]]; then
            project="$(basename "$SOURCE_REPOSITORY" .git)"
          fi

          # Version: input > tag'den > ref'den
          version="$INPUT_VERSION"
          if [[ -z "$version" ]]; then
            version="${SOURCE_REF#refs/tags/}"
            version="${version#refs/heads/}"
          fi
          if [[ -z "$version" ]]; then
            version="$GITHUB_REF_NAME"
          fi

          echo "project=$project" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "::notice::Releasing project=$project version=$version"

  # ── MeshMC ──────────────────────────────────────────────────────────────────
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
  meshmc:
    name: "MeshMC Release"
    needs: resolve
    if: needs.resolve.outputs.project == 'meshmc' && inputs.beta_source_only != true
    uses: ./.github/workflows/meshmc-release.yml
    with:
      source-ref: ${{ inputs.source-ref || github.ref }}
      source-repository: ${{ inputs.source-repository || '' }}
    permissions:
      contents: read
      id-token: write
      packages: write
    secrets: inherit

  meshmc-source:
    name: "MeshMC Source Archives"
    needs: resolve
    if: needs.resolve.outputs.project == 'meshmc'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          ref: ${{ inputs.source-ref || github.ref }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: recursive

      - name: Set version
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Prepare source tree
        id: prepare
        uses: Project-Tick/Project-Tick/.github/actions/prepare-source-tree@master
        with:
          project: meshmc
          source-repository: ${{ inputs.source-repository || '' }}
          gitlab-source-token: ${{ secrets.PT_GITLAB_SOURCE_TOKEN }}
          gitlab-source-username: ${{ vars.PT_GITLAB_SOURCE_USERNAME }}

      - name: Package source archives
        uses: Project-Tick/Project-Tick/.github/actions/package-source@master
        with:
          project: meshmc
          version: ${{ env.VERSION }}
          source-dir: ${{ steps.prepare.outputs.source-dir }}
          output-dir: release-artifacts
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-private-key-id: ${{ secrets.GPG_PRIVATE_KEY_ID }}

      - name: Upload source artifacts
        uses: actions/upload-artifact@v7
        with:
          name: meshmc-source-archives
          path: release-artifacts/
          if-no-files-found: error
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}

  meshmc-publish:
    name: "MeshMC Publish"
    needs: [resolve, meshmc, meshmc-source]
    if: |
      always() &&
      needs.resolve.outputs.project == 'meshmc' &&
      (needs.meshmc.result == 'success' || needs.meshmc.result == 'skipped') &&
      needs.meshmc-source.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          ref: ${{ inputs.source-ref || github.ref }}
          source-repository: ${{ inputs.source-repository || '' }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-downloads

      - name: Check FTP credentials
        id: ftp-check-meshmc
        shell: bash
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_KEY: ${{ secrets.FTP_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "${FTP_HOST:-}" || -z "${FTP_USER:-}" || -z "${FTP_KEY:-}" ]]; then
            echo "::warning::FTP credentials missing — skipping meshmc deploy."
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage and deploy
        if: steps.ftp-check-meshmc.outputs.has_creds == 'true'
        uses: Project-Tick/Project-Tick/.github/actions/deploy-release@master
        with:
          version: ${{ needs.resolve.outputs.version }}
          product: meshmc
          beta-source-only: ${{ inputs.beta_source_only && 'true' || 'false' }}
          artifacts-dir: ${{ github.workspace }}/release-downloads
          ftp-host: ${{ secrets.FTP_HOST }}
          ftp-user: ${{ secrets.FTP_USER }}
          ftp-port: ${{ secrets.FTP_SSH_PORT || '22' }}
          ftp-key: ${{ secrets.FTP_SSH_PRIVATE_KEY }}

  # ── NeoZip ──────────────────────────────────────────────────────────────────
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
  neozip:
    name: "NeoZip Release"
    needs: resolve
    if: needs.resolve.outputs.project == 'neozip'
    uses: ./.github/workflows/neozip-release.yml
    with:
      source-repository: ${{ inputs.source-repository || '' }}
      source-ref: ${{ inputs.source-ref || github.ref }}
    permissions:
      contents: read
    secrets: inherit

  neozip-source:
    name: "NeoZip Source Archives"
    needs: resolve
    if: needs.resolve.outputs.project == 'neozip'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          ref: ${{ inputs.source-ref || github.ref }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: recursive

      - name: Set version
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Prepare source tree
        id: prepare
        uses: Project-Tick/Project-Tick/.github/actions/prepare-source-tree@master
        with:
          project: neozip
          source-repository: ${{ inputs.source-repository || '' }}
          gitlab-source-token: ${{ secrets.PT_GITLAB_SOURCE_TOKEN }}
          gitlab-source-username: ${{ vars.PT_GITLAB_SOURCE_USERNAME }}

      - name: Package source archives
        uses: Project-Tick/Project-Tick/.github/actions/package-source@master
        with:
          project: neozip
          version: ${{ env.VERSION }}
          source-dir: ${{ steps.prepare.outputs.source-dir }}
          output-dir: release-artifacts
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-private-key-id: ${{ secrets.GPG_PRIVATE_KEY_ID }}

      - name: Upload source artifacts
        uses: actions/upload-artifact@v7
        with:
          name: neozip-source-archives
          path: release-artifacts/
          if-no-files-found: error
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}

  neozip-publish:
    name: "NeoZip Publish"
    needs: [resolve, neozip, neozip-source]
    if: |
      always() &&
      needs.resolve.outputs.project == 'neozip' &&
      (needs.neozip.result == 'success' || needs.neozip.result == 'skipped') &&
      needs.neozip-source.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          ref: ${{ inputs.source-ref || github.ref }}
          source-repository: ${{ inputs.source-repository || '' }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-downloads

      - name: Check FTP credentials
        id: ftp-check-neozip
        shell: bash
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_KEY: ${{ secrets.FTP_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "${FTP_HOST:-}" || -z "${FTP_USER:-}" || -z "${FTP_KEY:-}" ]]; then
            echo "::warning::FTP credentials missing — skipping neozip deploy."
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage and deploy
        if: steps.ftp-check-neozip.outputs.has_creds == 'true'
        uses: Project-Tick/Project-Tick/.github/actions/deploy-release@master
        with:
          version: ${{ needs.resolve.outputs.version }}
          product: neozip
          artifacts-dir: ${{ github.workspace }}/release-downloads
          ftp-host: ${{ secrets.FTP_HOST }}
          ftp-user: ${{ secrets.FTP_USER }}
          ftp-port: ${{ secrets.FTP_SSH_PORT || '22' }}
          ftp-key: ${{ secrets.FTP_SSH_PRIVATE_KEY }}

  # ── Source-only projects ─────────────────────────────────────────
  # cgit, cmark, corebinutils, forgewrapper, genqrcode,
  # json4cpp, libnbtplusplus, mnv, tomlplusplus
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
  source-only:
    name: "Source Archives (${{ needs.resolve.outputs.project }})"
    needs: resolve
    if: |
      needs.resolve.outputs.project != '' &&
      needs.resolve.outputs.project != 'meshmc' &&
      needs.resolve.outputs.project != 'neozip'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          ref: ${{ inputs.source-ref || github.ref }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: recursive

      - name: Set version
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Prepare source tree
        id: prepare
        uses: Project-Tick/Project-Tick/.github/actions/prepare-source-tree@master
        with:
          project: ${{ needs.resolve.outputs.project }}
          source-repository: ${{ inputs.source-repository || '' }}
          gitlab-source-token: ${{ secrets.PT_GITLAB_SOURCE_TOKEN }}
          gitlab-source-username: ${{ vars.PT_GITLAB_SOURCE_USERNAME }}

      - name: Package source archives
        uses: Project-Tick/Project-Tick/.github/actions/package-source@master
        with:
          project: ${{ needs.resolve.outputs.project }}
          version: ${{ env.VERSION }}
          source-dir: ${{ steps.prepare.outputs.source-dir }}
          output-dir: release-artifacts
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-private-key-id: ${{ secrets.GPG_PRIVATE_KEY_ID }}

      - name: Upload source artifacts
        uses: actions/upload-artifact@v7
        with:
          name: source-${{ needs.resolve.outputs.project }}
          path: release-artifacts/
          if-no-files-found: error
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}

  source-only-publish:
    name: "Publish (${{ needs.resolve.outputs.project }})"
    needs: [resolve, source-only]
    if: |
      always() &&
      needs.resolve.outputs.project != '' &&
      needs.resolve.outputs.project != 'meshmc' &&
      needs.resolve.outputs.project != 'neozip' &&
      needs.source-only.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          ref: ${{ inputs.source-ref || github.ref }}
          source-repository: ${{ inputs.source-repository || '' }}

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: source-${{ needs.resolve.outputs.project }}
          path: deploy-artifacts

      - name: Deploy to FTP
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          PRODUCT: ${{ needs.resolve.outputs.project }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PORT: ${{ secrets.FTP_SSH_PORT || '22' }}
          FTP_KEY: ${{ secrets.FTP_SSH_PRIVATE_KEY }}
          REMOTE_BASE: /var/www/ftp/Project-Tick
        run: |
          set -euo pipefail

          # FTP secret'ları yoksa deploy adımını sessizce atla.
          if [[ -z "${FTP_HOST:-}" || -z "${FTP_USER:-}" || -z "${FTP_KEY:-}" ]]; then
            echo "::warning::FTP credentials missing — skipping ${PRODUCT} ${VERSION} deploy."
            exit 0
          fi

          install -d -m 700 ~/.ssh
          printf '%s\n' "$FTP_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$FTP_PORT" -H "$FTP_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

          remote="${REMOTE_BASE}/${PRODUCT}/releases/download/${VERSION}"
          ssh -p "$FTP_PORT" "$FTP_USER@$FTP_HOST" "mkdir -p '${remote}'"
          rsync -av --chmod=D755,F644 \
            -e "ssh -p ${FTP_PORT} -o StrictHostKeyChecking=yes" \
            deploy-artifacts/ \
            "${FTP_USER}@${FTP_HOST}:${remote}/"

  # ── Callback Status ──────────────────────────────────────────────────────────
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
  callback-status:
    name: "Callback Status"
    if: always()
    needs:
      - resolve
      - meshmc
      - meshmc-source
      - meshmc-publish
      - neozip
      - neozip-source
      - neozip-publish
      - source-only
      - source-only-publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          ref: ${{ inputs.source-ref || github.ref }}
          source-repository: ${{ inputs.source-repository || '' }}

      - name: Resolve cancelled status
        id: resolve-cancelled
        if: cancelled()
        run: echo "status=cancelled" >> "$GITHUB_OUTPUT"

      - name: Resolve final status
        id: resolve-status
        if: ${{ !cancelled() }}
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          status="success"
          if jq -e 'to_entries[] | select(.value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Report final status
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-send-callback@master
        with:
          callback_url: ${{ inputs.callback_url || '' }}
          callback_token: ${{ inputs.callback_token || '' }}
          pipeline_id: ""
          foreman_base_url: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          endpoint: status
          payload_json: ${{ format('{{"status":"{0}"}}', steps.resolve-cancelled.outputs.status || steps.resolve-status.outputs.status || 'failure') }}
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
