name: "tomlplusplus: CI"

on:
  workflow_dispatch:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""

env:
  clang_version: "14"
  gcc_version: "11"

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - "clang"
          - "gcc"
        linker:
          - "lld"
        type:
          - "debug"
          - "release"

    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.source-repository != '' && '.' || 'tomlplusplus' }}

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'

      - name: Install base dependencies
        working-directory: .
        run: |
          sudo apt -y update
          sudo apt -y install --no-install-recommends git ninja-build libstdc++-${{ env.gcc_version }}-dev locales-all

      - name: Install python dependencies
        run: |
          pip3 install --user --no-cache-dir --upgrade meson
          pip3 install --user --no-cache-dir --upgrade -r tools/requirements.txt

      - name: Check toml.hpp
        run: |
          cd tools
          python3 ci_single_header_check.py

      - name: Install lld
        if: ${{ startsWith(matrix.linker, 'lld') }}
        run: |
          sudo apt -y install --no-install-recommends lld-${{ env.clang_version }}
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-${{ env.clang_version }} 1000

      - name: Install clang
        if: ${{ startsWith(matrix.compiler, 'clang') }}
        run: |
          sudo apt -y install --no-install-recommends clang-${{ env.clang_version }}
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/clang++-${{ env.clang_version }} 1000
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang-${{ env.clang_version }} 1000

      - name: Install gcc
        if: ${{ startsWith(matrix.compiler, 'gcc') }}
        run: |
          sudo apt -y install --no-install-recommends gcc-${{ env.gcc_version }} g++-${{ env.gcc_version }}
          sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++-${{ env.gcc_version }} 1000
          sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc-${{ env.gcc_version }} 1000

      - name: Configure locales
        run: |
          sudo locale-gen 'en_US.utf8' 'ja_JP.utf8' 'de_DE.utf8' 'it_IT.utf8' 'tr_TR.utf8' 'fi_FI.utf8' 'fr_FR.utf8' 'zh_CN.utf8'

      - name: Configure Meson
        run: |
          CXX=c++ CXX_LD=${{ matrix.linker }} meson setup build --buildtype=${{ matrix.type }} -Ddevel=true -Db_lto=false

      - name: Build
        run: meson compile -C build

      - name: Test
        run: meson test -C build --verbose
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}

  windows:
    strategy:
      fail-fast: false
      matrix:
        type:
          - "debug"
          - "release"
        permissive:
          - false
          - true
        arch:
          - name: "x64"
            runner: "windows-2022"
          - name: "arm64"
            runner: "windows-11-arm"
    runs-on: ${{ matrix.arch.runner }}

    defaults:
      run:
        shell: cmd
        working-directory: ${{ inputs.source-repository != '' && '.' || 'tomlplusplus' }}

    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}
      - name: Checkout repository
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          source-repository: ${{ inputs.source-repository || '' }}
          show-progress: 'false'

      - name: Install dependencies
        working-directory: .
        run: |
          python3 -m pip install -U pip
          pip3 install meson ninja

      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: ${{ matrix.arch.name }}

      - name: Configure Meson
        run: meson setup build --vsenv --buildtype=${{ matrix.type }} -Ddevel=true -Db_lto=false -Dpermissive=${{ matrix.permissive }}

      - name: Build
        run: meson compile -C build

      - name: Test
        run: meson test -C build --verbose
      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
