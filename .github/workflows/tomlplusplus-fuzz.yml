name: "tomlplusplus: Fuzz"

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      source-repository:
        description: Source repository URL (GitLab).
        type: string
        default: ""
      foreman-pipeline-id:
        description: Foreman pipeline ID for log streaming.
        type: string
        default: ""
      foreman-plan:
        description: >-
          Compact JSON plan returned by Foreman gate. When present
          enables quarantine-aware test runs, cost-aware runner
          selection, and the cancel-check heartbeat. Leave empty
          to disable.
        type: string
        default: ""
      foreman-callback-url:
        description: Foreman callback base URL for this pipeline.
        type: string
        default: ""
      foreman-callback-token:
        description: Foreman callback bearer token for this pipeline.
        type: string
        default: ""

permissions:
  contents: read

jobs:
  fuzzing:
    name: Fuzzing
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
    - name: Foreman job init
      id: foreman
      uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
      with:
        callback_url:      ${{ inputs.foreman-callback-url }}
        callback_token:    ${{ inputs.foreman-callback-token }}
        pipeline_id:       ${{ inputs.foreman-pipeline-id }}
        foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
        job_name:          ${{ github.job }}
        plan_json:         ${{ inputs.foreman-plan }}
    - name: Checkout repository
      uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
      with:
        source-repository: ${{ inputs.source-repository || '' }}
        show-progress: 'false'
    - name: Build Fuzzers
      id: build
      uses: google/oss-fuzz/infra/cifuzz/actions/build_fuzzers@ea7eeb3ee4de363d97c5067b9b72379423f63da2 # master
      with:
        language: c++
    - name: Run Fuzzers
      uses: google/oss-fuzz/infra/cifuzz/actions/run_fuzzers@ea7eeb3ee4de363d97c5067b9b72379423f63da2 # master
      with:
        language: c++
        fuzz-seconds: 800
        output-sarif: true
    - name: Upload Crash
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: failure() && steps.build.outcome == 'success'
      with:
        name: tomlplusplus-fuzz-artifacts
        path: ./out/artifacts
    - name: Upload Sarif
      if: always() && steps.build.outcome == 'success'
      uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
      with:
        sarif_file: cifuzz-sarif/results.sarif
        checkout_path: cifuzz-sarif

    - name: Foreman job finalize
      if: always()
      uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
      with:
        callback_url:      ${{ inputs.foreman-callback-url }}
        callback_token:    ${{ inputs.foreman-callback-token }}
        pipeline_id:       ${{ inputs.foreman-pipeline-id }}
        foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
        job_name:          ${{ github.job }}
        job_status:        ${{ job.status }}
