      contents: read
    with:
      source-ref: ${{ inputs.source-ref }}
      source-repository: ${{ inputs.source-repository }}
      foreman-pipeline-id: ${{ needs.callback-start.outputs.pipeline_id }}
      foreman-plan: ${{ inputs.foreman-plan }}
      foreman-callback-url: ${{ needs.callback-start.outputs.callback_url }}
      foreman-callback-token: ${{ needs.callback-start.outputs.cb_auth }}
    secrets: inherit

  verdict:
    name: "Uppfinna Verdict"
    if: always()
    needs:
      - callback-start
      - build-cng
      - cng-build-images
      - setup-checks
      - gems
      - vendored-gems
      - compile-test-assets
      - eslint-docs
      - jest-build-cache
      - rubocop-docs
      - yaml-lint
      - rubocop
      - haml-lint
      - eslint
      - static-analysis
      - graphql-schema-dump
      - static-verification-db
      - audit-event-types-verify
      - permissions-verify
      - ci-job-token-policies-verify
      - db-rollback
      - db-migrate-reset
      - db-check-schema
      - db-migrate-non-superuser
      - workhorse-verify
      - workhorse-logging-field-validator
      - workhorse-test
      - fast-spec
      - rspec
      - jest
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Resolve final status
        id: resolve
        if: always()
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          status="success"
          if jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "failure")' <<< "$NEEDS_JSON" >/dev/null; then
            status="failure"
          elif jq -e 'to_entries[] | select(.key != "callback-start" and .value.result == "cancelled")' <<< "$NEEDS_JSON" >/dev/null; then
            status="cancelled"
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"

          echo "=== Uppfinna job results ==="
          jq -r 'to_entries[] | select(.key != "callback-start") | "\(.value.result)\t\(.key)"' <<< "$NEEDS_JSON"

      - name: Report final Uppfinna status to Foreman
        if: always()
        shell: bash
        env:
          PIPELINE_ID: ${{ needs.callback-start.outputs.pipeline_id }}
          FOREMAN_BASE_URL: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          FOREMAN_API_TOKEN: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          PIPELINE_STATUS: ${{ steps.resolve.outputs.status || 'failure' }}
        run: |
          set -euo pipefail
          if [[ -z "$PIPELINE_ID" || -z "$FOREMAN_API_TOKEN" ]]; then
            echo "Callback pipeline/admin token missing; skipping status report."
            exit 0
          fi
          payload="$(printf '{\"status\":\"%s\"}' "$PIPELINE_STATUS")"
          curl \
            --silent --show-error \
            --retry 3 --retry-all-errors --max-time 15 \
            --request POST \
            --header "Authorization: Bearer $FOREMAN_API_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$payload" \
            "${FOREMAN_BASE_URL%/}/api/pipelines/${PIPELINE_ID}/admin-callback/status" \
            || echo "::warning::Final status callback failed (non-fatal)"

      - name: Enforce verdict
        if: always()
        shell: bash
        env:
          PIPELINE_STATUS: ${{ steps.resolve.outputs.status }}
        run: |
          set -euo pipefail
          if [ "$PIPELINE_STATUS" != "success" ]; then
            echo "Uppfinna pipeline ${PIPELINE_STATUS}."
            exit 1
          fi
          echo "Uppfinna pipeline passed."
