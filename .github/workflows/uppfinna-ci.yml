name: "Uppfinna: GitLab Fork CI"

# NOTE: `workflow_dispatch.inputs` MUST be a superset of every input
# Foreman's dispatcher sends. GitHub rejects the WHOLE dispatch with 422
# "Unexpected inputs provided" if the request carries any key not declared
# here — which silently leaves the Foreman pipeline stuck in `pending`
# (the transaction that flips it to `running` rolls back). Foreman's
# generic dispatch contract is the one the working `ci.yml` declares:
# force-all / event-name / event-actor / source-sha / before-sha /
# head-ref / base-ref / pr-* / callback_url / callback_token, plus the
# foreman-* gate-plan keys. Keep this list in lockstep with that contract.
on:
  workflow_call:
    inputs:
      force-all: { type: string, default: "" }
      build-type: { type: string, default: "" }
      source-repository: { type: string, default: "" }
      source-ref: { type: string, default: "" }
      event-name: { type: string, default: "" }
      event-actor: { type: string, default: "" }
      source-sha: { type: string, default: "" }
      before-sha: { type: string, default: "" }
      head-ref: { type: string, default: "" }
      base-ref: { type: string, default: "" }
      pr-number: { type: string, default: "" }
      pr-base-sha: { type: string, default: "" }
      pr-head-sha: { type: string, default: "" }
      pr-title: { type: string, default: "" }
      pr-draft: { type: string, default: "" }
      callback_url: { type: string, default: "" }
      callback_token: { type: string, default: "" }
      foreman-plan: { type: string, default: "" }
      foreman-pipeline-id: { type: string, default: "" }
      foreman-callback-url: { type: string, default: "" }
      foreman-callback-token: { type: string, default: "" }
  workflow_dispatch:
    inputs:
      force-all: { type: string, default: "" }
      build-type: { type: string, default: "" }
      source-repository: { type: string, default: "" }
      source-ref: { type: string, default: "" }
      event-name: { type: string, default: "" }
      event-actor: { type: string, default: "" }
      source-sha: { type: string, default: "" }
      before-sha: { type: string, default: "" }
      head-ref: { type: string, default: "" }
      base-ref: { type: string, default: "" }
      pr-number: { type: string, default: "" }
      pr-base-sha: { type: string, default: "" }
      pr-head-sha: { type: string, default: "" }
      pr-title: { type: string, default: "" }
      pr-draft: { type: string, default: "" }
      callback_url: { type: string, default: "" }
      callback_token: { type: string, default: "" }
      foreman-plan: { type: string, default: "" }
      foreman-pipeline-id: { type: string, default: "" }
      foreman-callback-url: { type: string, default: "" }
      foreman-callback-token: { type: string, default: "" }

permissions: {}

env:
  CI_EVENT_NAME: ${{ github.event_name }}
  CI_REF: ${{ inputs.source-ref || github.ref }}
  CI_SHA: ${{ github.sha }}

jobs:
  callback-start:
    name: "Callback Start"
    runs-on: ubuntu-latest
    outputs:
      callback_url: ${{ steps.prepare.outputs.callback_url }}
      cb_auth: ${{ steps.prepare.outputs.cb_auth }}
      pipeline_id: ${{ steps.prepare.outputs.pipeline_id }}
    permissions: {}
    steps:
      - name: Prepare callback destination
        id: prepare
        shell: bash
        env:
          # Foreman's dispatcher sends snake_case callback_url / callback_token
          # (and, only when FF foreman_plan_dispatch_inject is on, the kebab
          # foreman-* keys). Read the snake keys first — they are what arrives
          # today — and fall back to the kebab foreman-* forms so this keeps
          # working if/when the plan-injection flag flips on.
          INPUT_PIPELINE_ID: ${{ inputs.foreman-pipeline-id || '' }}
          INPUT_CALLBACK_URL: ${{ inputs.callback_url || inputs.foreman-callback-url || '' }}
          INPUT_CALLBACK_TOKEN: ${{ inputs.callback_token || inputs.foreman-callback-token || '' }}
          FOREMAN_BASE_URL: ${{ vars.FOREMAN_BASE_URL || 'https://builds.projecttick.net' }}
          FOREMAN_API_TOKEN: ${{ secrets.FOREMAN_API_TOKEN || '' }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_REPOSITORY: ${{ inputs.source-repository || '' }}
          REF: ${{ env.CI_REF }}
          SHA: ${{ env.CI_SHA }}
        run: |
          set -euo pipefail

          callback_url=""
          callback_token=""
          pipeline_id=""

          if [[ -n "$INPUT_CALLBACK_URL" && -n "$INPUT_CALLBACK_TOKEN" ]]; then
            callback_url="$INPUT_CALLBACK_URL"
            callback_token="$INPUT_CALLBACK_TOKEN"
            pipeline_id="$INPUT_PIPELINE_ID"
          elif [[ -n "$FOREMAN_API_TOKEN" ]]; then
            if [[ -n "$SOURCE_REPOSITORY" ]]; then
              app_id="$(basename "$SOURCE_REPOSITORY" .git)"
              repo="$SOURCE_REPOSITORY"
            else
              app_id="${REPOSITORY#*/}"
              repo="$REPOSITORY"
            fi

            payload="$(jq -nc \
              --arg app_id "$app_id" \
              --arg repo "$repo" \
              --arg ref "$REF" \
              --arg sha "$SHA" \
              '{
                app_id: $app_id,
                params: {
                  repo: $repo,
                  ref: $ref,
                  sha: $sha,
                  native_github_ci: "true",
                  pipeline_kind: "uppfinna"
                }
              }')"

            if register_response="$(curl \
              --silent --show-error --fail \
              --retry 3 --retry-all-errors \
              --request POST \
              --header "Authorization: Bearer $FOREMAN_API_TOKEN" \
              --header "Content-Type: application/json" \
              --data "$payload" \
              "${FOREMAN_BASE_URL%/}/api/pipelines/external")"; then
              callback_url="$(printf '%s' "$register_response" | jq -r '.callback_url // ""')"
              callback_token="$(printf '%s' "$register_response" | jq -r '.callback_token // ""')"
              pipeline_id="$(printf '%s' "$register_response" | jq -r '.pipeline_id // ""')"
            else
              echo "::warning::Failed to register this Uppfinna run in Foreman."
            fi
          else
            echo "No Foreman callback destination configured."
          fi

          if [[ -z "$pipeline_id" && -n "$callback_url" ]]; then
            pipeline_id="$(printf '%s' "$callback_url" | sed -nE 's#^.*/api/pipelines/([0-9a-fA-F-]+)/callback/?$#\1#p')"
          fi

          {
            echo "callback_url=$callback_url"
            echo "cb_auth=$callback_token"
            echo "pipeline_id=$pipeline_id"
          } >> "$GITHUB_OUTPUT"

      - name: Report workflow run URL
        if: steps.prepare.outputs.callback_url != '' && steps.prepare.outputs.cb_auth != ''
        shell: bash
        env:
          CALLBACK_URL: ${{ steps.prepare.outputs.callback_url }}
          CALLBACK_TOKEN: ${{ steps.prepare.outputs.cb_auth }}
          RUN_URL: ${{ format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
        run: |
          set -euo pipefail
          payload="$(printf '{\"log_url\":\"%s\"}' "$RUN_URL")"
          curl \
            --silent --show-error \
            --retry 3 --retry-all-errors --max-time 15 \
            --request POST \
            --header "Authorization: Bearer $CALLBACK_TOKEN" \
            --header "Content-Type: application/json" \
            --data "$payload" \
            "${CALLBACK_URL%/}/log_url" \
            || echo "::warning::log_url callback failed (non-fatal)"

  build-cng:
    name: Build CNG
    needs: callback-start
    uses: ./.github/workflows/uppfinna-build-cng.yml
    permissions:
      contents: read
    with:
      source-ref: ${{ inputs.source-ref }}
      source-repository: ${{ inputs.source-repository }}
      foreman-pipeline-id: ${{ needs.callback-start.outputs.pipeline_id }}
      foreman-plan: ${{ inputs.foreman-plan }}
      foreman-callback-url: ${{ needs.callback-start.outputs.callback_url }}
      foreman-callback-token: ${{ needs.callback-start.outputs.cb_auth }}
    secrets: inherit

  cng-build-images:
    name: CNG Build Images
    needs: [callback-start, build-cng]
    if: needs.build-cng.result == 'success'
    uses: ./.github/workflows/uppfinna-cng-build-images.yml
    permissions:
      contents: read
    with:
      gitlab-version: ${{ needs.build-cng.outputs.gitlab_version }}
      image-tag: ${{ needs.build-cng.outputs.image_tag }}
      cng-repository: 'https://git.projecttick.org/project-tick/uppfinna/cng'
    secrets: inherit

  deploy:
    name: Deploy
    needs: [callback-start, build-cng, cng-build-images, rspec, rubocop, yaml-lint, setup-checks]
    if: |
      vars.DEPLOY_ENABLED == 'true' &&
      inputs.event-name != 'pull_request' &&
      (inputs.source-ref == '' || endsWith(inputs.source-ref, '/master') || inputs.source-ref == 'master') &&
      needs.build-cng.result == 'success' &&
      needs.cng-build-images.result == 'success' &&
      needs.rspec.result == 'success' &&
      needs.rubocop.result == 'success' &&
      needs.yaml-lint.result == 'success' &&
      needs.setup-checks.result == 'success'
    uses: ./.github/workflows/uppfinna-deploy.yml
    permissions:
      contents: read
    with:
      image-tag: ${{ needs.build-cng.outputs.image_tag }}
      environment: production
      source-ref: ${{ inputs.source-ref }}
      source-repository: ${{ inputs.source-repository }}
      foreman-pipeline-id: ${{ needs.callback-start.outputs.pipeline_id }}
      foreman-plan: ${{ inputs.foreman-plan }}
      foreman-callback-url: ${{ needs.callback-start.outputs.callback_url }}
      foreman-callback-token: ${{ needs.callback-start.outputs.cb_auth }}
    secrets: inherit

  setup-checks:
