name: "CNG: Build Images"

on:
  workflow_call:
    inputs:
      gitlab-version:
        type: string
        default: "master"
      image-tag:
        type: string
        default: ""
      is-default-branch:
        type: string
        default: "true"
      cng-ref:
        type: string
        default: "master"
      cng-repository:
        type: string
        default: ""
      gitaly-version:
        type: string
        default: ""
      gitlab-shell-version:
        type: string
        default: ""
      gitlab-pages-version:
        type: string
        default: ""
      gitlab-kas-version:
        type: string
        default: ""
      gitlab-elasticsearch-indexer-version:
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      gitlab-version:
        type: string
        default: "master"
      image-tag:
        type: string
        default: ""
      is-default-branch:
        type: string
        default: "true"
      cng-ref:
        type: string
        default: "master"
      cng-repository:
        type: string
        default: ""

permissions: {}

jobs:
  ##########################################################################
  # phase-zero
  ##########################################################################
  phase-zero-build:
    name: "phase-zero-build: ${{ matrix.image }} (${{ matrix.arch }})"
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image: [gitlab-go, gitlab-rust]
        arch: [amd64, arm64]
    steps:
      - uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.cng-repository != '' && inputs.cng-repository || 'https://projecttick.org/project-tick/uppfinna/cng' }}
          source-ref: ${{ inputs.cng-ref || 'master' }}
          submodules: true
      - uses: Project-Tick/Project-Tick/.github/actions/uppfinna-cng-image@master
        with:
          image: ${{ matrix.image }}
          mode: build
          arch: ${{ matrix.arch }}
          gitlab-version: ${{ inputs.gitlab-version }}
          image-tag: ${{ inputs.image-tag }}
          gitaly-version: ${{ inputs.gitaly-version }}
          gitlab-shell-version: ${{ inputs.gitlab-shell-version }}
          gitlab-pages-version: ${{ inputs.gitlab-pages-version }}
          gitlab-kas-version: ${{ inputs.gitlab-kas-version }}
          gitlab-elasticsearch-indexer-version: ${{ inputs.gitlab-elasticsearch-indexer-version }}
          registry-user: ${{ secrets.CNG_REGISTRY_USER }}
          registry-password: ${{ secrets.CNG_REGISTRY_PASSWORD }}
          fetch-artifacts-pat: ${{ secrets.CNG_FETCH_ARTIFACTS_PAT }}
          ci-registry: ${{ vars.CNG_REGISTRY || 'registry.projecttick.org' }}
          ci-registry-image: ${{ vars.CNG_REGISTRY_IMAGE || 'registry.projecttick.org/project-tick/uppfinna/cng' }}
          gitlab-namespace: ${{ vars.CNG_GITLAB_NAMESPACE || 'project-tick/uppfinna/forge' }}
          ce-project: ${{ vars.CNG_CE_PROJECT || 'uppfinna-project' }}
          ci-api-v4-url: ${{ vars.CNG_API_V4_URL || 'https://projecttick.org/api/v4' }}
          ci-server-fqdn: ${{ vars.CNG_SERVER_FQDN || 'projecttick.org' }}
          gitaly-git-repo-url: ${{ vars.CNG_GITALY_GIT_REPO_URL || 'https://projecttick.org/project-tick/uppfinna/forge/git.git' }}
          assets-image-registry-prefix: ${{ vars.CNG_ASSETS_IMAGE_REGISTRY_PREFIX || 'registry.projecttick.org/project-tick/uppfinna' }}

  phase-zero-merge:
    name: "phase-zero-merge: ${{ matrix.image }}"
    needs: phase-zero-build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image: [gitlab-go, gitlab-rust]
    steps:
      - uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.cng-repository != '' && inputs.cng-repository || 'https://projecttick.org/project-tick/uppfinna/cng' }}
          source-ref: ${{ inputs.cng-ref || 'master' }}
          submodules: true
      - uses: Project-Tick/Project-Tick/.github/actions/uppfinna-cng-image@master
        with:
          image: ${{ matrix.image }}
          mode: merge
          gitlab-version: ${{ inputs.gitlab-version }}
          image-tag: ${{ inputs.image-tag }}
          is-default-branch: ${{ inputs.is-default-branch }}
          gitaly-version: ${{ inputs.gitaly-version }}
          gitlab-shell-version: ${{ inputs.gitlab-shell-version }}
          gitlab-pages-version: ${{ inputs.gitlab-pages-version }}
          gitlab-kas-version: ${{ inputs.gitlab-kas-version }}
          gitlab-elasticsearch-indexer-version: ${{ inputs.gitlab-elasticsearch-indexer-version }}
          registry-user: ${{ secrets.CNG_REGISTRY_USER }}
          registry-password: ${{ secrets.CNG_REGISTRY_PASSWORD }}
          fetch-artifacts-pat: ${{ secrets.CNG_FETCH_ARTIFACTS_PAT }}
          ci-registry: ${{ vars.CNG_REGISTRY || 'registry.projecttick.org' }}
          ci-registry-image: ${{ vars.CNG_REGISTRY_IMAGE || 'registry.projecttick.org/project-tick/uppfinna/cng' }}
          gitlab-namespace: ${{ vars.CNG_GITLAB_NAMESPACE || 'project-tick/uppfinna/forge' }}
          ce-project: ${{ vars.CNG_CE_PROJECT || 'uppfinna-project' }}
          ci-api-v4-url: ${{ vars.CNG_API_V4_URL || 'https://projecttick.org/api/v4' }}
          ci-server-fqdn: ${{ vars.CNG_SERVER_FQDN || 'projecttick.org' }}
          gitaly-git-repo-url: ${{ vars.CNG_GITALY_GIT_REPO_URL || 'https://projecttick.org/project-tick/uppfinna/forge/git.git' }}
          assets-image-registry-prefix: ${{ vars.CNG_ASSETS_IMAGE_REGISTRY_PREFIX || 'registry.projecttick.org/project-tick/uppfinna' }}

  ##########################################################################
  # phase-one
  ##########################################################################
  phase-one-build:
    name: "phase-one-build: ${{ matrix.image }} (${{ matrix.arch }})"
    needs: phase-zero-merge
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image: [gitlab-logger, gitlab-gomplate, gitlab-graphicsmagick, gitlab-python, postgresql, cfssl-self-sign, kubectl]
        arch: [amd64, arm64]
    steps:
      - uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.cng-repository != '' && inputs.cng-repository || 'https://projecttick.org/project-tick/uppfinna/cng' }}
          source-ref: ${{ inputs.cng-ref || 'master' }}
          submodules: true
      - uses: Project-Tick/Project-Tick/.github/actions/uppfinna-cng-image@master
        with:
          image: ${{ matrix.image }}
          mode: build
          arch: ${{ matrix.arch }}
          gitlab-version: ${{ inputs.gitlab-version }}
          image-tag: ${{ inputs.image-tag }}
          gitaly-version: ${{ inputs.gitaly-version }}
          gitlab-shell-version: ${{ inputs.gitlab-shell-version }}
          gitlab-pages-version: ${{ inputs.gitlab-pages-version }}
          gitlab-kas-version: ${{ inputs.gitlab-kas-version }}
          gitlab-elasticsearch-indexer-version: ${{ inputs.gitlab-elasticsearch-indexer-version }}
          registry-user: ${{ secrets.CNG_REGISTRY_USER }}
          registry-password: ${{ secrets.CNG_REGISTRY_PASSWORD }}
          fetch-artifacts-pat: ${{ secrets.CNG_FETCH_ARTIFACTS_PAT }}
          ci-registry: ${{ vars.CNG_REGISTRY || 'registry.projecttick.org' }}
          ci-registry-image: ${{ vars.CNG_REGISTRY_IMAGE || 'registry.projecttick.org/project-tick/uppfinna/cng' }}
          gitlab-namespace: ${{ vars.CNG_GITLAB_NAMESPACE || 'project-tick/uppfinna/forge' }}
          ce-project: ${{ vars.CNG_CE_PROJECT || 'uppfinna-project' }}
          ci-api-v4-url: ${{ vars.CNG_API_V4_URL || 'https://projecttick.org/api/v4' }}
          ci-server-fqdn: ${{ vars.CNG_SERVER_FQDN || 'projecttick.org' }}
          gitaly-git-repo-url: ${{ vars.CNG_GITALY_GIT_REPO_URL || 'https://projecttick.org/project-tick/uppfinna/forge/git.git' }}
          assets-image-registry-prefix: ${{ vars.CNG_ASSETS_IMAGE_REGISTRY_PREFIX || 'registry.projecttick.org/project-tick/uppfinna' }}

  phase-one-merge:
    name: "phase-one-merge: ${{ matrix.image }}"
    needs: phase-one-build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image: [gitlab-logger, gitlab-gomplate, gitlab-graphicsmagick, gitlab-python, postgresql, cfssl-self-sign, kubectl]
    steps:
      - uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.cng-repository != '' && inputs.cng-repository || 'https://projecttick.org/project-tick/uppfinna/cng' }}
          source-ref: ${{ inputs.cng-ref || 'master' }}
          submodules: true
      - uses: Project-Tick/Project-Tick/.github/actions/uppfinna-cng-image@master
        with:
          image: ${{ matrix.image }}
          mode: merge
          gitlab-version: ${{ inputs.gitlab-version }}
          image-tag: ${{ inputs.image-tag }}
          is-default-branch: ${{ inputs.is-default-branch }}
          gitaly-version: ${{ inputs.gitaly-version }}
          gitlab-shell-version: ${{ inputs.gitlab-shell-version }}
          gitlab-pages-version: ${{ inputs.gitlab-pages-version }}
          gitlab-kas-version: ${{ inputs.gitlab-kas-version }}
          gitlab-elasticsearch-indexer-version: ${{ inputs.gitlab-elasticsearch-indexer-version }}
          registry-user: ${{ secrets.CNG_REGISTRY_USER }}
          registry-password: ${{ secrets.CNG_REGISTRY_PASSWORD }}
          fetch-artifacts-pat: ${{ secrets.CNG_FETCH_ARTIFACTS_PAT }}
          ci-registry: ${{ vars.CNG_REGISTRY || 'registry.projecttick.org' }}
          ci-registry-image: ${{ vars.CNG_REGISTRY_IMAGE || 'registry.projecttick.org/project-tick/uppfinna/cng' }}
          gitlab-namespace: ${{ vars.CNG_GITLAB_NAMESPACE || 'project-tick/uppfinna/forge' }}
          ce-project: ${{ vars.CNG_CE_PROJECT || 'uppfinna-project' }}
          ci-api-v4-url: ${{ vars.CNG_API_V4_URL || 'https://projecttick.org/api/v4' }}
          ci-server-fqdn: ${{ vars.CNG_SERVER_FQDN || 'projecttick.org' }}
          gitaly-git-repo-url: ${{ vars.CNG_GITALY_GIT_REPO_URL || 'https://projecttick.org/project-tick/uppfinna/forge/git.git' }}
          assets-image-registry-prefix: ${{ vars.CNG_ASSETS_IMAGE_REGISTRY_PREFIX || 'registry.projecttick.org/project-tick/uppfinna' }}

  ##########################################################################
  # phase-two (gitlab-base)
  ##########################################################################
  phase-two-build:
    name: "phase-two-build: gitlab-base (${{ matrix.arch }})"
    needs: phase-one-merge
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: Project-Tick-Infrastructure/checkout@v5
        with:
          source-repository: ${{ inputs.cng-repository != '' && inputs.cng-repository || 'https://projecttick.org/project-tick/uppfinna/cng' }}
          source-ref: ${{ inputs.cng-ref || 'master' }}
          submodules: true
      - uses: Project-Tick/Project-Tick/.github/actions/uppfinna-cng-image@master
        with:
          image: gitlab-base
          mode: build
          arch: ${{ matrix.arch }}
          gitlab-version: ${{ inputs.gitlab-version }}
          image-tag: ${{ inputs.image-tag }}
          is-default-branch: ${{ inputs.is-default-branch }}
          registry-user: ${{ secrets.CNG_REGISTRY_USER }}
          registry-password: ${{ secrets.CNG_REGISTRY_PASSWORD }}
          fetch-artifacts-pat: ${{ secrets.CNG_FETCH_ARTIFACTS_PAT }}
          ci-registry: ${{ vars.CNG_REGISTRY || 'registry.projecttick.org' }}
          ci-registry-image: ${{ vars.CNG_REGISTRY_IMAGE || 'registry.projecttick.org/project-tick/uppfinna/cng' }}
          gitlab-namespace: ${{ vars.CNG_GITLAB_NAMESPACE || 'project-tick/uppfinna/forge' }}
          ce-project: ${{ vars.CNG_CE_PROJECT || 'uppfinna-project' }}
          ci-api-v4-url: ${{ vars.CNG_API_V4_URL || 'https://projecttick.org/api/v4' }}
          ci-server-fqdn: ${{ vars.CNG_SERVER_FQDN || 'projecttick.org' }}
          gitaly-git-repo-url: ${{ vars.CNG_GITALY_GIT_REPO_URL || 'https://projecttick.org/project-tick/uppfinna/forge/git.git' }}
          assets-image-registry-prefix: ${{ vars.CNG_ASSETS_IMAGE_REGISTRY_PREFIX || 'registry.projecttick.org/project-tick/uppfinna' }}

  phase-two-merge:
    name: "phase-two-merge: gitlab-base"
    needs: phase-two-build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
