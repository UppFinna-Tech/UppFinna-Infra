          ci-registry-image: ${{ vars.CNG_REGISTRY_IMAGE || 'registry.projecttick.org/project-tick/uppfinna/cng' }}
          gitlab-namespace: ${{ vars.CNG_GITLAB_NAMESPACE || 'project-tick/uppfinna/forge' }}
          ce-project: ${{ vars.CNG_CE_PROJECT || 'uppfinna-project' }}
          ci-api-v4-url: ${{ vars.CNG_API_V4_URL || 'https://projecttick.org/api/v4' }}
          ci-server-fqdn: ${{ vars.CNG_SERVER_FQDN || 'projecttick.org' }}
          gitaly-git-repo-url: ${{ vars.CNG_GITALY_GIT_REPO_URL || 'https://projecttick.org/project-tick/uppfinna/forge/git.git' }}
          assets-image-registry-prefix: ${{ vars.CNG_ASSETS_IMAGE_REGISTRY_PREFIX || 'registry.projecttick.org/project-tick/uppfinna' }}

  ##########################################################################
  # phase-four
  ##########################################################################
  phase-four-build:
    name: "phase-four-build: ${{ matrix.image }} (${{ matrix.arch }})"
