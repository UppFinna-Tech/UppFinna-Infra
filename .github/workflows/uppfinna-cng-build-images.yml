    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image: [gitlab-exporter, gitlab-mailroom, gitaly, gitlab-container-registry, gitlab-kas, gitlab-pages, gitlab-shell, gitlab-agentk, gitlab-openbao, gitlab-zoekt, gitlab-elasticsearch-indexer]
