          ci-server-fqdn: ${{ vars.CNG_SERVER_FQDN || 'projecttick.org' }}
          gitaly-git-repo-url: ${{ vars.CNG_GITALY_GIT_REPO_URL || 'https://projecttick.org/project-tick/uppfinna/forge/git.git' }}
          assets-image-registry-prefix: ${{ vars.CNG_ASSETS_IMAGE_REGISTRY_PREFIX || 'registry.projecttick.org/project-tick/uppfinna' }}

  ##########################################################################
  # phase-four-post (gitaly-init-cgroups; depends on merged gitaly)
  ##########################################################################
  phase-four-post-build:
    name: "phase-four-post-build: gitaly-init-cgroups (${{ matrix.arch }})"
    needs: phase-four-merge
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
