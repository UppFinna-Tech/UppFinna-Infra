name: "Uppfinna: DB Check Schema"

on:
  workflow_call:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""
      foreman-pipeline-id:
        type: string
        default: ""
      foreman-plan:
        type: string
        default: ""
      foreman-callback-url:
        type: string
        default: ""
      foreman-callback-token:
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""

permissions: {}

jobs:
  db-check-schema:
    name: DB Check Schema
    runs-on: ubuntu-24.04
    container:
      image: registry.gitlab.com/gitlab-org/gitlab-build-images/ci/debian-bookworm-slim-ruby-3.3.11-golang-1.25-node-22.12-python-3.12-postgresql-17:rubygems-3.6-git-2.51-lfs-2.9-chrome-138-yarn-1.22-graphicsmagick-1.3.36-poetry-2.2@sha256:42b551d62db5e94c2faa833f0595300f948a08088a82646fbcabf01787dd078b
    permissions:
      contents: read
    services:
      postgres:
        image: registry.gitlab.com/gitlab-org/gitlab-build-images:postgres-17@sha256:8ffbbb3f64b90c5423cc693ddcd281cd74f54b4f07772c569257766ee13e17ba
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
      rediscluster:
        image: registry.gitlab.com/gitlab-org/gitlab-build-images:redis-cluster-7.0.11@sha256:fefdb7593970cd5f306cd1b341488a2a97a6e4da17d87037b4b7aa7398ea6648
      redis:
        image: redis:7.2-alpine@sha256:dfa18828cbc07b3ae6a95ec7343f6c214fdee2d836197b4be8e9904420762cd8
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
    env:
      GITLAB_DIR: ${{ inputs.source-repository != '' && '.' || 'gitlab' }}
      RAILS_ENV: test
      NODE_ENV: test
      CI: "true"
      RUBYOPT: "--yjit"
      BUNDLE_WITHOUT: "development"
      BUNDLE_INSTALL_FLAGS: "--jobs=$(nproc) --retry=3"
      BUNDLE_FROZEN: "true"
      DECOMPOSED_DB: "false"
      SEC_DECOMPOSED_DB: "false"
      SETUP_DB: "true"
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.GITLAB_DIR }}
    steps:
      - name: Install jq (container images lack it)
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update -qq && apt-get install -y --no-install-recommends jq
            elif command -v apk >/dev/null 2>&1; then
              apk add --no-cache jq
            elif command -v microdnf >/dev/null 2>&1; then
              microdnf install -y jq
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y jq
            fi
          fi

      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}

      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Cache Ruby gems
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.GITLAB_DIR }}/vendor/ruby
          key: uppfinna-ruby-gems-db-check-schema-${{ runner.os }}-${{ hashFiles(format('{0}/Gemfile.lock', env.GITLAB_DIR), format('{0}/Gemfile.checksum', env.GITLAB_DIR)) }}
          restore-keys: |
            uppfinna-ruby-gems-db-check-schema-${{ runner.os }}-

      - name: Prepare build
        run: source scripts/prepare_build.sh

      - name: Check schema
        run: |
          bundle exec rake db:drop db:create db:migrate
          scripts/validate_migration_checksum

      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
