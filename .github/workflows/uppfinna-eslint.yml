name: "Uppfinna: ESLint"

on:
  workflow_call:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""
      foreman-pipeline-id:
        type: string
        default: ""
      foreman-plan:
        type: string
        default: ""
      foreman-callback-url:
        type: string
        default: ""
      foreman-callback-token:
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""

permissions: {}

jobs:
  # Mirrors the canonical .gitlab-ci.yml flow: a Debian/Ruby job dumps
  # gitlab_schema.graphql, and generate-apollo-graphql-schema consumes it via an
  # artifact (needs: graphql-schema-dump there). The apollo image has no Ruby, so
  # it must not run the rake dump itself.
  dump-graphql-schema:
    name: Dump GraphQL schema
    runs-on: ubuntu-24.04
    container:
      image: registry.gitlab.com/gitlab-org/gitlab-build-images/ci/debian-bookworm-slim-ruby-3.3.11-golang-1.25-node-22.12-python-3.12-postgresql-17:rubygems-3.6-git-2.51-lfs-2.9-chrome-138-yarn-1.22-graphicsmagick-1.3.36-poetry-2.2
    permissions:
      contents: read
    env:
      GITLAB_DIR: ${{ inputs.source-repository != '' && '.' || 'gitlab' }}
      RAILS_ENV: test
      NODE_ENV: test
      CI: "true"
      RUBYOPT: "--yjit"
      BUNDLE_WITHOUT: "development"
      BUNDLE_INSTALL_FLAGS: "--jobs=$(nproc) --retry=3"
      BUNDLE_FROZEN: "true"
      SETUP_DB: "false"
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.GITLAB_DIR }}
    steps:
      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Cache Ruby gems
        uses: actions/cache@v4
        with:
          path: ${{ env.GITLAB_DIR }}/vendor/ruby
          key: uppfinna-ruby-gems-eslint-schema-${{ runner.os }}-${{ hashFiles(format('{0}/Gemfile.lock', env.GITLAB_DIR), format('{0}/Gemfile.checksum', env.GITLAB_DIR)) }}
          restore-keys: |
            uppfinna-ruby-gems-eslint-schema-${{ runner.os }}-

      - name: Prepare build
        run: source scripts/prepare_build.sh

      - name: Dump GraphQL schema
        run: bundle exec rake gitlab:graphql:schema:dump

      - name: Upload GraphQL schema
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: graphql-schema
          path: ${{ env.GITLAB_DIR }}/tmp/tests/graphql/gitlab_schema.graphql
          if-no-files-found: error
          retention-days: 30

  generate-apollo-graphql-schema:
    name: Generate Apollo GraphQL schema
    needs: dump-graphql-schema
    runs-on: ubuntu-24.04
    container:
      image: registry.gitlab.com/gitlab-org/gitlab-build-images:apollo
      options: --entrypoint ""
    permissions:
      contents: read
    env:
      GITLAB_DIR: ${{ inputs.source-repository != '' && '.' || 'gitlab' }}
      RAILS_ENV: test
      NODE_ENV: test
      CI: "true"
      USE_BUNDLE_INSTALL: "false"
      SETUP_DB: "false"
      GRAPHQL_SCHEMA_APOLLO_FILE: "tmp/tests/graphql/gitlab_schema_apollo.graphql"
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.GITLAB_DIR }}
    steps:
      - name: Prepare Alpine runtime
        shell: sh
        working-directory: /
        run: |
          set -eu
          apk upgrade --no-cache --repository https://dl-cdn.alpinelinux.org/alpine/v3.19/main musl musl-utils
          if ! command -v bash >/dev/null 2>&1; then
            apk add --no-cache bash
          fi

      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Download dumped GraphQL schema
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: graphql-schema
          path: ${{ env.GITLAB_DIR }}/tmp/tests/graphql

      - name: Generate Apollo GraphQL schema
        run: apollo client:download-schema --config=config/apollo.config.js "${GRAPHQL_SCHEMA_APOLLO_FILE}"

      - name: Upload Apollo GraphQL schema
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: graphql-schema-apollo
          path: ${{ env.GITLAB_DIR }}/tmp/tests/graphql/gitlab_schema_apollo.graphql
          if-no-files-found: error
          retention-days: 30

  eslint:
    name: ESLint
    needs: generate-apollo-graphql-schema
    runs-on: ubuntu-24.04
    container:
      image: registry.gitlab.com/gitlab-org/gitlab-build-images/ci/debian-bookworm-slim-ruby-3.3.11-golang-1.25-node-22.12-python-3.12-postgresql-17:rubygems-3.6-git-2.51-lfs-2.9-chrome-138-yarn-1.22-graphicsmagick-1.3.36-poetry-2.2
    permissions:
      contents: read
    env:
      GITLAB_DIR: ${{ inputs.source-repository != '' && '.' || 'gitlab' }}
      RAILS_ENV: test
      NODE_ENV: test
      CI: "true"
      NODE_OPTIONS: "--max-old-space-size=10240"
      BROWSERSLIST_IGNORE_OLD_DATA: "true"
      ESLINT_CODE_QUALITY_REPORT: "gl-code-quality-report.json"
      USE_BUNDLE_INSTALL: "false"
      SETUP_DB: "false"
      ENABLE_SPRING: "1"
      GRAPHQL_SCHEMA_APOLLO_FILE: "tmp/tests/graphql/gitlab_schema_apollo.graphql"
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.GITLAB_DIR }}
    steps:
      - name: Install jq (container images lack it)
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update -qq && apt-get install -y --no-install-recommends jq
            elif command -v apk >/dev/null 2>&1; then
              apk add --no-cache jq
            elif command -v microdnf >/dev/null 2>&1; then
              microdnf install -y jq
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y jq
            fi
          fi

      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}

      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ${{ env.GITLAB_DIR }}/node_modules
          key: uppfinna-node-modules-${{ runner.os }}-${{ hashFiles(format('{0}/yarn.lock', env.GITLAB_DIR), format('{0}/package.json', env.GITLAB_DIR)) }}
          restore-keys: |
            uppfinna-node-modules-${{ runner.os }}-

      - name: Prepare build
        run: source scripts/prepare_build.sh

      - name: Download Apollo GraphQL schema
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: graphql-schema-apollo
          path: ${{ env.GITLAB_DIR }}/tmp/tests/graphql

      - name: Yarn install
        run: |
          source scripts/utils.sh
          yarn_install_script

      - name: Run ESLint
        run: yarn run lint:eslint:all --format gitlab

      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: uppfinna-eslint-report
          path: ${{ env.GITLAB_DIR }}/${{ env.ESLINT_CODE_QUALITY_REPORT }}
          if-no-files-found: ignore
          retention-days: 31

      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
