name: "Uppfinna: ESLint"

on:
  workflow_call:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""
      foreman-pipeline-id:
        type: string
        default: ""
      foreman-plan:
        type: string
        default: ""
      foreman-callback-url:
        type: string
        default: ""
      foreman-callback-token:
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""

permissions: {}

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-24.04
    container:
      image: registry.gitlab.com/gitlab-org/gitlab-build-images/ci/debian-bookworm-slim-ruby-3.3.11-golang-1.25-node-22.12-python-3.12-postgresql-17:rubygems-3.6-git-2.51-lfs-2.9-chrome-138-yarn-1.22-graphicsmagick-1.3.36-poetry-2.2
    permissions:
      contents: read
    env:
      GITLAB_DIR: ${{ inputs.source-repository != '' && '.' || 'gitlab' }}
      RAILS_ENV: test
      NODE_ENV: test
      CI: "true"
      NODE_OPTIONS: "--max-old-space-size=10240"
      BROWSERSLIST_IGNORE_OLD_DATA: "true"
      ESLINT_CODE_QUALITY_REPORT: "gl-code-quality-report.json"
      USE_BUNDLE_INSTALL: "false"
      SETUP_DB: "false"
      ENABLE_SPRING: "1"
      GRAPHQL_SCHEMA_APOLLO_FILE: "tmp/tests/graphql/gitlab_schema_apollo.graphql"
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.GITLAB_DIR }}
    steps:
      - name: Install jq (container images lack it)
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update -qq && apt-get install -y --no-install-recommends jq
            elif command -v apk >/dev/null 2>&1; then
              apk add --no-cache jq
            elif command -v microdnf >/dev/null 2>&1; then
              microdnf install -y jq
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y jq
            fi
          fi

      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}

      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ${{ env.GITLAB_DIR }}/node_modules
          key: uppfinna-node-modules-${{ runner.os }}-${{ hashFiles(format('{0}/yarn.lock', env.GITLAB_DIR), format('{0}/package.json', env.GITLAB_DIR)) }}
          restore-keys: |
            uppfinna-node-modules-${{ runner.os }}-

      - name: Prepare build
        run: source scripts/prepare_build.sh

      - name: Yarn install
        run: |
          source scripts/utils.sh
          yarn_install_script

      - name: Run ESLint
        run: yarn run lint:eslint:all --format gitlab

      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uppfinna-eslint-report
          path: ${{ env.GITLAB_DIR }}/${{ env.ESLINT_CODE_QUALITY_REPORT }}
          if-no-files-found: ignore
          retention-days: 31

      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
