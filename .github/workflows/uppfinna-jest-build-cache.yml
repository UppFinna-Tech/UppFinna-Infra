name: "Uppfinna: Jest Build Cache"

on:
  workflow_call:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""
      foreman-pipeline-id:
        type: string
        default: ""
      foreman-plan:
        type: string
        default: ""
      foreman-callback-url:
        type: string
        default: ""
      foreman-callback-token:
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""

permissions: {}

jobs:
  jest-build-cache:
    name: Jest Build Cache
    runs-on: ubuntu-24.04
    container:
      image: registry.gitlab.com/gitlab-org/gitlab-build-images/ci/debian-bookworm-slim-ruby-3.3.11-node-22.12:rubygems-3.6-git-2.51-lfs-2.9-yarn-1.22-graphicsmagick-1.3.36@sha256:e31213a260316d508d22f33370e78f22ec555f9875a3c8596b8cd1986cf1456a
    permissions:
      contents: read
    env:
      GITLAB_DIR: ${{ inputs.source-repository != '' && '.' || 'gitlab' }}
      CI: "true"
      NODE_ENV: test
      NODE_OPTIONS: "--max-old-space-size=10240"
      SETUP_DB: "false"
      USE_BUNDLE_INSTALL: "false"
      BROWSERSLIST_IGNORE_OLD_DATA: "true"
      FORCE_COLOR: "1"
      GLCI_EXPORT_TEST_METRICS: "false"
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.GITLAB_DIR }}
    steps:
      - name: Install jq (container images lack it)
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              apt-get update -qq && apt-get install -y --no-install-recommends jq
            elif command -v apk >/dev/null 2>&1; then
              apk add --no-cache jq
            elif command -v microdnf >/dev/null 2>&1; then
              microdnf install -y jq
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y jq
            fi
          fi

      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}

      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Cache node_modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.GITLAB_DIR }}/node_modules
          key: uppfinna-node-modules-${{ runner.os }}-${{ hashFiles(format('{0}/yarn.lock', env.GITLAB_DIR), format('{0}/package.json', env.GITLAB_DIR)) }}
          restore-keys: |
            uppfinna-node-modules-${{ runner.os }}-

      - name: Prepare build
        run: source scripts/prepare_build.sh

      - name: Yarn install
        run: |
          source scripts/utils.sh
          yarn_install_script

      - name: Warm Jest cache
        run: scripts/frontend/warm_jest_cache.mjs

      - name: Upload Jest cache
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: uppfinna-jest-cache
          path: ${{ env.GITLAB_DIR }}/tmp/cache/jest/
          if-no-files-found: ignore
          retention-days: 1

      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
