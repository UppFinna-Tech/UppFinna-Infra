name: "Uppfinna: YAML Lint"

on:
  workflow_call:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""
      foreman-pipeline-id:
        type: string
        default: ""
      foreman-plan:
        type: string
        default: ""
      foreman-callback-url:
        type: string
        default: ""
      foreman-callback-token:
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      source-ref:
        type: string
        default: ""
      source-repository:
        type: string
        default: ""

permissions: {}

jobs:
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      GITLAB_DIR: ${{ inputs.source-repository != '' && '.' || 'gitlab' }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.GITLAB_DIR }}
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}

      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Install yamllint
        run: pipx install yamllint

      - name: Lint YAML
        run: yamllint --strict -f colored .

      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}

  lint-pipeline-yaml:
    name: Lint Pipeline YAML
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      GITLAB_DIR: ${{ inputs.source-repository != '' && '.' || 'gitlab' }}
      LINT_PATHS: ".gitlab-ci.yml .gitlab/ci .gitlab/duo lib/gitlab/ci/templates data/deprecations data/whats_new"
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.GITLAB_DIR }}
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}

      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Install yamllint
        run: pipx install yamllint

      - name: Lint pipeline YAML
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable, comments: {min-spaces-from-content: 1}}}" $LINT_PATHS

      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}

  lint-metrics-yaml:
    name: Lint Metrics YAML
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      GITLAB_DIR: ${{ inputs.source-repository != '' && '.' || 'gitlab' }}
      LINT_PATHS: "config/metrics"
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.GITLAB_DIR }}
    steps:
      - name: Foreman job init
        id: foreman
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-wrapper@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          plan_json:         ${{ inputs.foreman-plan }}

      - name: Checkout
        uses: Project-Tick-Infrastructure/checkout@22f699d1b88f4f7260eb5633e8e31670263e3cbc # v5
        with:
          ref: ${{ inputs.source-ref || '' }}
          source-repository: ${{ inputs.source-repository || '' }}
          submodules: true

      - name: Install yamllint
        run: pipx install yamllint

      - name: Lint metrics YAML
        run: |
          yamllint --strict -f colored -d "{extends: default, rules: {line-length: disable, document-start: disable, indentation: {spaces: 2, indent-sequences: whatever}}}" $LINT_PATHS

      - name: Foreman job finalize
        if: always()
        uses: Project-Tick/Project-Tick/.github/actions/foreman-job-finalize@ef4cb1b7aa938e2a332032c4063826821160533e # master
        with:
          callback_url:      ${{ inputs.foreman-callback-url }}
          callback_token:    ${{ inputs.foreman-callback-token }}
          pipeline_id:       ${{ inputs.foreman-pipeline-id }}
          foreman_api_token: ${{ secrets.FOREMAN_API_TOKEN }}
          job_name:          ${{ github.job }}
          job_status:        ${{ job.status }}
